<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Skyline Rush</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#0d0a1e; overflow:hidden; }
  body {
    display:flex; align-items:center; justify-content:center;
    font-family:'Segoe UI', system-ui, sans-serif;
    touch-action:none;
  }
  #wrap { position:relative; }
  canvas {
    display:block; border-radius:14px;
    box-shadow:0 0 60px rgba(255,107,157,.25), 0 20px 60px rgba(0,0,0,.6);
    max-height:98vh; max-width:98vw;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
(() => {
"use strict";
const W = 400, H = 700;
const cv = document.getElementById('c');
const dpr = Math.min(window.devicePixelRatio || 1, 2);
cv.width = W * dpr; cv.height = H * dpr;
cv.style.width = W + 'px'; cv.style.height = H + 'px';
const ctx = cv.getContext('2d');
ctx.scale(dpr, dpr);

// ---------- world / camera ----------
const HORIZON = 248, PLANE_Y = 636, NEAR = 1.4, ZFAR = 34;
const LANE_W = 115, ROAD_HALF = 200;
const proj = z => NEAR / (NEAR + z);
const screenY = z => HORIZON + (PLANE_Y - HORIZON) * proj(z);
const laneX = (l, p) => W / 2 + l * LANE_W * p;

// ---------- audio ----------
let AC = null;
function beep(freq, dur, type, vol, slide) {
  try {
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, AC.currentTime + dur);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + dur);
  } catch(e) {}
}
const sCoin  = () => beep(1180, .12, 'square', .06, 1760);
const sJump  = () => beep(300, .18, 'triangle', .09, 620);
const sCrash = () => { beep(160, .4, 'sawtooth', .12, 50); beep(90, .5, 'square', .1, 40); };

// ---------- state ----------
let state = 'menu';           // menu | run | over
let dist, speed, score, coins, best = 0;
let laneF, laneTarget, airY, vy, jumping, sliding, slideT, runT;
let obstacles, coinList, props, particles;
let spawnAcc, nextGap, propAcc, shake, dashScroll, t = 0;

function reset() {
  dist = 0; speed = 11; score = 0; coins = 0;
  laneF = 0; laneTarget = 0; airY = 0; vy = 0;
  jumping = false; sliding = false; slideT = 0; runT = 0;
  obstacles = []; coinList = []; props = []; particles = [];
  spawnAcc = 0; nextGap = 6; propAcc = 0; shake = 0; dashScroll = 0;
  // seed some scenery down the road
  for (let z = 2; z < ZFAR; z += 1.4) addProp(z);
}

// ---------- scenery ----------
const BLD_COLORS = ['#241a44', '#2c2054', '#1c1538', '#332561'];
function addProp(z) {
  const side = props.length % 2 === 0 ? -1 : 1;
  if (Math.random() < 0.28) {
    props.push({ kind:'lamp', side, z, x: side * (ROAD_HALF + 34) });
  } else {
    props.push({
      kind:'bld', side, z,
      x: side * (ROAD_HALF + 70 + Math.random() * 90),
      w: 90 + Math.random() * 70,
      h: 170 + Math.random() * 190,
      c: BLD_COLORS[(Math.random() * BLD_COLORS.length) | 0],
      seed: Math.random() * 1000
    });
  }
}

// static skyline strip behind the road
const skyline = [];
(() => {
  let x = -20;
  while (x < W + 20) {
    const w = 24 + Math.random() * 42;
    skyline.push({ x, w, h: 26 + Math.random() * 62, s: Math.random() });
    x += w + 2;
  }
})();

// ---------- spawning ----------
function freeLanes(used) {
  return [-1, 0, 1].filter(l => !used.includes(l));
}
function coinArc(lane, z) {
  const hs = [18, 70, 112, 70, 18];
  for (let i = 0; i < 5; i++)
    coinList.push({ lane, z: z - 2.6 + i * 1.3, h: hs[i] });
}
function coinLine(lane, z) {
  for (let i = 0; i < 5; i++)
    coinList.push({ lane, z: z + i * 1.5, h: 0 });
}
function spawnPattern() {
  const z = ZFAR;
  const r = Math.random();
  if (r < 0.26) {                                     // single barrier
    const l = [-1,0,1][(Math.random()*3)|0];
    obstacles.push({ type:'barrier', lane:l, z });
    if (Math.random() < 0.55) coinArc(l, z); else coinLine(freeLanes([l])[(Math.random()*2)|0], z);
    nextGap = 5 + Math.random() * 3;
  } else if (r < 0.44) {                              // double barrier
    const open = [-1,0,1][(Math.random()*3)|0];
    freeLanes([open]).forEach(l => obstacles.push({ type:'barrier', lane:l, z }));
    coinLine(open, z - 1);
    nextGap = 6 + Math.random() * 3;
  } else if (r < 0.66) {                              // train
    const l = [-1,0,1][(Math.random()*3)|0];
    const len = 6 + Math.random() * 5;
    obstacles.push({ type:'train', lane:l, z, len, hue: Math.random() < .5 ? 0 : 1 });
    coinLine(freeLanes([l])[(Math.random()*2)|0], z + 1);
    nextGap = len + 4 + Math.random() * 2;
  } else if (r < 0.82) {                              // overhead sign -> slide
    const l = [-1,0,1][(Math.random()*3)|0];
    obstacles.push({ type:'sign', lane:l, z });
    if (Math.random() < .5) coinLine(l, z + 2);
    nextGap = 5 + Math.random() * 3;
  } else {                                            // coin shower
    const l = [-1,0,1][(Math.random()*3)|0];
    coinLine(l, z);
    if (Math.random() < .5) coinLine(freeLanes([l])[(Math.random()*2)|0], z + 3);
    nextGap = 5 + Math.random() * 2;
  }
}

// ---------- input ----------
function moveLane(d) { if (state === 'run') laneTarget = Math.max(-1, Math.min(1, laneTarget + d)); }
function doJump() {
  if (state !== 'run') return;
  if (airY <= 0.5) { vy = 900; jumping = true; sliding = false; sJump(); }
}
function doSlide() {
  if (state !== 'run') return;
  if (airY > 1) { vy = -1400; }              // fast fall
  sliding = true; slideT = 0.65; jumping = false;
}
function startOrRestart() {
  if (state === 'menu' || state === 'over') { reset(); state = 'run'; }
}

window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (state !== 'run') {
    if (e.key === ' ' || e.key === 'Enter') startOrRestart();
    return;
  }
  if (e.key === 'ArrowLeft'  || e.key === 'a') moveLane(-1);
  if (e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
  if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') doJump();
  if (e.key === 'ArrowDown' || e.key === 's') doSlide();
});

let tx = 0, ty = 0, tt = 0;
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  tx = e.touches[0].clientX; ty = e.touches[0].clientY; tt = performance.now();
}, { passive:false });
cv.addEventListener('touchend', e => {
  e.preventDefault();
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (state !== 'run') { startOrRestart(); return; }
  if (Math.abs(dx) < 28 && Math.abs(dy) < 28) { doJump(); return; }   // tap = jump
  if (Math.abs(dx) > Math.abs(dy)) moveLane(dx > 0 ? 1 : -1);
  else dy < 0 ? doJump() : doSlide();
}, { passive:false });
cv.addEventListener('mousedown', () => { if (state !== 'run') startOrRestart(); });

// ---------- particles ----------
function burst(x, y, color, n, spd) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, v = spd * (0.4 + Math.random());
    particles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v - 60, life: 0.6 + Math.random()*0.4, c: color, r: 2 + Math.random()*3 });
  }
}

// ---------- update ----------
function crash() {
  state = 'over'; shake = 14; sCrash();
  best = Math.max(best, score);
  burst(laneX(laneF,1), PLANE_Y - 30 - airY, '#FF4757', 26, 220);
  burst(laneX(laneF,1), PLANE_Y - 30 - airY, '#FFD32A', 16, 260);
}

function update(dt) {
  t += dt;
  if (shake > 0) shake = Math.max(0, shake - dt * 30);
  particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 500*dt; p.life -= dt; });
  particles = particles.filter(p => p.life > 0);

  if (state !== 'run') return;

  speed = Math.min(26, speed + dt * 0.22);
  const dz = speed * dt;
  dist += dz; dashScroll = (dashScroll + dz) % 3;
  score = Math.floor(dist * 2) + coins * 10;
  runT += dt * (6 + speed * 0.5);

  // lane easing
  laneF += (laneTarget - laneF) * Math.min(1, dt * 12);

  // jump physics
  if (airY > 0 || vy > 0) {
    airY += vy * dt; vy -= 2600 * dt;
    if (airY <= 0) { airY = 0; vy = 0; jumping = false; }
  }
  if (sliding) { slideT -= dt; if (slideT <= 0) sliding = false; }

  // scroll world
  obstacles.forEach(o => o.z -= dz);
  coinList.forEach(c => c.z -= dz);
  props.forEach(p => p.z -= dz);
  obstacles = obstacles.filter(o => o.z + (o.len || 0) > -1.5);
  coinList  = coinList.filter(c => c.z > -1);
  props     = props.filter(p => p.z > -0.8);

  // spawn
  spawnAcc += dz;
  if (spawnAcc >= nextGap) { spawnAcc = 0; spawnPattern(); }
  propAcc += dz;
  while (propAcc > 1.4) { propAcc -= 1.4; addProp(ZFAR); }

  // collisions
  const pl = Math.round(laneF);
  const laneClose = Math.abs(laneF - pl) < 0.42;
  for (const o of obstacles) {
    if (o.lane !== pl || !laneClose) continue;
    if (o.type === 'train') {
      if (o.z < 0.55 && o.z + o.len > 0) { crash(); return; }
    } else if (o.type === 'barrier') {
      if (o.z > 0 && o.z < 0.55 && airY < 44) { crash(); return; }
    } else if (o.type === 'sign') {
      if (o.z > 0 && o.z < 0.55 && !sliding) { crash(); return; }
    }
  }
  for (const c of coinList) {
    if (c.taken) continue;
    if (c.z > -0.3 && c.z < 0.6 && c.lane === pl && laneClose && Math.abs(airY - c.h) < 48) {
      c.taken = true; coins++; sCoin();
      burst(laneX(pl,1), PLANE_Y - 40 - c.h, '#FFD32A', 8, 130);
    }
  }
  coinList = coinList.filter(c => !c.taken);
}

// ---------- drawing ----------
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, HORIZON + 30);
  g.addColorStop(0, '#1b1440');
  g.addColorStop(0.45, '#5b2a86');
  g.addColorStop(0.78, '#c74b8f');
  g.addColorStop(1, '#ff9e64');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, HORIZON + 30);

  // stars
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  for (let i = 0; i < 26; i++) {
    const sx = (i * 137.5) % W, sy = (i * 61.3) % (HORIZON * 0.55);
    const tw = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.5 + i));
    ctx.globalAlpha = tw * 0.8;
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  // sun
  const sunY = HORIZON - 34;
  const rg = ctx.createRadialGradient(W/2, sunY, 4, W/2, sunY, 90);
  rg.addColorStop(0, 'rgba(255,214,120,.95)');
  rg.addColorStop(0.35, 'rgba(255,160,90,.5)');
  rg.addColorStop(1, 'rgba(255,160,90,0)');
  ctx.fillStyle = rg;
  ctx.fillRect(W/2 - 90, sunY - 90, 180, 130);
  ctx.fillStyle = '#ffd678';
  ctx.beginPath(); ctx.arc(W/2, sunY, 30, 0, Math.PI * 2); ctx.fill();
  // sun stripes
  ctx.fillStyle = '#c74b8f';
  for (let i = 0; i < 3; i++) ctx.fillRect(W/2 - 32, sunY + 4 + i * 9, 64, 3 + i);

  // skyline silhouette
  ctx.fillStyle = '#1a1236';
  skyline.forEach(b => ctx.fillRect(b.x, HORIZON - b.h + 8, b.w, b.h));
  ctx.fillStyle = 'rgba(255,210,120,.8)';
  skyline.forEach(b => {
    if (b.s < 0.7) {
      const n = 2 + ((b.s * 10) | 0) % 3;
      for (let i = 0; i < n; i++)
        ctx.fillRect(b.x + 5 + ((b.s * 97 + i * 31) % (b.w - 10)), HORIZON - b.h + 16 + ((b.s * 53 + i * 47) % (b.h - 24)), 2.5, 3.5);
    }
  });
}

function drawRoad() {
  // ground
  const gg = ctx.createLinearGradient(0, HORIZON, 0, H);
  gg.addColorStop(0, '#2a1c4a'); gg.addColorStop(1, '#160f2e');
  ctx.fillStyle = gg; ctx.fillRect(0, HORIZON, W, H - HORIZON);

  // road trapezoid extended to bottom
  const halfBottom = ROAD_HALF * (H - HORIZON) / (PLANE_Y - HORIZON);
  ctx.fillStyle = '#312651';
  ctx.beginPath();
  ctx.moveTo(W/2 - 6, HORIZON);
  ctx.lineTo(W/2 + 6, HORIZON);
  ctx.lineTo(W/2 + halfBottom, H);
  ctx.lineTo(W/2 - halfBottom, H);
  ctx.closePath(); ctx.fill();

  // neon edges
  ctx.strokeStyle = '#ff6b9d'; ctx.lineWidth = 3;
  ctx.shadowColor = '#ff6b9d'; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(W/2 - 6, HORIZON); ctx.lineTo(W/2 - halfBottom, H);
  ctx.moveTo(W/2 + 6, HORIZON); ctx.lineTo(W/2 + halfBottom, H);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // lane dashes
  ctx.fillStyle = 'rgba(255,230,190,.75)';
  for (let base = -dashScroll; base < ZFAR; base += 3) {
    if (base + 1.2 < 0) continue;
    const z0 = Math.max(base, 0.01), z1 = base + 1.2;
    const p0 = proj(z0), p1 = proj(z1);
    const y0 = screenY(z0), y1 = screenY(z1);
    for (const b of [-0.5, 0.5]) {
      const x0 = W/2 + b * LANE_W * 2 * p0 * 0.5, x1 = W/2 + b * LANE_W * 2 * p1 * 0.5;
      const w0 = 5 * p0, w1 = 5 * p1;
      ctx.beginPath();
      ctx.moveTo(x0 - w0, y0); ctx.lineTo(x0 + w0, y0);
      ctx.lineTo(x1 + w1, y1); ctx.lineTo(x1 - w1, y1);
      ctx.closePath(); ctx.fill();
    }
  }
}

function drawProp(o) {
  const p = proj(o.z), y = screenY(o.z);
  const x = W/2 + o.x * p;
  if (o.kind === 'lamp') {
    const h = 150 * p;
    ctx.strokeStyle = '#4a3d73'; ctx.lineWidth = Math.max(1.5, 4 * p);
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - h);
    ctx.lineTo(x - o.side * 22 * p, y - h); ctx.stroke();
    const lx = x - o.side * 22 * p, ly = y - h;
    ctx.fillStyle = '#7ef2e6';
    ctx.shadowColor = '#7ef2e6'; ctx.shadowBlur = 12 * p;
    ctx.beginPath(); ctx.arc(lx, ly + 3 * p, 5 * p, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  } else {
    const w = o.w * p, h = o.h * p;
    ctx.fillStyle = o.c;
    ctx.fillRect(x - w/2, y - h, w, h);
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.fillRect(x - w/2 + (o.side < 0 ? w * 0.72 : 0), y - h, w * 0.28, h);
    if (p > 0.22) {
      ctx.fillStyle = 'rgba(255,205,110,.85)';
      const cols = 3, rows = Math.max(2, (o.h / 46) | 0);
      for (let cx2 = 0; cx2 < cols; cx2++) for (let ry = 0; ry < rows; ry++) {
        if (((o.seed + cx2 * 7 + ry * 13) | 0) % 3 === 0) continue;
        ctx.fillRect(x - w/2 + w * (0.16 + cx2 * 0.28), y - h + h * (0.1 + ry * (0.8 / rows)), 4.5 * p * 2, 6 * p * 2);
      }
    }
  }
}

function drawBarrier(o) {
  const z = Math.max(o.z, 0.01), p = proj(z), y = screenY(z);
  const x = laneX(o.lane, p);
  const w = 92 * p, h = 46 * p;
  // legs
  ctx.fillStyle = '#3b3160';
  ctx.fillRect(x - w/2 + 4*p, y - h*0.55, 6*p, h*0.55);
  ctx.fillRect(x + w/2 - 10*p, y - h*0.55, 6*p, h*0.55);
  // board
  ctx.save();
  ctx.translate(x, y - h * 0.78);
  ctx.fillStyle = '#ff8c42';
  const bw = w, bh = h * 0.55;
  ctx.fillRect(-bw/2, -bh/2, bw, bh);
  ctx.beginPath(); ctx.rect(-bw/2, -bh/2, bw, bh); ctx.clip();
  ctx.fillStyle = '#fff3e0';
  for (let i = -3; i < 4; i++) {
    ctx.save(); ctx.translate(i * bw / 4, 0); ctx.rotate(-0.5);
    ctx.fillRect(-bw/14, -bh, bw/7, bh*2);
    ctx.restore();
  }
  ctx.restore();
  ctx.strokeStyle = '#1a1236'; ctx.lineWidth = Math.max(1, 2*p);
  ctx.strokeRect(x - w/2, y - h*0.78 - h*0.275, w, h*0.55);
}

function drawSign(o) {
  const z = Math.max(o.z, 0.01), p = proj(z), y = screenY(z);
  const x = laneX(o.lane, p);
  const w = 100 * p;
  const botH = 62 * p, barH = 46 * p;
  ctx.fillStyle = '#4a3d73';
  ctx.fillRect(x - w/2 - 4*p, y - botH - barH, 7*p, botH + barH);
  ctx.fillRect(x + w/2 - 3*p, y - botH - barH, 7*p, botH + barH);
  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(x - w/2, y - botH - barH, w, barH);
  ctx.strokeStyle = '#c9ffe2'; ctx.lineWidth = Math.max(1, 2.5*p);
  ctx.strokeRect(x - w/2 + 3*p, y - botH - barH + 3*p, w - 6*p, barH - 6*p);
  // down arrow
  ctx.fillStyle = '#eafff3';
  ctx.beginPath();
  ctx.moveTo(x, y - botH - 8*p);
  ctx.lineTo(x - 12*p, y - botH - 26*p);
  ctx.lineTo(x + 12*p, y - botH - 26*p);
  ctx.closePath(); ctx.fill();
}

function drawTrain(o) {
  const z0 = Math.max(o.z, 0.01), z1 = o.z + o.len;
  const p0 = proj(z0), p1 = proj(z1);
  const y0 = screenY(z0), y1 = screenY(z1);
  const x0 = laneX(o.lane, p0), x1 = laneX(o.lane, p1);
  const w0 = 100 * p0, w1 = 100 * p1;
  const h0 = 128 * p0, h1 = 128 * p1;
  const body = o.hue ? '#ffd32a' : '#ff4757';
  const dark = o.hue ? '#d9a800' : '#c62f3e';

  // roof
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.moveTo(x0 - w0/2, y0 - h0); ctx.lineTo(x0 + w0/2, y0 - h0);
  ctx.lineTo(x1 + w1/2, y1 - h1); ctx.lineTo(x1 - w1/2, y1 - h1);
  ctx.closePath(); ctx.fill();
  // visible side
  const side = x0 < W/2 ? 1 : -1;
  ctx.fillStyle = o.hue ? '#e8bd12' : '#e03d4d';
  ctx.beginPath();
  ctx.moveTo(x0 + side*w0/2, y0 - h0); ctx.lineTo(x0 + side*w0/2, y0);
  ctx.lineTo(x1 + side*w1/2, y1); ctx.lineTo(x1 + side*w1/2, y1 - h1);
  ctx.closePath(); ctx.fill();
  // front face
  ctx.fillStyle = body;
  ctx.fillRect(x0 - w0/2, y0 - h0, w0, h0);
  ctx.strokeStyle = '#1a1236'; ctx.lineWidth = Math.max(1, 2.5*p0);
  ctx.strokeRect(x0 - w0/2, y0 - h0, w0, h0);
  // windshield
  ctx.fillStyle = '#9be8ff';
  ctx.fillRect(x0 - w0*0.34, y0 - h0*0.86, w0*0.68, h0*0.3);
  // headlights
  ctx.fillStyle = '#fff6c9';
  ctx.shadowColor = '#fff6c9'; ctx.shadowBlur = 8*p0;
  ctx.beginPath();
  ctx.arc(x0 - w0*0.3, y0 - h0*0.18, 6*p0, 0, Math.PI*2);
  ctx.arc(x0 + w0*0.3, y0 - h0*0.18, 6*p0, 0, Math.PI*2);
  ctx.fill(); ctx.shadowBlur = 0;
  // stripe
  ctx.fillStyle = '#fff';
  ctx.fillRect(x0 - w0/2, y0 - h0*0.44, w0, h0*0.08);
}

function drawCoin(c) {
  const z = Math.max(c.z, 0.01), p = proj(z);
  const x = laneX(c.lane, p);
  const y = screenY(z) - (c.h + 22) * p;
  const wob = Math.abs(Math.sin(t * 5 + c.z * 2));
  const r = 13 * p;
  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = '#ffd32a'; ctx.shadowBlur = 9 * p;
  ctx.fillStyle = '#ffd32a';
  ctx.beginPath(); ctx.ellipse(0, 0, r * (0.35 + 0.65 * wob), r, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#b8860b';
  ctx.beginPath(); ctx.ellipse(0, 0, r * 0.55 * (0.35 + 0.65 * wob), r * 0.55, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffe98a';
  ctx.beginPath(); ctx.ellipse(0, 0, r * 0.32 * (0.35 + 0.65 * wob), r * 0.32, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPlayer() {
  const x = laneX(laneF, 1);
  const groundY = PLANE_Y;
  const y = groundY - airY;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  const sw = 26 - airY * 0.06;
  ctx.beginPath(); ctx.ellipse(x, groundY + 4, Math.max(12, sw), 7, 0, 0, Math.PI*2); ctx.fill();

  ctx.save();
  ctx.translate(x, y);

  const skin = '#ffd9b3', jacket = '#22d3ee', jacketD = '#0ea5c4', pants = '#2d3561', cap = '#ff4757';

  if (sliding) {
    // crouched slide
    ctx.fillStyle = pants;
    ctx.fillRect(-16, -16, 32, 10);
    ctx.fillStyle = jacket;
    ctx.beginPath(); ctx.roundRect(-15, -30, 30, 18, 7); ctx.fill();
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(10, -34, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = cap;
    ctx.beginPath(); ctx.arc(10, -36, 9, Math.PI, 0); ctx.fill();
    ctx.fillRect(10, -37, 13, 4);
    // dust
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    for (let i = 0; i < 3; i++)
      ctx.fillRect(-24 - i * 8, -8 + Math.sin(t*20+i)*3, 6, 3);
  } else {
    const swing = jumping ? 0.55 : Math.sin(runT);
    // legs
    ctx.strokeStyle = pants; ctx.lineWidth = 7; ctx.lineCap = 'round';
    const hipY = -24, legL = jumping ? 16 : 22;
    ctx.beginPath();
    ctx.moveTo(-3, hipY);
    ctx.lineTo(-3 + Math.sin(swing) * 13, hipY + legL * Math.cos(swing * 0.6));
    ctx.moveTo(3, hipY);
    ctx.lineTo(3 - Math.sin(swing) * 13, hipY + legL * Math.cos(swing * 0.6));
    ctx.stroke();
    // body
    ctx.fillStyle = jacket;
    ctx.beginPath(); ctx.roundRect(-11, -54, 22, 32, 8); ctx.fill();
    ctx.fillStyle = jacketD;
    ctx.fillRect(-11, -38, 22, 4);
    // arms
    ctx.strokeStyle = jacket; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(-9, -48); ctx.lineTo(-9 - Math.sin(swing) * 10, -34 + Math.cos(swing) * 5);
    ctx.moveTo(9, -48); ctx.lineTo(9 + Math.sin(swing) * 10, -34 - Math.cos(swing) * 5);
    ctx.stroke();
    // head
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(0, -62, 10, 0, Math.PI*2); ctx.fill();
    // cap
    ctx.fillStyle = cap;
    ctx.beginPath(); ctx.arc(0, -64, 10, Math.PI, 0); ctx.fill();
    ctx.fillRect(0, -66, 15, 4.5);
  }
  ctx.restore();
}

function drawHUD() {
  ctx.textBaseline = 'top';
  // score
  ctx.font = '800 26px "Segoe UI", sans-serif';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,.5)'; ctx.shadowBlur = 6;
  ctx.textAlign = 'left';
  ctx.fillText(score.toLocaleString(), 16, 14);
  ctx.font = '600 11px "Segoe UI", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.65)';
  ctx.fillText('SCORE', 17, 42);
  // coins
  ctx.textAlign = 'right';
  ctx.font = '800 22px "Segoe UI", sans-serif';
  ctx.fillStyle = '#ffd32a';
  ctx.fillText(coins, W - 18, 17);
  ctx.beginPath(); ctx.arc(W - 24 - ctx.measureText(coins).width - 12, 28, 9, 0, Math.PI*2);
  ctx.fillStyle = '#ffd32a'; ctx.fill();
  ctx.fillStyle = '#b8860b';
  ctx.beginPath(); ctx.arc(W - 24 - ctx.measureText(String(coins)).width - 12, 28, 5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
}

function panel(title, sub, lines) {
  ctx.fillStyle = 'rgba(13,10,30,.72)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.shadowColor = '#ff6b9d'; ctx.shadowBlur = 24;
  ctx.fillStyle = '#fff';
  ctx.font = '900 44px "Segoe UI", sans-serif';
  ctx.fillText(title, W/2, 210);
  ctx.shadowBlur = 0;

  if (sub) {
    ctx.fillStyle = '#ffd32a';
    ctx.font = '800 30px "Segoe UI", sans-serif';
    ctx.fillText(sub, W/2, 268);
  }
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  ctx.font = '500 15px "Segoe UI", sans-serif';
  lines.forEach((l, i) => ctx.fillText(l, W/2, 330 + i * 26));

  const pulse = 0.6 + 0.4 * Math.abs(Math.sin(t * 2.4));
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#7ef2e6';
  ctx.font = '700 17px "Segoe UI", sans-serif';
  ctx.fillText(state === 'menu' ? 'TAP  OR  PRESS SPACE  TO RUN' : 'TAP  OR  PRESS SPACE  TO RETRY', W/2, 470);
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake);

  drawSky();
  drawRoad();

  // depth-sorted world objects
  const drawables = [];
  props.forEach(o => drawables.push({ z: o.z, f: () => drawProp(o) }));
  obstacles.forEach(o => drawables.push({
    z: o.z + (o.len ? o.len * 0.5 : 0),
    f: () => o.type === 'train' ? drawTrain(o) : o.type === 'barrier' ? drawBarrier(o) : drawSign(o)
  }));
  coinList.forEach(c => drawables.push({ z: c.z, f: () => drawCoin(c) }));
  drawables.sort((a, b) => b.z - a.z);
  drawables.forEach(d => d.f());

  if (state !== 'menu') drawPlayer();

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.c;
    ctx.fillRect(p.x - p.r/2, p.y - p.r/2, p.r, p.r);
  });
  ctx.globalAlpha = 1;

  if (state === 'run') drawHUD();
  if (state === 'menu')
    panel('SKYLINE RUSH', null, [
      '\u2190 \u2192  switch lanes',
      '\u2191 / SPACE / tap \u2014 jump barriers',
      '\u2193 / swipe down \u2014 slide under signs',
      'grab coins \u00b7 dodge trains'
    ]);
  if (state === 'over')
    panel('WRECKED!', 'SCORE  ' + score.toLocaleString(), [
      coins + ' coins collected',
      'best  ' + best.toLocaleString()
    ]);

  ctx.restore();
}

// ---------- loop ----------
reset();
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Puff — a tiny flappy game</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b1b1b;
    --cream:#ffdb9d;
    --peach:#ffbc57;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #FFEFD6 0%, transparent 60%),
      linear-gradient(180deg,#FDF3E3 0%, #F3E4D0 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:"Baloo 2", ui-rounded, system-ui, sans-serif;
    overflow:hidden;
    transition:background-color .5s ease;
  }
  body.night{
    background:
      radial-gradient(1200px 600px at 50% -10%, #162A52 0%, transparent 60%),
      linear-gradient(180deg,#070C1F 0%, #0E1430 100%);
  }
  .frame{
    position:relative;
    border-radius:28px;
    box-shadow:
      0 30px 60px -20px rgba(90,60,30,.35),
      0 0 0 8px #fff,
      0 0 0 9px rgba(90,60,30,.12);
    overflow:hidden;
    touch-action:manipulation;
    transition:box-shadow .5s ease;
  }
  body.night .frame{
    box-shadow:
      0 30px 70px -20px rgba(0,0,0,.65),
      0 0 0 8px #0B1330,
      0 0 0 9px rgba(110,150,235,.18),
      0 0 50px rgba(80,120,220,.12);
  }
  canvas{display:block;cursor:pointer}

  .theme-toggle{
    position:absolute;top:14px;right:14px;z-index:5;
    width:64px;height:32px;padding:0;border:0;
    border-radius:999px;cursor:pointer;
    background:rgba(255,255,255,.55);
    box-shadow:0 2px 8px rgba(90,60,30,.18), inset 0 0 0 1px rgba(255,255,255,.6);
    transition:background .4s ease, box-shadow .4s ease;
    -webkit-tap-highlight-color:transparent;
  }
  body.night .theme-toggle{
    background:rgba(16,24,50,.6);
    box-shadow:0 2px 10px rgba(0,0,0,.45), inset 0 0 0 1px rgba(120,160,255,.28);
  }
  .theme-toggle:focus-visible{
    outline:none;
    box-shadow:0 0 0 3px rgba(255,201,77,.6), 0 2px 8px rgba(90,60,30,.18), inset 0 0 0 1px rgba(255,255,255,.6);
  }
  body.night .theme-toggle:focus-visible{
    box-shadow:0 0 0 3px rgba(120,160,255,.7), 0 2px 10px rgba(0,0,0,.45), inset 0 0 0 1px rgba(120,160,255,.28);
  }
  .knob{
    position:absolute;top:3px;left:3px;
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 36% 34%, #FFF6CF, #FFC94D 72%);
    box-shadow:0 1px 4px rgba(120,80,20,.45);
    transition:transform .45s cubic-bezier(.5,1.7,.5,1), background .4s ease, box-shadow .4s ease;
  }
  body.night .knob{
    transform:translateX(32px);
    background:radial-gradient(circle at 36% 34%, #FBF3DA, #C6D0EC 72%);
    box-shadow:inset -7px -2px 0 0 rgba(13,22,48,.6), 0 0 12px rgba(180,200,255,.45);
  }

  .credit{
    position:fixed;bottom:14px;left:0;right:0;text-align:center;
    color:#B79A78;font-size:13px;font-weight:600;letter-spacing:.04em;
    user-select:none;pointer-events:none;
    transition:color .5s ease;
  }
  body.night .credit{color:#6C7AA8}
  @media (prefers-reduced-motion: reduce){
    .credit{display:none}
    .knob{transition:transform .15s ease}
  }
</style>
</head>
<body>
<div class="frame">
  <canvas id="game"></canvas>
  <button id="themeToggle" class="theme-toggle" aria-pressed="false" aria-label="Switch to night">
    <span class="knob" aria-hidden="true"></span>
  </button>
</div>
<div class="credit">space / tap to flap</div>

<script>
(() => {
  "use strict";

  // ---------- setup ----------
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const W = 400, H = 620;           // logical size
  const GROUND_H = 88;
  const GROUND_Y = H - GROUND_H;

  function fit(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const scale = Math.min(
      (window.innerWidth - 32) / W,
      (window.innerHeight - 64) / H,
      1.05
    );
    canvas.style.width  = (W * scale) + "px";
    canvas.style.height = (H * scale) + "px";
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  fit();
  addEventListener("resize", fit);

  // ---------- palettes ----------
  const THEMES = {
    day: {
      skyTop:   "#AEE3FF",
      skyBot:   "#EAFBFF",
      sun:      "#FFF3B8",
      cloud:    "#FFFFFF",
      hillFar:  "#C9EEDB",
      hillNear: "#A7E3C2",
      bush:     "#8AD6A8",
      ground:   "#F6D9A0",
      groundTop:"#FBE7BC",
      groundLine:"#E8BF7F",
      pipe:     "#7ECB77",
      pipeDark: "#5FAF59",
      pipeLite: "#A9E29F",
      bird:     "#FFC94D",
      birdDark: "#F2A93B",
      wing:     "#FFE08A",
      beak:     "#FF8A5C",
      blush:    "#FFA7A0",
      ink:      "#3D4A5C",
      line:     "#3D4A5C",
      cardBg:   "#FFF9EE",
      cardLabel:"#9A8A72",
      cardTitle:"#3D4A5C",
      prompt:   "#3D4A5C",
    },
    night: {
      skyTop:   "#0A1330",
      skyBot:   "#23386A",
      sun:      "#F5E9C8",
      cloud:    "#1B2A4A",
      hillFar:  "#163046",
      hillNear: "#102C28",
      bush:     "#0C1F1C",
      ground:   "#1F1932",
      groundTop:"#2B2440",
      groundLine:"#120E22",
      pipe:     "#2E8C7A",
      pipeDark: "#1B5B4F",
      pipeLite: "#5FE0C6",
      bird:     "#FFC94D",
      birdDark: "#F2A93B",
      wing:     "#FFE08A",
      beak:     "#FF8A5C",
      blush:    "#FFA7A0",
      ink:      "#0E1830",
      line:     "#0B1426",
      cardBg:   "#1B2342",
      cardLabel:"#8A9BC8",
      cardTitle:"#EAEFFF",
      prompt:   "#CFD9F2",
    },
  };

  // ---------- helpers ----------
  const rand = (a, b) => a + Math.random() * (b - a);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;

  function hexToRgb(h){
    h = h.replace('#','');
    if (h.length === 3) h = h.split('').map(c => c + c).join('');
    const n = parseInt(h, 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }
  function rgbToHex(r, g, b){
    const c = v => Math.round(clamp(v, 0, 255)).toString(16).padStart(2, '0');
    return '#' + c(r) + c(g) + c(b);
  }
  function hexLerp(a, b, t){
    if (t <= 0) return a;
    if (t >= 1) return b;
    const [ar, ag, ab] = hexToRgb(a), [br, bg, bb] = hexToRgb(b);
    return rgbToHex(ar + (br - ar) * t, ag + (bg - ag) * t, ab + (bb - ab) * t);
  }
  function withAlpha(hex, a){
    const [r, g, b] = hexToRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
  }
  function blend(a, b, t){
    const o = {};
    for (const k in a) o[k] = hexLerp(a[k], b[k], t);
    return o;
  }

  // ---------- theme state ----------
  let storedNight = null;
  try { storedNight = localStorage.getItem("puff-night"); } catch (e) {}
  let initNight;
  if (storedNight === "1") initNight = true;
  else if (storedNight === "0") initNight = false;
  else initNight = !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);

  let nightTarget = initNight ? 1 : 0;
  let nightT = initNight ? 1 : 0;          // animated 0 (day) -> 1 (night)
  let P = blend(THEMES.day, THEMES.night, nightT);

  const toggleBtn = document.getElementById("themeToggle");
  function applyThemeUI(night){
    document.body.classList.toggle("night", night);
    toggleBtn.setAttribute("aria-pressed", String(night));
    toggleBtn.setAttribute("aria-label", night ? "Switch to day" : "Switch to night");
  }
  function setTheme(night){
    nightTarget = night ? 1 : 0;
    try { localStorage.setItem("puff-night", night ? "1" : "0"); } catch (e) {}
    applyThemeUI(night);
  }
  applyThemeUI(initNight);
  toggleBtn.addEventListener("click", e => {
    e.preventDefault();
    e.stopPropagation();
    setTheme(nightTarget < 0.5);
  });

  // ---------- game state ----------
  const GRAVITY = 1750;
  const FLAP_VY = -480;
  const MAX_VY  = 820;
  const PIPE_W  = 68;
  const GAP     = 158;
  const PIPE_SPACING = 218;
  const BASE_SPEED = 138;

  let state = "ready";              // ready | play | dead
  let score = 0, best = 0;
  let speed = BASE_SPEED;
  let time = 0;
  let shake = 0;
  let deadTimer = 0;
  let flash = 0;

  const bird = {
    x: 108, y: H * 0.45, vy: 0,
    r: 17,
    rot: 0,
    wing: 0,            // wing animation phase
    wingBoost: 0,       // extra flap speed after input
    squash: 0,          // squash & stretch amount
    bob: 0,             // idle bobbing phase
  };

  let pipes = [];       // {x, gapY, passed}
  let particles = [];   // feathers & pops

  // parallax layers
  const clouds = [];
  for (let i = 0; i < 6; i++){
    clouds.push({
      x: Math.random() * W,
      y: 40 + Math.random() * 170,
      s: 0.6 + Math.random() * 0.9,     // size
      v: 8 + Math.random() * 10,        // own drift speed
    });
  }
  const hillsFar  = { off: 0, v: 0.18 };
  const hillsNear = { off: 0, v: 0.38 };
  const bushes    = { off: 0, v: 0.62 };
  const ground    = { off: 0, v: 1.0  };

  // night sky: stars + fireflies
  const stars = [];
  for (let i = 0; i < 55; i++){
    stars.push({
      x: Math.random() * W,
      y: Math.random() * (GROUND_Y - 40),
      r: rand(0.6, 1.8),
      tw: Math.random() * Math.PI * 2,
      sp: rand(1.5, 3.6),
      v: rand(2, 6),
    });
  }
  const fireflies = [];
  for (let i = 0; i < 12; i++){
    fireflies.push({
      x: Math.random() * W,
      y: GROUND_Y - rand(10, 130),
      ph: Math.random() * Math.PI * 2,
      sp: rand(0.8, 1.8),
      vx: rand(-6, 6),
      vy: rand(-3, 3),
    });
  }

  function reset(){
    score = 0;
    speed = BASE_SPEED;
    bird.y = H * 0.45;
    bird.vy = 0;
    bird.rot = 0;
    bird.squash = 0;
    pipes = [];
    particles = [];
    let x = W + 160;
    for (let i = 0; i < 3; i++){
      pipes.push(makePipe(x));
      x += PIPE_SPACING;
    }
    state = "ready";
  }

  function makePipe(x){
    const margin = 84;
    return {
      x,
      gapY: rand(margin + GAP/2, GROUND_Y - margin - GAP/2),
      passed: false,
      wobble: Math.random() * Math.PI * 2,
    };
  }

  function flap(){
    if (state === "dead"){
      if (deadTimer > 0.55) reset();
      return;
    }
    if (state === "ready") state = "play";
    bird.vy = FLAP_VY;
    bird.wingBoost = 1;
    bird.squash = 1;
    // feather puffs
    for (let i = 0; i < 5; i++){
      particles.push({
        x: bird.x - 8, y: bird.y + rand(-6, 10),
        vx: rand(-90, -30), vy: rand(-40, 70),
        r: rand(2.5, 5), a: 1,
        spin: rand(-6, 6), rot: rand(0, 6),
        col: Math.random() < 0.5 ? P.wing : "#FFFFFF",
      });
    }
  }

  function die(){
    if (state === "dead") return;
    state = "dead";
    deadTimer = 0;
    shake = 1;
    flash = 1;
    best = Math.max(best, score);
    bird.vy = Math.min(bird.vy, -260);   // little death hop
    for (let i = 0; i < 14; i++){
      particles.push({
        x: bird.x, y: bird.y,
        vx: rand(-160, 160), vy: rand(-220, 40),
        r: rand(3, 6), a: 1,
        spin: rand(-8, 8), rot: rand(0, 6),
        col: [P.bird, P.wing, "#FFFFFF"][Math.floor(Math.random()*3)],
      });
    }
  }

  // ---------- input ----------
  addEventListener("keydown", e => {
    if (e.target && e.target.id === "themeToggle") return;   // don't flap while toggling
    if (e.code === "Space" || e.code === "ArrowUp"){ e.preventDefault(); flap(); }
  });
  canvas.addEventListener("pointerdown", e => { e.preventDefault(); flap(); });

  // ---------- update ----------
  function update(dt){
    time += dt;
    bird.bob += dt * 3;
    flash = Math.max(0, flash - dt * 4);
    shake = Math.max(0, shake - dt * 2.4);

    // theme blend
    if (nightT !== nightTarget){
      nightT += (nightTarget - nightT) * (1 - Math.pow(0.002, dt));
      if (Math.abs(nightTarget - nightT) < 0.001) nightT = nightTarget;
      P = blend(THEMES.day, THEMES.night, nightT);
    } else {
      P = nightTarget > 0.5 ? THEMES.night : THEMES.day;
    }

    // wing animation: idle glide + boost after flap
    bird.wingBoost = Math.max(0, bird.wingBoost - dt * 2.2);
    bird.wing += dt * (6 + bird.wingBoost * 26);
    bird.squash = Math.max(0, bird.squash - dt * 5);

    const scroll = (state === "play") ? speed * dt : (state === "ready" ? speed * 0.35 * dt : 0);

    // parallax
    for (const c of clouds){
      c.x -= c.v * c.s * dt + scroll * 0.12 * c.s;
      if (c.x < -80) { c.x = W + 80; c.y = 40 + Math.random() * 170; }
    }
    hillsFar.off  = (hillsFar.off  + scroll * hillsFar.v ) % W;
    hillsNear.off = (hillsNear.off + scroll * hillsNear.v) % W;
    bushes.off    = (bushes.off    + scroll * bushes.v   ) % W;
    ground.off    = (ground.off    + scroll * ground.v   ) % 48;

    // stars drift + twinkle
    for (const s of stars){
      s.tw += dt * s.sp;
      s.x -= s.v * dt + scroll * 0.05;
      if (s.x < -4){ s.x = W + 4; s.y = Math.random() * (GROUND_Y - 40); }
    }
    // fireflies wander
    for (const f of fireflies){
      f.ph += dt * f.sp;
      f.x += f.vx * dt - scroll * 0.2;
      f.y += f.vy * dt;
      f.vx = clamp(f.vx + rand(-12, 12) * dt, -14, 14);
      f.vy = clamp(f.vy + rand(-12, 12) * dt, -10, 10);
      if (f.x < -8) f.x = W + 8;
      if (f.x > W + 8) f.x = -8;
      if (f.y < GROUND_Y - 150) f.y = GROUND_Y - 150;
      if (f.y > GROUND_Y - 6) f.y = GROUND_Y - 6;
    }

    // bird physics
    if (state === "ready"){
      bird.y = H * 0.45 + Math.sin(bird.bob) * 7;
      bird.rot = Math.sin(bird.bob + 1) * 0.06;
    } else {
      bird.vy = Math.min(bird.vy + GRAVITY * dt, MAX_VY);
      bird.y += bird.vy * dt;
      const target = clamp(bird.vy / MAX_VY, -1, 1);
      const targetRot = target < 0 ? target * 0.45 : target * 1.25;
      bird.rot = lerp(bird.rot, targetRot, 1 - Math.pow(0.0018, dt));

      // ceiling
      if (bird.y < bird.r){ bird.y = bird.r; bird.vy = 0; }

      // ground
      if (bird.y > GROUND_Y - bird.r){
        bird.y = GROUND_Y - bird.r;
        if (state === "play") die();
        bird.vy = 0;
        bird.rot = lerp(bird.rot, 1.35, 1 - Math.pow(0.001, dt));
      }
    }

    // pipes
    if (state === "play"){
      speed = BASE_SPEED + Math.min(score, 40) * 1.4;
      for (const p of pipes){
        p.x -= speed * dt;
        if (!p.passed && p.x + PIPE_W < bird.x - bird.r){
          p.passed = true;
          score++;
          // score pop
          particles.push({
            x: bird.x, y: bird.y - 26,
            vx: 0, vy: -50, r: 0, a: 1,
            spin: 0, rot: 0, col: null, text: "+1",
          });
        }
        // collision (circle vs two rects, slightly forgiving)
        const r = bird.r - 2.5;
        const inX = bird.x + r > p.x && bird.x - r < p.x + PIPE_W;
        if (inX){
          const topEdge = p.gapY - GAP/2;
          const botEdge = p.gapY + GAP/2;
          if (bird.y - r < topEdge || bird.y + r > botEdge) die();
        }
      }
      if (pipes.length && pipes[0].x < -PIPE_W - 10){
        pipes.shift();
        pipes.push(makePipe(pipes[pipes.length - 1].x + PIPE_SPACING));
      }
    }

    if (state === "dead") deadTimer += dt;

    // particles
    for (let i = particles.length - 1; i >= 0; i--){
      const q = particles[i];
      q.x += q.vx * dt; q.y += q.vy * dt;
      q.vy += (q.text ? 0 : 500) * dt;
      q.rot += q.spin * dt;
      q.a -= dt * (q.text ? 1.4 : 1.8);
      if (q.a <= 0) particles.splice(i, 1);
    }
  }

  // ---------- drawing ----------
  function rr(x, y, w, h, r){
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
  }

  function drawCloud(x, y, s){
    ctx.fillStyle = P.cloud;
    ctx.beginPath();
    ctx.arc(x, y, 16*s, 0, 7);
    ctx.arc(x + 16*s, y - 8*s, 13*s, 0, 7);
    ctx.arc(x + 32*s, y, 15*s, 0, 7);
    ctx.arc(x + 16*s, y + 6*s, 14*s, 0, 7);
    ctx.fill();
  }

  function drawHills(off, baseY, amp, colFill, step){
    ctx.fillStyle = colFill;
    ctx.beginPath();
    ctx.moveTo(-20, H);
    for (let x = -20; x <= W + 40; x += 4){
      const t = (x + off) / step;
      const y = baseY - (Math.sin(t) * 0.6 + Math.sin(t * 0.5 + 1.3) * 0.4) * amp;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W + 40, H);
    ctx.closePath();
    ctx.fill();
  }

  function drawStars(){
    if (nightT < 0.02) return;
    ctx.fillStyle = "#FFFFFF";
    for (const s of stars){
      const a = nightT * (0.35 + 0.65 * Math.abs(Math.sin(s.tw)));
      ctx.globalAlpha = a;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
      if (s.r > 1.3){
        ctx.globalAlpha = a * 0.35;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 2.6, 0, 7); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawSunMoon(){
    const cx = 72, cy = 84;
    // sun (fades out as night falls)
    if (nightT < 0.98){
      ctx.globalAlpha = 1 - nightT;
      ctx.fillStyle = P.sun;
      ctx.beginPath(); ctx.arc(cx, cy, 34, 0, 7); ctx.fill();
      ctx.fillStyle = withAlpha(P.sun, .45);
      ctx.beginPath(); ctx.arc(cx, cy, 46, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // moon (fades in as night falls)
    if (nightT > 0.02){
      ctx.globalAlpha = nightT;
      const hg = ctx.createRadialGradient(cx, cy, 18, cx, cy, 72);
      hg.addColorStop(0, "rgba(245,233,200,.35)");
      hg.addColorStop(1, "rgba(245,233,200,0)");
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(cx, cy, 72, 0, 7); ctx.fill();
      ctx.fillStyle = "#F5E9C8";
      ctx.beginPath(); ctx.arc(cx, cy, 30, 0, 7); ctx.fill();
      ctx.fillStyle = "rgba(150,140,110,.32)";
      ctx.beginPath(); ctx.arc(cx - 9, cy - 6, 5, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 8, cy + 5, 3.5, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 3, cy - 10, 2.5, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawFireflies(){
    if (nightT < 0.02) return;
    ctx.fillStyle = "#FFE08A";
    ctx.shadowColor = "#FFD66B";
    ctx.shadowBlur = 8;
    for (const f of fireflies){
      const a = nightT * (0.25 + 0.75 * Math.abs(Math.sin(f.ph)));
      ctx.globalAlpha = a;
      ctx.beginPath(); ctx.arc(f.x, f.y, 1.8, 0, 7); ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  function drawPipePair(p){
    const topH = p.gapY - GAP/2;
    const botY = p.gapY + GAP/2;
    const lipH = 26, lipOver = 6;

    for (const seg of [
      {y: -10, h: topH + 10, lipY: topH - lipH},
      {y: botY, h: GROUND_Y - botY + 10, lipY: botY},
    ]){
      // body
      ctx.fillStyle = P.pipe;
      rr(p.x, seg.y, PIPE_W, seg.h, 10); ctx.fill();
      // shading stripe
      ctx.fillStyle = P.pipeLite;
      rr(p.x + 8, seg.y + 4, 12, seg.h - 8, 6); ctx.fill();
      ctx.fillStyle = P.pipeDark;
      rr(p.x + PIPE_W - 14, seg.y + 4, 8, seg.h - 8, 4); ctx.fill();
      // lip
      ctx.fillStyle = P.pipe;
      rr(p.x - lipOver, seg.lipY, PIPE_W + lipOver*2, lipH, 12); ctx.fill();
      ctx.fillStyle = P.pipeLite;
      rr(p.x - lipOver + 6, seg.lipY + 4, 14, lipH - 8, 6); ctx.fill();
      ctx.strokeStyle = withAlpha(P.line, .18);
      ctx.lineWidth = 2.5;
      rr(p.x - lipOver, seg.lipY, PIPE_W + lipOver*2, lipH, 12); ctx.stroke();
      // night neon rim
      if (nightT > 0.02){
        ctx.strokeStyle = withAlpha(P.pipeLite, 0.55 * nightT);
        ctx.lineWidth = 2;
        rr(p.x - lipOver, seg.lipY, PIPE_W + lipOver*2, lipH, 12); ctx.stroke();
      }
    }
  }

  function drawBird(){
    // warm lantern glow against the night sky
    if (nightT > 0.02){
      ctx.globalAlpha = nightT * 0.5;
      const gg = ctx.createRadialGradient(bird.x, bird.y, 4, bird.x, bird.y, 34);
      gg.addColorStop(0, "rgba(255,214,107,.5)");
      gg.addColorStop(1, "rgba(255,214,107,0)");
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.arc(bird.x, bird.y, 34, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);

    const sq = bird.squash;
    ctx.scale(1 + sq * 0.14, 1 - sq * 0.18);

    // tail feathers
    ctx.fillStyle = P.birdDark;
    ctx.beginPath();
    ctx.ellipse(-16, 2, 8, 5, -0.35, 0, 7);
    ctx.fill();

    // body
    const g = ctx.createRadialGradient(-4, -7, 4, 0, 0, 22);
    g.addColorStop(0, "#FFE08A");
    g.addColorStop(0.45, P.bird);
    g.addColorStop(1, P.birdDark);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(0, 0, 18.5, 16.5, 0, 0, 7);
    ctx.fill();

    // belly
    ctx.fillStyle = "#FFF3D1";
    ctx.beginPath();
    ctx.ellipse(3, 6.5, 10, 7.5, 0, 0, 7);
    ctx.fill();

    // wing — flaps with animation phase
    const wingAng = Math.sin(bird.wing) * (0.5 + bird.wingBoost * 0.55);
    ctx.save();
    ctx.translate(-4, -1);
    ctx.rotate(wingAng);
    ctx.fillStyle = P.wing;
    ctx.beginPath();
    ctx.ellipse(-4, 4, 11, 7, 0.5, 0, 7);
    ctx.fill();
    ctx.strokeStyle = withAlpha(P.line, .14);
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // blush
    ctx.fillStyle = P.blush;
    ctx.globalAlpha = 0.75;
    ctx.beginPath();
    ctx.ellipse(6, 3, 4, 2.6, 0, 0, 7);
    ctx.fill();
    ctx.globalAlpha = 1;

    // eye
    const blink = (Math.sin(time * 1.1) > 0.985 || state === "dead") ? 1 : 0;
    if (state === "dead"){
      ctx.strokeStyle = P.ink;
      ctx.lineWidth = 2.4;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(5.5, -7.5); ctx.lineTo(11.5, -1.5);
      ctx.moveTo(11.5, -7.5); ctx.lineTo(5.5, -1.5);
      ctx.stroke();
    } else if (blink){
      ctx.strokeStyle = P.ink;
      ctx.lineWidth = 2.4;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(5, -4.5); ctx.lineTo(12, -4.5);
      ctx.stroke();
    } else {
      ctx.fillStyle = "#FFFFFF";
      ctx.beginPath(); ctx.arc(8.5, -4.5, 5.4, 0, 7); ctx.fill();
      ctx.fillStyle = P.ink;
      ctx.beginPath(); ctx.arc(9.8, -4.2, 3, 0, 7); ctx.fill();
      ctx.fillStyle = "#FFFFFF";
      ctx.beginPath(); ctx.arc(10.9, -5.3, 1.1, 0, 7); ctx.fill();
    }

    // beak
    ctx.fillStyle = P.beak;
    ctx.beginPath();
    ctx.moveTo(16, -2);
    ctx.quadraticCurveTo(26, 0.5, 16, 4.5);
    ctx.quadraticCurveTo(14, 1.2, 16, -2);
    ctx.fill();

    ctx.restore();
  }

  function drawScore(){
    ctx.textAlign = "center";
    if (state !== "dead"){
      ctx.font = "800 52px 'Baloo 2', sans-serif";
      ctx.fillStyle = withAlpha(P.line, .16);
      ctx.fillText(score, W/2, 96 + 4);
      if (nightT > 0.02){
        ctx.shadowColor = "rgba(255,225,140,.8)";
        ctx.shadowBlur = 14 * nightT;
      }
      ctx.fillStyle = "#FFFFFF";
      ctx.strokeStyle = withAlpha(P.line, .35);
      ctx.lineWidth = 6;
      ctx.strokeText(score, W/2, 96);
      ctx.fillText(score, W/2, 96);
      ctx.shadowBlur = 0;
    }
    if (state === "ready"){
      const a = 0.65 + Math.sin(time * 4) * 0.35;
      ctx.globalAlpha = a;
      ctx.font = "700 22px 'Baloo 2', sans-serif";
      ctx.fillStyle = P.prompt;
      ctx.fillText("tap or press space to flap", W/2, H * 0.66);
      ctx.globalAlpha = 1;
    }
  }

  function drawGameOver(){
    const t = clamp(deadTimer * 2.2 - 0.3, 0, 1);
    if (t <= 0) return;
    const ease = 1 - Math.pow(1 - t, 3);

    const dimA = (0.34 + 0.22 * nightT) * ease;
    ctx.fillStyle = `rgba(20,26,48,${dimA})`;
    ctx.fillRect(0, 0, W, H);

    const pw = 280, ph = 220;
    const px = (W - pw)/2;
    const py = lerp(H * 0.22, H * 0.27, ease);

    ctx.save();
    ctx.translate(0, (1 - ease) * -26);
    ctx.globalAlpha = ease;

    // card
    ctx.fillStyle = P.cardBg;
    ctx.strokeStyle = withAlpha(P.line, .22);
    ctx.lineWidth = 3;
    rr(px, py, pw, ph, 22); ctx.fill(); ctx.stroke();

    ctx.textAlign = "center";
    ctx.fillStyle = P.cardTitle;
    ctx.font = "800 30px 'Baloo 2', sans-serif";
    ctx.fillText("oh no, puff!", W/2, py + 46);

    // score row
    ctx.font = "600 15px 'Baloo 2', sans-serif";
    ctx.fillStyle = P.cardLabel;
    ctx.fillText("SCORE", W/2 - 62, py + 84);
    ctx.fillText("BEST",  W/2 + 62, py + 84);
    ctx.font = "800 38px 'Baloo 2', sans-serif";
    ctx.fillStyle = P.cardTitle;
    ctx.fillText(score, W/2 - 62, py + 124);
    ctx.fillText(best,  W/2 + 62, py + 124);

    // divider
    ctx.strokeStyle = withAlpha(P.line, .14);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W/2, py + 72); ctx.lineTo(W/2, py + 130);
    ctx.stroke();

    // restart button
    const by = py + 152, bw = 190, bh = 46;
    const pulse = 1 + Math.sin(time * 5) * 0.015;
    ctx.save();
    ctx.translate(W/2, by + bh/2);
    ctx.scale(pulse, pulse);
    if (nightT > 0.02){
      ctx.shadowColor = "rgba(255,138,92,.7)";
      ctx.shadowBlur = 16 * nightT;
    }
    ctx.fillStyle = P.beak;
    rr(-bw/2, -bh/2, bw, bh, 23); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "800 20px 'Baloo 2', sans-serif";
    ctx.fillText("flap again", 0, 7);
    ctx.restore();

    ctx.restore();
  }

  function draw(){
    // camera shake
    ctx.save();
    if (shake > 0){
      ctx.translate(rand(-1,1) * shake * 6, rand(-1,1) * shake * 6);
    }

    // sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, P.skyTop);
    sky.addColorStop(1, P.skyBot);
    ctx.fillStyle = sky;
    ctx.fillRect(-10, -10, W + 20, H + 20);

    drawStars();
    drawSunMoon();

    // clouds (thinning into subtle wisps at night)
    ctx.globalAlpha = 1 - 0.5 * nightT;
    for (const c of clouds) drawCloud(c.x, c.y, c.s);
    ctx.globalAlpha = 1;

    // hills (two parallax bands)
    drawHills(hillsFar.off,  GROUND_Y + 6, 46, P.hillFar, 90);
    drawHills(hillsNear.off, GROUND_Y + 10, 34, P.hillNear, 62);

    // bushes band
    drawHills(bushes.off, GROUND_Y + 14, 20, P.bush, 34);

    // pipes
    for (const p of pipes) drawPipePair(p);

    // ground
    ctx.fillStyle = P.ground;
    ctx.fillRect(-10, GROUND_Y, W + 20, GROUND_H + 10);
    ctx.fillStyle = P.groundTop;
    ctx.fillRect(-10, GROUND_Y, W + 20, 12);
    ctx.fillStyle = P.groundLine;
    for (let x = -48; x < W + 48; x += 48){
      const gx = x - ground.off;
      ctx.beginPath();
      ctx.ellipse(gx + 24, GROUND_Y + 30, 14, 4.5, 0, 0, 7);
      ctx.fill();
    }
    ctx.fillStyle = withAlpha(P.line, .10);
    ctx.fillRect(-10, GROUND_Y, W + 20, 3);

    drawFireflies();

    // particles
    for (const q of particles){
      ctx.globalAlpha = Math.max(q.a, 0);
      if (q.text){
        ctx.font = "800 20px 'Baloo 2', sans-serif";
        ctx.textAlign = "center";
        ctx.strokeStyle = withAlpha(P.line, .4);
        ctx.lineWidth = 4;
        ctx.strokeText(q.text, q.x, q.y);
        ctx.fillStyle = "#FFFFFF";
        ctx.fillText(q.text, q.x, q.y);
      } else {
        ctx.save();
        ctx.translate(q.x, q.y);
        ctx.rotate(q.rot);
        ctx.fillStyle = q.col;
        ctx.beginPath();
        ctx.ellipse(0, 0, q.r, q.r * 0.62, 0, 0, 7);
        ctx.fill();
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    drawBird();
    drawScore();
    if (state === "dead") drawGameOver();

    // hit flash
    if (flash > 0){
      ctx.fillStyle = `rgba(255,255,255,${flash * 0.55})`;
      ctx.fillRect(-10, -10, W + 20, H + 20);
    }

    ctx.restore();
  }

  // ---------- loop ----------
  let last = performance.now();
  function loop(now){
    const dt = Math.min((now - last) / 1000, 1/30);   // clamp for tab-switch spikes
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>

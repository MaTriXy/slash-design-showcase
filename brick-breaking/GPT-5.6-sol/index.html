<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Neon Breakout</title>
  <style>
    :root {
      color-scheme: dark;
      --cyan: #33f6ff;
      --pink: #ff3bd4;
      --violet: #8b5cff;
      --lime: #8dff7a;
      --bg: #03040c;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 20%, rgba(66, 39, 139, .23), transparent 34%),
        radial-gradient(circle at 15% 80%, rgba(0, 224, 255, .12), transparent 26%),
        linear-gradient(180deg, #080414 0%, #02030a 65%, #000 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    .shell {
      position: relative;
      width: min(100vw, 1000px);
      height: min(100vh, 700px);
      padding: 12px;
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid rgba(90, 238, 255, .34);
      border-radius: 20px;
      background: rgba(2, 4, 16, .72);
      box-shadow:
        0 0 40px rgba(0, 225, 255, .12),
        inset 0 0 40px rgba(131, 66, 255, .08);
      backdrop-filter: blur(12px);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: none;
    }

    .scanlines,
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scanlines {
      opacity: .18;
      background: repeating-linear-gradient(
        180deg,
        rgba(255,255,255,.03) 0,
        rgba(255,255,255,.03) 1px,
        transparent 1px,
        transparent 4px
      );
      mix-blend-mode: screen;
    }

    .vignette {
      box-shadow: inset 0 0 100px rgba(0,0,0,.78);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      color: rgba(220, 250, 255, .58);
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      .shell { padding: 0; width: 100vw; height: 100vh; }
      .frame { border-radius: 0; border: 0; }
      .hint { bottom: 12px; font-size: 9px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="frame">
      <canvas id="game" aria-label="Neon Breakout Game"></canvas>
      <div class="scanlines"></div>
      <div class="vignette"></div>
      <div class="hint">Move with mouse, touch, arrows, or A/D · Click / tap / space to launch</div>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        running: false,
        started: false,
        gameOver: false,
        levelCleared: false,
        score: 0,
        lives: 3,
        level: 1,
        lastTime: 0,
        shake: 0,
        pointerX: null,
        flash: 0,
      };

      const palette = ['#33f6ff', '#ff3bd4', '#8b5cff', '#8dff7a', '#ff9d3b'];
      const particles = [];
      const trail = [];
      const stars = [];
      const keys = { left: false, right: false };
      let bricks = [];

      const paddle = {
        x: 0,
        y: 0,
        width: 150,
        height: 18,
        targetX: 0,
        glow: 0,
      };

      const ball = {
        x: 0,
        y: 0,
        radius: 8,
        vx: 0,
        vy: 0,
        speed: 560,
        stuck: true,
      };

      function resize() {
        const rect = canvas.getBoundingClientRect();
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(rect.width * state.dpr);
        canvas.height = Math.round(rect.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        state.width = rect.width;
        state.height = rect.height;

        paddle.width = Math.max(100, Math.min(165, state.width * 0.17));
        paddle.height = Math.max(14, Math.min(20, state.height * 0.028));
        paddle.y = state.height - Math.max(62, state.height * 0.085);
        paddle.x = Math.min(Math.max(0, paddle.x), state.width - paddle.width);
        paddle.targetX = paddle.x;

        if (!state.started || ball.stuck) resetBall();
        buildStars();
        if (!bricks.length || state.gameOver) buildLevel();
      }

      function buildStars() {
        stars.length = 0;
        const count = Math.max(55, Math.floor(state.width * state.height / 9000));
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * state.width,
            y: Math.random() * state.height,
            r: Math.random() * 1.4 + 0.25,
            a: Math.random() * 0.6 + 0.15,
            s: Math.random() * 10 + 4,
          });
        }
      }

      function buildLevel() {
        bricks = [];
        const cols = state.width < 560 ? 7 : 10;
        const rows = Math.min(8, 5 + state.level);
        const side = Math.max(18, state.width * 0.04);
        const gap = Math.max(5, state.width * 0.007);
        const top = Math.max(90, state.height * 0.15);
        const brickW = (state.width - side * 2 - gap * (cols - 1)) / cols;
        const brickH = Math.max(20, Math.min(32, state.height * 0.045));

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const color = palette[(row + col * 2) % palette.length];
            const armored = state.level > 1 && Math.random() < Math.min(0.22, state.level * 0.04);
            bricks.push({
              x: side + col * (brickW + gap),
              y: top + row * (brickH + gap),
              width: brickW,
              height: brickH,
              color,
              hp: armored ? 2 : 1,
              maxHp: armored ? 2 : 1,
              alive: true,
              pulse: Math.random() * Math.PI * 2,
            });
          }
        }
      }

      function resetBall() {
        ball.stuck = true;
        ball.radius = Math.max(7, Math.min(10, state.width * 0.009));
        ball.x = paddle.x + paddle.width / 2;
        ball.y = paddle.y - ball.radius - 8;
        ball.vx = 0;
        ball.vy = 0;
        trail.length = 0;
      }

      function launchBall() {
        if (state.gameOver) {
          restartGame();
          return;
        }
        if (!state.started) {
          state.started = true;
          state.running = true;
        }
        if (ball.stuck) {
          const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.75;
          ball.vx = Math.cos(angle) * ball.speed;
          ball.vy = Math.sin(angle) * ball.speed;
          ball.stuck = false;
        }
      }

      function restartGame() {
        state.score = 0;
        state.lives = 3;
        state.level = 1;
        state.gameOver = false;
        state.levelCleared = false;
        state.started = true;
        state.running = true;
        particles.length = 0;
        trail.length = 0;
        buildLevel();
        paddle.x = state.width / 2 - paddle.width / 2;
        paddle.targetX = paddle.x;
        resetBall();
      }

      function spawnParticles(x, y, color, count = 16, force = 1) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = (Math.random() * 220 + 70) * force;
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: Math.random() * 0.5 + 0.45,
            maxLife: 1,
            size: Math.random() * 3.6 + 1.2,
            color,
            drag: 0.96,
          });
        }
      }

      function loseLife() {
        state.lives--;
        spawnParticles(ball.x, state.height - 20, '#ff477e', 28, 1.25);
        state.shake = 15;
        state.flash = 0.65;

        if (state.lives <= 0) {
          state.gameOver = true;
          state.running = false;
          ball.stuck = true;
        } else {
          resetBall();
        }
      }

      function nextLevel() {
        state.level++;
        state.score += 500;
        state.levelCleared = true;
        state.running = false;
        spawnParticles(state.width / 2, state.height / 2, '#8dff7a', 80, 1.4);
        setTimeout(() => {
          if (state.gameOver) return;
          state.levelCleared = false;
          buildLevel();
          ball.speed = Math.min(830, 560 + state.level * 38);
          resetBall();
          state.running = true;
        }, 900);
      }

      function circleRectCollision(cx, cy, radius, rect) {
        const nearestX = Math.max(rect.x, Math.min(cx, rect.x + rect.width));
        const nearestY = Math.max(rect.y, Math.min(cy, rect.y + rect.height));
        const dx = cx - nearestX;
        const dy = cy - nearestY;
        return dx * dx + dy * dy <= radius * radius;
      }

      function update(dt) {
        stars.forEach(star => {
          star.y += star.s * dt;
          if (star.y > state.height) {
            star.y = -2;
            star.x = Math.random() * state.width;
          }
        });

        const keyboardDirection = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
        if (keyboardDirection !== 0) {
          const keyboardSpeed = Math.max(620, state.width * 0.9);
          paddle.targetX += keyboardDirection * keyboardSpeed * dt;
        }

        paddle.targetX = Math.max(0, Math.min(state.width - paddle.width, paddle.targetX));
        paddle.x += (paddle.targetX - paddle.x) * Math.min(1, dt * 18);
        paddle.x = Math.max(0, Math.min(state.width - paddle.width, paddle.x));
        paddle.glow += dt * 4;

        if (ball.stuck) {
          ball.x = paddle.x + paddle.width / 2;
          ball.y = paddle.y - ball.radius - 8;
        }

        if (state.running && !ball.stuck && !state.gameOver && !state.levelCleared) {
          const steps = Math.max(1, Math.ceil(dt / (1 / 120)));
          const step = dt / steps;

          for (let s = 0; s < steps; s++) {
            ball.x += ball.vx * step;
            ball.y += ball.vy * step;

            if (ball.x - ball.radius <= 0) {
              ball.x = ball.radius;
              ball.vx = Math.abs(ball.vx);
              state.shake = Math.max(state.shake, 3);
            } else if (ball.x + ball.radius >= state.width) {
              ball.x = state.width - ball.radius;
              ball.vx = -Math.abs(ball.vx);
              state.shake = Math.max(state.shake, 3);
            }

            if (ball.y - ball.radius <= 0) {
              ball.y = ball.radius;
              ball.vy = Math.abs(ball.vy);
              state.shake = Math.max(state.shake, 3);
            }

            if (ball.y - ball.radius > state.height) {
              loseLife();
              break;
            }

            if (ball.vy > 0 && circleRectCollision(ball.x, ball.y, ball.radius, paddle)) {
              ball.y = paddle.y - ball.radius - 0.5;
              const hit = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
              const maxAngle = Math.PI * 0.39;
              const angle = -Math.PI / 2 + hit * maxAngle;
              const speed = Math.min(860, Math.hypot(ball.vx, ball.vy) * 1.015);
              ball.vx = Math.cos(angle) * speed;
              ball.vy = Math.sin(angle) * speed;
              spawnParticles(ball.x, paddle.y, '#33f6ff', 9, 0.65);
            }

            for (const brick of bricks) {
              if (!brick.alive || !circleRectCollision(ball.x, ball.y, ball.radius, brick)) continue;

              const prevX = ball.x - ball.vx * step;
              const prevY = ball.y - ball.vy * step;
              const fromLeft = prevX + ball.radius <= brick.x;
              const fromRight = prevX - ball.radius >= brick.x + brick.width;
              const fromTop = prevY + ball.radius <= brick.y;
              const fromBottom = prevY - ball.radius >= brick.y + brick.height;

              if (fromLeft || fromRight) ball.vx *= -1;
              else if (fromTop || fromBottom) ball.vy *= -1;
              else ball.vy *= -1;

              brick.hp--;
              state.score += brick.hp <= 0 ? 100 : 35;
              spawnParticles(ball.x, ball.y, brick.color, brick.hp <= 0 ? 22 : 10, brick.hp <= 0 ? 1 : 0.55);
              state.shake = brick.hp <= 0 ? 7 : 3;
              state.flash = Math.max(state.flash, brick.hp <= 0 ? 0.18 : 0.08);
              if (brick.hp <= 0) brick.alive = false;
              break;
            }
          }

          trail.push({ x: ball.x, y: ball.y, life: 0.42 });
          if (trail.length > 24) trail.shift();

          if (bricks.every(brick => !brick.alive)) nextLevel();
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.life -= dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vx *= Math.pow(p.drag, dt * 60);
          p.vy *= Math.pow(p.drag, dt * 60);
          p.vy += 120 * dt;
          if (p.life <= 0) particles.splice(i, 1);
        }

        for (let i = trail.length - 1; i >= 0; i--) {
          trail[i].life -= dt;
          if (trail[i].life <= 0) trail.splice(i, 1);
        }

        state.shake = Math.max(0, state.shake - dt * 28);
        state.flash = Math.max(0, state.flash - dt * 1.7);
      }

      function neonRect(x, y, w, h, color, alpha = 1, blur = 14, radius = 5) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.shadowColor = color;
        ctx.shadowBlur = blur;
        ctx.fillStyle = color;
        roundRect(ctx, x, y, w, h, radius);
        ctx.fill();
        ctx.restore();
      }

      function roundRect(context, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
      }

      function drawBackground(time) {
        ctx.fillStyle = '#02030b';
        ctx.fillRect(0, 0, state.width, state.height);

        const glow = ctx.createRadialGradient(
          state.width * 0.5,
          state.height * 0.25,
          0,
          state.width * 0.5,
          state.height * 0.35,
          state.width * 0.65
        );
        glow.addColorStop(0, 'rgba(108, 57, 255, .18)');
        glow.addColorStop(0.42, 'rgba(0, 234, 255, .07)');
        glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, state.width, state.height);

        for (const star of stars) {
          ctx.globalAlpha = star.a * (0.75 + Math.sin(time * 0.0015 + star.x) * 0.25);
          ctx.fillStyle = '#d9fbff';
          ctx.fillRect(star.x, star.y, star.r, star.r);
        }
        ctx.globalAlpha = 1;

        ctx.save();
        ctx.strokeStyle = 'rgba(51, 246, 255, .06)';
        ctx.lineWidth = 1;
        const spacing = 44;
        const horizon = state.height * 0.72;
        for (let x = -state.height; x < state.width + state.height; x += spacing) {
          ctx.beginPath();
          ctx.moveTo(state.width / 2 + (x - state.width / 2) * 0.18, horizon);
          ctx.lineTo(x, state.height);
          ctx.stroke();
        }
        for (let y = horizon; y < state.height; y += 22) {
          const t = (y - horizon) / (state.height - horizon);
          const curveY = horizon + t * t * (state.height - horizon);
          ctx.beginPath();
          ctx.moveTo(0, curveY);
          ctx.lineTo(state.width, curveY);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBricks(time) {
        bricks.forEach(brick => {
          if (!brick.alive) return;
          const pulse = 0.85 + Math.sin(time * 0.003 + brick.pulse) * 0.15;
          ctx.save();
          ctx.shadowColor = brick.color;
          ctx.shadowBlur = 18 * pulse;
          ctx.fillStyle = brick.maxHp > 1 && brick.hp > 1 ? 'rgba(255,255,255,.20)' : brick.color;
          ctx.globalAlpha = 0.82;
          roundRect(ctx, brick.x, brick.y, brick.width, brick.height, 4);
          ctx.fill();

          const grad = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.height);
          grad.addColorStop(0, 'rgba(255,255,255,.78)');
          grad.addColorStop(0.25, brick.color);
          grad.addColorStop(1, 'rgba(0,0,0,.35)');
          ctx.globalAlpha = 0.5;
          ctx.fillStyle = grad;
          roundRect(ctx, brick.x + 2, brick.y + 2, brick.width - 4, brick.height - 4, 3);
          ctx.fill();

          ctx.globalAlpha = 0.8;
          ctx.strokeStyle = 'rgba(255,255,255,.75)';
          ctx.lineWidth = 1;
          roundRect(ctx, brick.x + 0.5, brick.y + 0.5, brick.width - 1, brick.height - 1, 4);
          ctx.stroke();
          ctx.restore();
        });
      }

      function drawPaddle(time) {
        const pulse = 0.8 + Math.sin(time * 0.006) * 0.2;
        ctx.save();
        ctx.shadowColor = '#33f6ff';
        ctx.shadowBlur = 24 + pulse * 12;
        const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.width, paddle.y);
        grad.addColorStop(0, '#ff3bd4');
        grad.addColorStop(0.5, '#f4ffff');
        grad.addColorStop(1, '#33f6ff');
        ctx.fillStyle = grad;
        roundRect(ctx, paddle.x, paddle.y, paddle.width, paddle.height, paddle.height / 2);
        ctx.fill();
        ctx.globalAlpha = 0.55;
        ctx.fillStyle = '#ffffff';
        roundRect(ctx, paddle.x + 10, paddle.y + 3, paddle.width - 20, 3, 2);
        ctx.fill();
        ctx.restore();
      }

      function drawBall() {
        trail.forEach((point, i) => {
          const alpha = (point.life / 0.42) * (i / Math.max(1, trail.length));
          ctx.save();
          ctx.globalAlpha = alpha * 0.55;
          ctx.shadowColor = '#33f6ff';
          ctx.shadowBlur = 16;
          ctx.fillStyle = i % 2 ? '#33f6ff' : '#ff3bd4';
          ctx.beginPath();
          ctx.arc(point.x, point.y, ball.radius * alpha * 0.85, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });

        ctx.save();
        ctx.shadowColor = '#b8fdff';
        ctx.shadowBlur = 28;
        const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, ball.radius * 1.4);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.35, '#9ffcff');
        grad.addColorStop(1, '#7a5cff');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        particles.forEach(p => {
          const alpha = Math.max(0, p.life / p.maxLife);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 14;
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
          ctx.restore();
        });
      }

      function drawHud() {
        ctx.save();
        ctx.font = '700 15px Inter, sans-serif';
        ctx.textBaseline = 'top';
        ctx.fillStyle = '#dffcff';
        ctx.shadowColor = '#33f6ff';
        ctx.shadowBlur = 12;
        ctx.fillText(`SCORE ${String(state.score).padStart(6, '0')}`, 24, 20);

        const levelText = `LEVEL ${state.level}`;
        const levelWidth = ctx.measureText(levelText).width;
        ctx.fillStyle = '#e9dcff';
        ctx.shadowColor = '#8b5cff';
        ctx.fillText(levelText, state.width / 2 - levelWidth / 2, 20);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#ffe4f8';
        ctx.shadowColor = '#ff3bd4';
        ctx.fillText(`LIVES ${'◆'.repeat(Math.max(0, state.lives))}`, state.width - 24, 20);
        ctx.restore();
      }

      function drawOverlay() {
        if (state.started && !state.gameOver && !state.levelCleared) return;

        ctx.save();
        ctx.fillStyle = 'rgba(0, 2, 10, .54)';
        ctx.fillRect(0, 0, state.width, state.height);

        const title = state.gameOver ? 'SYSTEM FAILURE' : state.levelCleared ? 'SECTOR CLEARED' : 'NEON BREAKOUT';
        const subtitle = state.gameOver
          ? `FINAL SCORE ${state.score}`
          : state.levelCleared
            ? `ENTERING LEVEL ${state.level + 1}`
            : 'BREAK THE GRID. KEEP THE SIGNAL ALIVE.';
        const action = state.gameOver ? 'CLICK / TAP / SPACE TO RESTART' : 'CLICK / TAP / SPACE TO START';

        const titleSize = Math.max(38, Math.min(82, state.width * 0.08));
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `900 ${titleSize}px Inter, sans-serif`;
        ctx.shadowColor = state.gameOver ? '#ff477e' : '#33f6ff';
        ctx.shadowBlur = 28;
        const gradient = ctx.createLinearGradient(state.width * 0.25, 0, state.width * 0.75, 0);
        gradient.addColorStop(0, state.gameOver ? '#ff477e' : '#ff3bd4');
        gradient.addColorStop(0.5, '#ffffff');
        gradient.addColorStop(1, state.gameOver ? '#ff9d3b' : '#33f6ff');
        ctx.fillStyle = gradient;
        ctx.fillText(title, state.width / 2, state.height * 0.42);

        ctx.shadowBlur = 12;
        ctx.font = '700 14px Inter, sans-serif';
        ctx.fillStyle = 'rgba(229, 249, 255, .82)';
        ctx.fillText(subtitle, state.width / 2, state.height * 0.53);

        if (!state.levelCleared) {
          const boxW = Math.min(360, state.width * 0.72);
          const boxH = 52;
          const boxX = state.width / 2 - boxW / 2;
          const boxY = state.height * 0.61;
          ctx.shadowColor = state.gameOver ? '#ff477e' : '#8b5cff';
          ctx.shadowBlur = 24;
          ctx.fillStyle = 'rgba(7, 6, 24, .86)';
          ctx.strokeStyle = state.gameOver ? '#ff477e' : '#8b5cff';
          ctx.lineWidth = 1.5;
          roundRect(ctx, boxX, boxY, boxW, boxH, 12);
          ctx.fill();
          ctx.stroke();
          ctx.shadowBlur = 10;
          ctx.font = '800 12px Inter, sans-serif';
          ctx.fillStyle = '#ffffff';
          ctx.fillText(action, state.width / 2, boxY + boxH / 2);
        }
        ctx.restore();
      }

      function render(time) {
        ctx.save();
        const sx = state.shake ? (Math.random() - 0.5) * state.shake : 0;
        const sy = state.shake ? (Math.random() - 0.5) * state.shake : 0;
        ctx.translate(sx, sy);
        drawBackground(time);
        drawBricks(time);
        drawParticles();
        drawPaddle(time);
        drawBall();
        drawHud();
        drawOverlay();
        ctx.restore();

        if (state.flash > 0) {
          ctx.save();
          ctx.globalAlpha = state.flash;
          ctx.fillStyle = '#dffcff';
          ctx.fillRect(0, 0, state.width, state.height);
          ctx.restore();
        }
      }

      function loop(time) {
        const dt = Math.min(0.033, (time - state.lastTime) / 1000 || 0);
        state.lastTime = time;
        update(dt);
        render(time);
        requestAnimationFrame(loop);
      }

      function movePointer(clientX) {
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        state.pointerX = x;
        paddle.targetX = x - paddle.width / 2;
      }

      canvas.addEventListener('pointermove', event => {
        movePointer(event.clientX);
      });

      canvas.addEventListener('pointerdown', event => {
        movePointer(event.clientX);
        launchBall();
      });

      canvas.addEventListener('touchmove', event => {
        if (event.touches[0]) movePointer(event.touches[0].clientX);
        event.preventDefault();
      }, { passive: false });

      window.addEventListener('keydown', event => {
        if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'Space', 'Enter'].includes(event.code)) {
          event.preventDefault();
        }

        if (event.code === 'Space' || event.code === 'Enter') {
          if (!event.repeat) launchBall();
        }
        if (event.code === 'ArrowLeft' || event.code === 'KeyA') keys.left = true;
        if (event.code === 'ArrowRight' || event.code === 'KeyD') keys.right = true;
      });

      window.addEventListener('keyup', event => {
        if (event.code === 'ArrowLeft' || event.code === 'KeyA') keys.left = false;
        if (event.code === 'ArrowRight' || event.code === 'KeyD') keys.right = false;
      });

      window.addEventListener('resize', resize);
      window.addEventListener('blur', () => {
        keys.left = false;
        keys.right = false;
        if (!ball.stuck && !state.gameOver) state.running = false;
      });
      window.addEventListener('focus', () => {
        if (state.started && !state.gameOver && !state.levelCleared) state.running = true;
      });

      paddle.x = 320;
      resize();
      paddle.x = state.width / 2 - paddle.width / 2;
      paddle.targetX = paddle.x;
      resetBall();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>

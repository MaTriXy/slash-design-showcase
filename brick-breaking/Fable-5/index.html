<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEON BREAKOUT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #06060f;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    position: relative;
    width: 800px;
    height: 500px;
  }

  canvas {
    display: block;
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse at 50% 0%, #0d0d24 0%, #06060f 70%);
    border-radius: 12px;
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.06),
      0 0 60px rgba(0, 229, 255, 0.10),
      0 0 120px rgba(255, 0, 200, 0.06);
    cursor: none;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: rgba(6, 6, 15, 0.72);
    backdrop-filter: blur(6px);
    border-radius: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    text-align: center;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .title {
    font-size: 52px;
    font-weight: bold;
    letter-spacing: 10px;
    color: #fff;
    text-shadow:
      0 0 8px #00e5ff,
      0 0 24px #00e5ff,
      0 0 60px rgba(0, 229, 255, 0.6);
    animation: pulse 2.2s ease-in-out infinite;
  }
  .title .pink {
    text-shadow:
      0 0 8px #ff2ed1,
      0 0 24px #ff2ed1,
      0 0 60px rgba(255, 46, 209, 0.6);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.75; }
  }

  .subtitle {
    color: rgba(255, 255, 255, 0.55);
    font-size: 14px;
    letter-spacing: 3px;
  }

  .big-score {
    font-size: 28px;
    color: #ffe94a;
    text-shadow: 0 0 12px rgba(255, 233, 74, 0.8);
    letter-spacing: 4px;
  }

  button {
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 4px;
    padding: 14px 42px;
    background: transparent;
    color: #00e5ff;
    border: 2px solid #00e5ff;
    border-radius: 8px;
    cursor: pointer;
    text-shadow: 0 0 8px rgba(0, 229, 255, 0.8);
    box-shadow: 0 0 16px rgba(0, 229, 255, 0.25), inset 0 0 16px rgba(0, 229, 255, 0.08);
    transition: all 0.2s ease;
  }
  button:hover {
    background: rgba(0, 229, 255, 0.12);
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.5), inset 0 0 24px rgba(0, 229, 255, 0.15);
    transform: translateY(-2px);
  }
  button:active { transform: translateY(0); }
</style>
</head>
<body>
<div class="stage">
  <canvas id="game" width="800" height="500"></canvas>

  <div class="overlay show" id="startScreen">
    <div class="title">NEON <span class="pink">BREAKOUT</span></div>
    <div class="subtitle">MOVE MOUSE TO CONTROL &middot; BREAK EVERYTHING</div>
    <button id="startBtn">START</button>
  </div>

  <div class="overlay" id="gameOverScreen">
    <div class="title" id="endTitle">GAME OVER</div>
    <div class="big-score" id="finalScore">SCORE 0</div>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const endTitle = document.getElementById('endTitle');
  const finalScore = document.getElementById('finalScore');

  // ---------- State ----------
  const S = { MENU: 0, PLAY: 1, SERVE: 2, OVER: 3 };
  let state = S.MENU;
  let score = 0, lives = 3, level = 1;
  let shake = 0;

  // ---------- Paddle ----------
  const paddle = { w: 120, h: 14, x: W / 2 - 60, y: H - 36, targetX: W / 2 - 60 };

  // ---------- Ball ----------
  const ball = { x: W / 2, y: H - 60, r: 8, vx: 0, vy: 0, speed: 6, trail: [] };

  // ---------- Bricks ----------
  const ROWS = 6, COLS = 12;
  const BRICK_W = 58, BRICK_H = 20, GAP = 6;
  const OFFSET_X = (W - (COLS * (BRICK_W + GAP) - GAP)) / 2;
  const OFFSET_Y = 54;
  const ROW_COLORS = ['#ff2ed1', '#ff5e3a', '#ffe94a', '#3aff8c', '#00e5ff', '#8a5cff'];
  let bricks = [];

  function buildBricks() {
    bricks = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        bricks.push({
          x: OFFSET_X + c * (BRICK_W + GAP),
          y: OFFSET_Y + r * (BRICK_H + GAP),
          w: BRICK_W, h: BRICK_H,
          color: ROW_COLORS[r],
          alive: true,
          points: (ROWS - r) * 10,
          wobble: 0
        });
      }
    }
  }

  // ---------- Particles ----------
  let particles = [];
  function burst(x, y, color, count = 14, power = 5) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = (0.5 + Math.random()) * power;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        size: 2 + Math.random() * 3,
        color
      });
    }
  }

  // Floating score popups
  let popups = [];
  function popup(x, y, text, color) {
    popups.push({ x, y, text, color, life: 1 });
  }

  // Ambient background stars
  const stars = Array.from({ length: 60 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.4 + 0.3,
    tw: Math.random() * Math.PI * 2,
    sp: 0.4 + Math.random() * 0.8
  }));

  // ---------- Input ----------
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    paddle.targetX = Math.min(Math.max(mx - paddle.w / 2, 8), W - paddle.w - 8);
  });
  canvas.addEventListener('click', () => {
    if (state === S.SERVE) launchBall();
  });

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);

  function startGame() {
    score = 0; lives = 3; level = 1;
    buildBricks();
    particles = []; popups = [];
    startScreen.classList.remove('show');
    gameOverScreen.classList.remove('show');
    resetBall();
  }

  function resetBall() {
    state = S.SERVE;
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 2;
    ball.vx = 0; ball.vy = 0;
    ball.trail = [];
  }

  function launchBall() {
    state = S.PLAY;
    const angle = -Math.PI / 2 + (Math.random() * 0.6 - 0.3);
    const sp = ball.speed + (level - 1) * 0.6;
    ball.vx = Math.cos(angle) * sp;
    ball.vy = Math.sin(angle) * sp;
  }

  function endGame(won) {
    state = S.OVER;
    endTitle.textContent = won ? 'YOU WIN!' : 'GAME OVER';
    endTitle.style.textShadow = won
      ? '0 0 8px #3aff8c, 0 0 24px #3aff8c, 0 0 60px rgba(58,255,140,0.6)'
      : '0 0 8px #ff2ed1, 0 0 24px #ff2ed1, 0 0 60px rgba(255,46,209,0.6)';
    finalScore.textContent = 'SCORE ' + score;
    gameOverScreen.classList.add('show');
  }

  // ---------- Update ----------
  function update() {
    // Smooth paddle glide
    paddle.x += (paddle.targetX - paddle.x) * 0.35;

    // Twinkle stars
    for (const s of stars) s.tw += 0.03 * s.sp;

    if (state === S.SERVE) {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - ball.r - 2;
    }

    if (state === S.PLAY) {
      ball.x += ball.vx;
      ball.y += ball.vy;

      // trail
      ball.trail.push({ x: ball.x, y: ball.y });
      if (ball.trail.length > 12) ball.trail.shift();

      // walls
      if (ball.x < ball.r + 4) { ball.x = ball.r + 4; ball.vx *= -1; burst(ball.x, ball.y, '#00e5ff', 5, 3); }
      if (ball.x > W - ball.r - 4) { ball.x = W - ball.r - 4; ball.vx *= -1; burst(ball.x, ball.y, '#00e5ff', 5, 3); }
      if (ball.y < ball.r + 4) { ball.y = ball.r + 4; ball.vy *= -1; burst(ball.x, ball.y, '#00e5ff', 5, 3); }

      // paddle
      if (ball.vy > 0 &&
          ball.y + ball.r >= paddle.y &&
          ball.y + ball.r <= paddle.y + paddle.h + 10 &&
          ball.x >= paddle.x - ball.r &&
          ball.x <= paddle.x + paddle.w + ball.r) {
        const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2); // -1 .. 1
        const angle = hit * (Math.PI / 3); // up to 60°
        const sp = Math.hypot(ball.vx, ball.vy);
        ball.vx = Math.sin(angle) * sp;
        ball.vy = -Math.abs(Math.cos(angle) * sp);
        ball.y = paddle.y - ball.r - 1;
        burst(ball.x, paddle.y, '#00e5ff', 8, 3.5);
      }

      // lost ball
      if (ball.y > H + 30) {
        lives--;
        shake = 12;
        burst(ball.x, H - 10, '#ff2ed1', 24, 6);
        if (lives <= 0) { endGame(false); }
        else resetBall();
      }

      // bricks
      for (const b of bricks) {
        if (!b.alive) continue;
        if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
            ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
          b.alive = false;
          score += b.points;
          shake = Math.max(shake, 4);
          burst(ball.x, ball.y, b.color, 16, 5);
          popup(b.x + b.w / 2, b.y, '+' + b.points, b.color);

          // reflect on shallowest overlap
          const overlapX = Math.min(ball.x + ball.r - b.x, b.x + b.w - (ball.x - ball.r));
          const overlapY = Math.min(ball.y + ball.r - b.y, b.y + b.h - (ball.y - ball.r));
          if (overlapX < overlapY) ball.vx *= -1;
          else ball.vy *= -1;

          // tiny speed up
          const sp = Math.min(Math.hypot(ball.vx, ball.vy) * 1.008, 11);
          const ang = Math.atan2(ball.vy, ball.vx);
          ball.vx = Math.cos(ang) * sp;
          ball.vy = Math.sin(ang) * sp;
          break;
        }
      }

      if (bricks.every(b => !b.alive)) endGame(true);
    }

    // particles
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.vx *= 0.98;
      p.life -= p.decay;
    }
    particles = particles.filter(p => p.life > 0);

    // popups
    for (const t of popups) { t.y -= 0.8; t.life -= 0.02; }
    popups = popups.filter(t => t.life > 0);

    if (shake > 0) shake *= 0.85;
    if (shake < 0.3) shake = 0;
  }

  // ---------- Draw ----------
  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }

    // stars
    for (const s of stars) {
      const a = 0.25 + 0.5 * (0.5 + 0.5 * Math.sin(s.tw));
      ctx.fillStyle = `rgba(180, 220, 255, ${a})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // bricks
    for (const b of bricks) {
      if (!b.alive) continue;
      ctx.save();
      ctx.shadowColor = b.color;
      ctx.shadowBlur = 14;
      ctx.fillStyle = b.color;
      roundRect(b.x, b.y, b.w, b.h, 5);
      ctx.fill();
      // inner shine
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      roundRect(b.x + 3, b.y + 3, b.w - 6, 5, 3);
      ctx.fill();
      ctx.restore();
    }

    // ball trail
    for (let i = 0; i < ball.trail.length; i++) {
      const t = ball.trail[i];
      const f = i / ball.trail.length;
      ctx.fillStyle = `rgba(0, 229, 255, ${f * 0.35})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.r * f, 0, Math.PI * 2);
      ctx.fill();
    }

    // ball
    ctx.save();
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 20;
    const g = ctx.createRadialGradient(ball.x - 2, ball.y - 3, 1, ball.x, ball.y, ball.r);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(1, '#00e5ff');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // paddle
    ctx.save();
    ctx.shadowColor = '#ff2ed1';
    ctx.shadowBlur = 22;
    const pg = ctx.createLinearGradient(paddle.x, 0, paddle.x + paddle.w, 0);
    pg.addColorStop(0, '#8a5cff');
    pg.addColorStop(0.5, '#ff2ed1');
    pg.addColorStop(1, '#8a5cff');
    ctx.fillStyle = pg;
    roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    roundRect(paddle.x + 6, paddle.y + 3, paddle.w - 12, 4, 2);
    ctx.fill();
    ctx.restore();

    // particles
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // score popups
    ctx.textAlign = 'center';
    ctx.font = 'bold 14px "Courier New", monospace';
    for (const t of popups) {
      ctx.save();
      ctx.globalAlpha = Math.max(t.life, 0);
      ctx.shadowColor = t.color;
      ctx.shadowBlur = 8;
      ctx.fillStyle = t.color;
      ctx.fillText(t.text, t.x, t.y);
      ctx.restore();
    }

    // HUD
    ctx.save();
    ctx.font = 'bold 16px "Courier New", monospace';
    ctx.textAlign = 'left';
    ctx.shadowColor = '#ffe94a';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffe94a';
    ctx.fillText('SCORE ' + score, 16, 30);

    // lives as glowing hearts
    ctx.textAlign = 'right';
    ctx.shadowColor = '#ff2ed1';
    ctx.fillStyle = '#ff2ed1';
    let hearts = '';
    for (let i = 0; i < lives; i++) hearts += '\u2665 ';
    ctx.fillText(hearts.trim(), W - 16, 30);
    ctx.restore();

    // serve hint
    if (state === S.SERVE) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = '14px "Courier New", monospace';
      const a = 0.5 + 0.5 * Math.sin(performance.now() / 300);
      ctx.fillStyle = `rgba(255, 255, 255, ${0.35 + a * 0.45})`;
      ctx.shadowColor = '#00e5ff';
      ctx.shadowBlur = 6;
      ctx.fillText('CLICK TO LAUNCH', W / 2, H / 2 + 60);
      ctx.restore();
    }

    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---------- Loop ----------
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  buildBricks();
  loop();
})();
</script>
</body>
</html>

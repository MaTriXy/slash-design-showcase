<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Breakout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050510;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; cursor: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 800;
const H = 500;
canvas.width = W;
canvas.height = H;

// ── Game State ──────────────────────────────
const STATE = { START: 0, PLAYING: 1, LIFE_LOST: 2, GAME_OVER: 3, WIN: 4 };
let state = STATE.START;
let score = 0;
let lives = 3;
let level = 1;

// ── Paddle ──────────────────────────────────
const paddle = { w: 120, h: 14, x: 0, y: H - 40, vx: 0 };
let mouseX = W / 2;

// ── Ball ────────────────────────────────────
const ball = { x: 0, y: 0, r: 6, dx: 0, dy: 0, speed: 5, attached: true };
let ballTrail = [];

// ── Bricks ──────────────────────────────────
const brickRows = 7;
const brickCols = 12;
const brickW = 56;
const brickH = 18;
const brickPad = 6;
const brickOffsetTop = 60;
const brickOffsetLeft = (W - (brickCols * (brickW + brickPad) - brickPad)) / 2;
let bricks = [];

// ── Particles ───────────────────────────────
let particles = [];

// ── Stars (background) ──────────────────────
let stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5 + 0.5, a: Math.random(), twinkle: Math.random() * 0.02 + 0.005 });
}

// ── Neon Colors ─────────────────────────────
const neonColors = [
  '#ff2d95', // hot pink
  '#ff6b35', // orange
  '#ffd700', // gold
  '#39ff14', // neon green
  '#00ffff', // cyan
  '#bf5fff', // purple
  '#ff1493', // deep pink
];

function glowColor(hex, alpha = 1) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Init Bricks ─────────────────────────────
function initBricks() {
  bricks = [];
  for (let r = 0; r < brickRows; r++) {
    bricks[r] = [];
    for (let c = 0; c < brickCols; c++) {
      bricks[r][c] = {
        x: brickOffsetLeft + c * (brickW + brickPad),
        y: brickOffsetTop + r * (brickH + brickPad),
        w: brickW,
        h: brickH,
        alive: true,
        color: neonColors[r % neonColors.length],
        hp: r < 2 ? 2 : 1,
      };
    }
  }
}

// ── Reset Ball ──────────────────────────────
function resetBall() {
  ball.attached = true;
  ball.x = paddle.x + paddle.w / 2;
  ball.y = paddle.y - ball.r - 1;
  ball.dx = 0;
  ball.dy = 0;
  ball.speed = 5 + level * 0.5;
  ballTrail = [];
}

// ── Spawn Particles ─────────────────────────
function spawnParticles(x, y, color, count = 14) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
    const speed = 1.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.03,
      size: 1.5 + Math.random() * 3,
      color,
    });
  }
}

// ── Launch Ball ─────────────────────────────
function launchBall() {
  if (!ball.attached) return;
  ball.attached = false;
  ball.dx = (Math.random() - 0.5) * 2;
  ball.dy = -ball.speed;
  const mag = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
  ball.dx = (ball.dx / mag) * ball.speed;
  ball.dy = (ball.dy / mag) * ball.speed;
}

// ── Input ───────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  mouseX = (e.clientX - rect.left) * scaleX;
});

canvas.addEventListener('click', () => {
  if (state === STATE.START) {
    state = STATE.PLAYING;
    score = 0;
    lives = 3;
    level = 1;
    initBricks();
    resetBall();
  } else if (state === STATE.GAME_OVER || state === STATE.WIN) {
    state = STATE.PLAYING;
    score = 0;
    lives = 3;
    level = 1;
    initBricks();
    resetBall();
  } else if (state === STATE.PLAYING && ball.attached) {
    launchBall();
  } else if (state === STATE.LIFE_LOST) {
    state = STATE.PLAYING;
    resetBall();
  }
});

// ── Collision Detection ─────────────────────
function ballBrickCollision(b, br) {
  const closestX = Math.max(br.x, Math.min(b.x, br.x + br.w));
  const closestY = Math.max(br.y, Math.min(b.y, br.y + br.h));
  const dx = b.x - closestX;
  const dy = b.y - closestY;
  return dx * dx + dy * dy < b.r * b.r;
}

// ── Update ──────────────────────────────────
function update() {
  if (state !== STATE.PLAYING) return;

  // Paddle
  const targetX = mouseX - paddle.w / 2;
  paddle.x += (targetX - paddle.x) * 0.25;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

  // Ball follows paddle if attached
  if (ball.attached) {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 1;
  } else {
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Trail
    ballTrail.push({ x: ball.x, y: ball.y, life: 1 });
    if (ballTrail.length > 12) ballTrail.shift();

    // Wall bounce
    if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
    if (ball.x + ball.r >= W) { ball.x = W - ball.r; ball.dx = -Math.abs(ball.dx); }
    if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

    // Paddle bounce
    if (
      ball.dy > 0 &&
      ball.y + ball.r >= paddle.y &&
      ball.y + ball.r <= paddle.y + paddle.h + 8 &&
      ball.x > paddle.x - ball.r &&
      ball.x < paddle.x + paddle.w + ball.r
    ) {
      const hitPos = (ball.x - paddle.x) / paddle.w; // 0..1
      const angle = (hitPos - 0.5) * Math.PI * 0.6; // -54°..+54°
      const spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
      ball.dx = Math.sin(angle) * spd;
      ball.dy = -Math.cos(angle) * spd;
      ball.y = paddle.y - ball.r;
      spawnParticles(ball.x, ball.y, '#ffffff', 5);
    }

    // Brick collision
    let allDead = true;
    for (let r = 0; r < brickRows; r++) {
      for (let c = 0; c < brickCols; c++) {
        const br = bricks[r][c];
        if (!br.alive) continue;
        allDead = false;
        if (ballBrickCollision(ball, br)) {
          br.hp--;
          if (br.hp <= 0) {
            br.alive = false;
            spawnParticles(br.x + br.w / 2, br.y + br.h / 2, br.color, 16);
            score += (brickRows - r) * 10;
          } else {
            spawnParticles(ball.x, ball.y, br.color, 6);
          }

          // Determine bounce direction
          const overlapLeft = (ball.x + ball.r) - br.x;
          const overlapRight = (br.x + br.w) - (ball.x - ball.r);
          const overlapTop = (ball.y + ball.r) - br.y;
          const overlapBottom = (br.y + br.h) - (ball.y - ball.r);
          const minOverlapX = Math.min(overlapLeft, overlapRight);
          const minOverlapY = Math.min(overlapTop, overlapBottom);

          if (minOverlapX < minOverlapY) {
            ball.dx = -ball.dx;
          } else {
            ball.dy = -ball.dy;
          }
          break;
        }
      }
      if (!bricks[r]?.some(b => b.alive)) continue;
    }

    if (allDead) {
      state = STATE.WIN;
      level++;
      initBricks();
    }

    // Fall off bottom
    if (ball.y - ball.r > H) {
      lives--;
      if (lives <= 0) {
        state = STATE.GAME_OVER;
      } else {
        state = STATE.LIFE_LOST;
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Trail decay
  for (let i = ballTrail.length - 1; i >= 0; i--) {
    ballTrail[i].life -= 0.08;
    if (ballTrail[i].life <= 0) ballTrail.splice(i, 1);
  }
}

// ── Draw ────────────────────────────────────
function drawGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gs = 40;
  for (let x = gs; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = gs; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawStars() {
  for (const s of stars) {
    s.a += s.twinkle;
    if (s.a > 1 || s.a < 0.2) s.twinkle *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  }
}

function drawPaddle() {
  ctx.save();
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 20;
  const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  grad.addColorStop(0, '#00ffff');
  grad.addColorStop(0.5, '#00e5ff');
  grad.addColorStop(1, '#009999');
  ctx.fillStyle = grad;
  roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
  ctx.fill();
  ctx.shadowBlur = 8;
  ctx.fill();
  ctx.restore();

  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  roundRect(paddle.x + 3, paddle.y + 2, paddle.w - 6, paddle.h / 2 - 2, 4);
  ctx.fill();
}

function drawBall() {
  // Trail
  for (let i = 0; i < ballTrail.length; i++) {
    const t = ballTrail[i];
    const alpha = t.life * 0.5;
    const size = ball.r * (0.3 + t.life * 0.7);
    ctx.beginPath();
    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,255,255,${alpha})`;
    ctx.fill();
  }

  ctx.save();
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 18;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(ball.x - 1, ball.y - 1, 0, ball.x, ball.y, ball.r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.4, '#00ffff');
  grad.addColorStop(1, '#005577');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function drawBricks() {
  for (let r = 0; r < brickRows; r++) {
    for (let c = 0; c < brickCols; c++) {
      const br = bricks[r][c];
      if (!br.alive) continue;
      ctx.save();
      ctx.shadowColor = br.color;
      ctx.shadowBlur = 8;

      const grad = ctx.createLinearGradient(br.x, br.y, br.x, br.y + br.h);
      grad.addColorStop(0, br.color);
      grad.addColorStop(1, glowColor(br.color, 0.5));
      ctx.fillStyle = grad;
      roundRect(br.x, br.y, br.w, br.h, 3);
      ctx.fill();

      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      roundRect(br.x + 2, br.y + 2, br.w - 4, br.h / 2 - 2, 2);
      ctx.fill();

      // HP indicator
      if (br.hp > 1) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.arc(br.x + br.w / 2, br.y + br.h / 2, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = glowColor(p.color, p.life);
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6 * p.life;
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 18px "Courier New", monospace';
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 10;
  ctx.fillText(`SCORE  ${String(score).padStart(6, '0')}`, 24, 34);
  ctx.shadowBlur = 0;

  // Lives
  ctx.fillStyle = '#ff2d95';
  ctx.shadowColor = '#ff2d95';
  ctx.shadowBlur = 10;
  ctx.fillText(`LIVES  ${'♥'.repeat(lives)}`, W - 160, 34);
  ctx.shadowBlur = 0;

  // Level
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '12px "Courier New", monospace';
  ctx.fillText(`LEVEL ${level}`, W / 2 - 28, 34);
}

function drawStartScreen() {
  drawOverlay();

  // Title
  ctx.save();
  ctx.shadowColor = '#ff2d95';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ff2d95';
  ctx.font = 'bold 52px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NEON', W / 2, H / 2 - 70);
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#00ffff';
  ctx.fillText('BREAKOUT', W / 2, H / 2 - 15);
  ctx.restore();

  // Subtitle
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '16px "Courier New", monospace';
  ctx.fillText('click to start', W / 2, H / 2 + 50);

  // Pulsing prompt
  const pulse = Math.sin(Date.now() / 600) * 0.3 + 0.7;
  ctx.fillStyle = `rgba(255,255,255,${pulse})`;
  ctx.font = '13px "Courier New", monospace';
  ctx.fillText('move mouse to control paddle  •  click to launch', W / 2, H / 2 + 80);
}

function drawGameOverScreen() {
  drawOverlay();

  ctx.save();
  ctx.shadowColor = '#ff2d95';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#ff2d95';
  ctx.font = 'bold 44px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 50);
  ctx.restore();

  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 22px "Courier New", monospace';
  ctx.fillText(`SCORE  ${String(score).padStart(6, '0')}`, W / 2, H / 2 + 10);

  const pulse = Math.sin(Date.now() / 600) * 0.3 + 0.7;
  ctx.fillStyle = `rgba(255,255,255,${pulse})`;
  ctx.font = '15px "Courier New", monospace';
  ctx.fillText('click to play again', W / 2, H / 2 + 55);
}

function drawWinScreen() {
  drawOverlay();

  ctx.save();
  ctx.shadowColor = '#39ff14';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#39ff14';
  ctx.font = 'bold 44px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('YOU WIN!', W / 2, H / 2 - 50);
  ctx.restore();

  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 22px "Courier New", monospace';
  ctx.fillText(`SCORE  ${String(score).padStart(6, '0')}`, W / 2, H / 2 + 10);

  const pulse = Math.sin(Date.now() / 600) * 0.3 + 0.7;
  ctx.fillStyle = `rgba(255,255,255,${pulse})`;
  ctx.font = '15px "Courier New", monospace';
  ctx.fillText('click for next level', W / 2, H / 2 + 55);
}

function drawLifeLostOverlay() {
  drawOverlay();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '20px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`LIVES: ${lives}  •  click to continue`, W / 2, H / 2);
}

function drawOverlay() {
  ctx.fillStyle = 'rgba(5,5,16,0.75)';
  ctx.fillRect(0, 0, W, H);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let y = 0; y < H; y += 3) {
    ctx.fillRect(0, y, W, 1);
  }
}

// ── Game Loop ───────────────────────────────
function gameLoop() {
  update();

  // Clear
  ctx.fillStyle = '#08081a';
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawStars();

  if (state === STATE.START || state === STATE.PLAYING || state === STATE.LIFE_LOST) {
    drawBricks();
    drawPaddle();
    drawBall();
    drawParticles();
    drawHUD();
    drawScanlines();
  }

  if (state === STATE.START) drawStartScreen();
  if (state === STATE.LIFE_LOST) drawLifeLostOverlay();
  if (state === STATE.GAME_OVER) drawGameOverScreen();
  if (state === STATE.WIN) { drawBricks(); drawHUD(); drawWinScreen(); }

  requestAnimationFrame(gameLoop);
}

// ── Init ────────────────────────────────────
initBricks();
resetBall();
paddle.x = W / 2 - paddle.w / 2;
gameLoop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Drift — Retro Space Shooter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #1a1a3e;
    box-shadow:
      0 0 20px rgba(100, 100, 255, 0.3),
      0 0 60px rgba(50, 50, 200, 0.15),
      inset 0 0 20px rgba(0, 0, 0, 0.5);
    border-radius: 4px;
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game"></canvas>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = 960;
  const H = 540;
  const SCALE = 1;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  // === GAME STATE ===
  let score = 0;
  let lives = 3;
  let gameState = 'playing'; // 'playing' | 'over'
  let invincibleTimer = 0;
  let screenShake = 0;
  let frameCount = 0;
  let difficulty = 1;

  // === INPUT ===
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space' && gameState === 'over') {
      restart();
    }
    e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

  // === PLAYER ===
  const player = {
    x: 120, y: H / 2,
    vx: 0, vy: 0,
    w: 32, h: 20,
    maxSpeed: 5.5,
    accel: 0.45,
    friction: 0.92,
    shootCooldown: 0,
    shootDelay: 12,
    thrusterFlicker: 0
  };

  // === ARRAYS ===
  let bullets = [];
  let gems = [];
  let enemies = [];
  let obstacles = [];
  let particles = [];
  let stars = [];

  // === STARS (parallax layers) ===
  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      const layer = Math.random() < 0.3 ? 2 : Math.random() < 0.5 ? 1 : 0;
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        speed: 0.3 + layer * 0.6 + Math.random() * 0.4,
        size: layer === 2 ? 2 : layer === 1 ? 1.5 : 1,
        brightness: 0.4 + Math.random() * 0.6,
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.02 + Math.random() * 0.04
      });
    }
  }

  // === CAVE WALLS ===
  let caveSegments = [];
  const CAVE_GAP = 220;
  const CAVE_MIN_Y = 60;
  const CAVE_MAX_Y = H - 60;

  function spawnCaveSegment(x) {
    const centerY = CAVE_MIN_Y + 80 + Math.random() * (CAVE_MAX_Y - CAVE_MIN_Y - 160);
    const halfGap = CAVE_GAP / 2;
    const topH = centerY - halfGap;
    const botY = centerY + halfGap;
    const botH = H - botY;

    const jaggedTop = [];
    const jaggedBot = [];
    const segs = 8;
    const segW = 60;
    for (let i = 0; i < segs; i++) {
      jaggedTop.push((Math.random() - 0.5) * 14);
      jaggedBot.push((Math.random() - 0.5) * 14);
    }

    caveSegments.push({
      x, centerY, topH, botY, botH, jaggedTop, jaggedBot,
      w: segs * segW, segW, segs,
      passed: false
    });
  }

  function initCaves() {
    caveSegments = [];
    for (let i = 0; i < 5; i++) {
      spawnCaveSegment(W + i * 340);
    }
  }

  // === GEMS ===
  function spawnGem(x, y) {
    gems.push({
      x, y,
      w: 12, h: 12,
      vy: 0,
      glowPhase: Math.random() * Math.PI * 2,
      bobPhase: Math.random() * Math.PI * 2
    });
  }

  // === ENEMIES ===
  function spawnEnemy() {
    const y = 80 + Math.random() * (H - 160);
    const type = Math.random() < 0.4 ? 'chaser' : 'straight';
    enemies.push({
      x: W + 40,
      y,
      w: 22, h: 16,
      vx: -2 - Math.random() * 1.5 - difficulty * 0.3,
      vy: 0,
      type,
      health: type === 'chaser' ? 2 : 1,
      flashTimer: 0
    });
  }

  // === OBSTACLES ===
  function spawnObstacle() {
    const y = 80 + Math.random() * (H - 160);
    const r = 10 + Math.random() * 14;
    obstacles.push({
      x: W + 40,
      y,
      r,
      vx: -1.8 - Math.random() * 1 - difficulty * 0.2,
      vy: (Math.random() - 0.5) * 1.5,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.05,
      jagged: []
    });
    const obs = obstacles[obstacles.length - 1];
    const pts = 8 + Math.floor(Math.random() * 6);
    for (let i = 0; i < pts; i++) {
      const angle = (i / pts) * Math.PI * 2;
      const dist = r * (0.7 + Math.random() * 0.5);
      obs.jagged.push({ angle, dist });
    }
  }

  // === PARTICLES ===
  function spawnParticles(x, y, count, color, speed, life) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = speed * (0.3 + Math.random() * 0.7);
      particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: life * (0.5 + Math.random() * 0.5),
        maxLife: life,
        color,
        size: 2 + Math.random() * 3
      });
    }
  }

  // === COLLISION ===
  function rectCollide(a, b) {
    return (
      a.x - a.w / 2 < b.x + b.w / 2 &&
      a.x + a.w / 2 > b.x - b.w / 2 &&
      a.y - a.h / 2 < b.y + b.h / 2 &&
      a.y + a.h / 2 > b.y - b.h / 2
    );
  }

  function circleRect(cx, cy, cr, rx, ry, rw, rh) {
    const closestX = Math.max(rx - rw / 2, Math.min(cx, rx + rw / 2));
    const closestY = Math.max(ry - rh / 2, Math.min(cy, ry + rh / 2));
    const dx = cx - closestX;
    const dy = cy - closestY;
    return dx * dx + dy * dy < cr * cr;
  }

  // === DRAWING HELPERS ===
  function drawPixelRect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.floor(x - w / 2), Math.floor(y - h / 2), w, h);
  }

  function drawGlow(x, y, r, color, intensity) {
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, color);
    grad.addColorStop(0.3, color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.globalAlpha = intensity;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === DRAW SHIP (pixel art) ===
  function drawShip(x, y, thrusterGlow) {
    ctx.save();
    ctx.translate(Math.floor(x), Math.floor(y));

    // Thruster glow
    const tg = thrusterGlow * (0.6 + 0.4 * Math.sin(frameCount * 0.4));
    drawGlow(-14, 0, 18 + tg * 10, 'rgba(255, 140, 30, 0.9)', 0.5 + tg * 0.4);
    drawGlow(-14, 0, 10 + tg * 6, 'rgba(255, 200, 80, 0.7)', 0.6 + tg * 0.3);

    // Thruster flames (pixelated)
    const flameLen = 8 + tg * 7;
    const flameW = 4 + tg * 2;
    for (let fy = -flameW; fy <= flameW; fy += 2) {
      for (let fx = -16 - flameLen; fx <= -14; fx += 2) {
        const distFromCenter = Math.abs(fy) / (flameW + 1);
        const distFromBack = Math.abs(fx + 14) / (flameLen + 1);
        if (distFromCenter + distFromBack * 0.6 < 0.7 + tg * 0.3) {
          const flicker = Math.random() * 0.3;
          const r = 255;
          const g = Math.floor(100 + 100 * (1 - distFromBack) + flicker * 55);
          const b = Math.floor(20 * (1 - distFromBack) + flicker * 30);
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillRect(fx, fy, 2, 2);
        }
      }
    }

    // Ship body (orange pixel art)
    const bodyColor = '#ff6d1a';
    const bodyDark = '#c44a00';
    const bodyLight = '#ff9944';
    const cockpitColor = '#44ccff';
    const wingColor = '#e05500';

    // Main body
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-13, -3, 16, 6);
    ctx.fillRect(-10, -5, 10, 10);

    // Dark shading
    ctx.fillStyle = bodyDark;
    ctx.fillRect(-10, -3, 2, 6);
    ctx.fillRect(-8, 3, 6, 2);

    // Light accents
    ctx.fillStyle = bodyLight;
    ctx.fillRect(-4, -5, 2, 2);
    ctx.fillRect(-2, -3, 10, 2);

    // Cockpit
    ctx.fillStyle = cockpitColor;
    ctx.fillRect(1, -2, 5, 4);
    ctx.fillStyle = '#aaf0ff';
    ctx.fillRect(2, -1, 3, 2);

    // Wings
    ctx.fillStyle = wingColor;
    ctx.fillRect(-6, -9, 4, 4);
    ctx.fillRect(-6, 5, 4, 4);
    ctx.fillRect(-8, -9, 2, 2);
    ctx.fillRect(-8, 7, 2, 2);

    // Wing tips
    ctx.fillStyle = bodyLight;
    ctx.fillRect(-4, -9, 2, 2);
    ctx.fillRect(-4, 7, 2, 2);

    // Nose
    ctx.fillStyle = bodyLight;
    ctx.fillRect(12, -1, 4, 2);

    // Engine glow on body
    ctx.fillStyle = 'rgba(255, 200, 80, 0.6)';
    ctx.fillRect(-10, -1, 3, 2);

    ctx.restore();
  }

  // === DRAW GEM ===
  function drawGem(x, y, phase) {
    const bob = Math.sin(frameCount * 0.05 + phase) * 2;
    const gy = y + bob;
    const glowIntensity = 0.5 + 0.3 * Math.sin(frameCount * 0.08 + phase);

    // Outer glow
    drawGlow(x, gy, 16, 'rgba(60, 160, 255, 0.7)', glowIntensity);
    drawGlow(x, gy, 8, 'rgba(120, 200, 255, 0.9)', glowIntensity * 1.2);

    // Gem body (pixel diamond)
    const colors = ['#1a5cff', '#3399ff', '#66bbff', '#aaddff'];
    ctx.fillStyle = colors[0];
    ctx.fillRect(x - 2, gy - 6, 4, 4);
    ctx.fillStyle = colors[1];
    ctx.fillRect(x - 4, gy - 4, 8, 8);
    ctx.fillStyle = colors[2];
    ctx.fillRect(x - 2, gy - 4, 4, 6);
    ctx.fillStyle = colors[3];
    ctx.fillRect(x - 1, gy - 2, 2, 4);

    // Highlight
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - 1, gy - 3, 2, 2);
  }

  // === DRAW ENEMY ===
  function drawEnemy(enemy) {
    const x = Math.floor(enemy.x);
    const y = Math.floor(enemy.y);
    const flash = enemy.flashTimer > 0;

    // Enemy glow (red/purple)
    drawGlow(x, y, 14, 'rgba(200, 40, 80, 0.5)', 0.6);

    if (enemy.type === 'chaser') {
      // Larger, tougher enemy
      ctx.fillStyle = flash ? '#ffffff' : '#992244';
      ctx.fillRect(x - 10, y - 6, 20, 12);
      ctx.fillStyle = flash ? '#ffffff' : '#cc3366';
      ctx.fillRect(x - 8, y - 8, 16, 4);
      ctx.fillRect(x - 8, y + 4, 16, 4);
      ctx.fillStyle = flash ? '#ffffff' : '#661133';
      ctx.fillRect(x - 6, y - 4, 12, 8);
      // Eyes
      ctx.fillStyle = '#ffdd00';
      ctx.fillRect(x - 6, y - 3, 3, 3);
      ctx.fillRect(x + 2, y - 3, 3, 3);
      ctx.fillStyle = '#000';
      ctx.fillRect(x - 5, y - 2, 2, 2);
      ctx.fillRect(x + 3, y - 2, 2, 2);
    } else {
      // Basic drone
      ctx.fillStyle = flash ? '#ffffff' : '#773344';
      ctx.fillRect(x - 9, y - 5, 18, 10);
      ctx.fillStyle = flash ? '#ffffff' : '#aa4455';
      ctx.fillRect(x - 7, y - 7, 14, 4);
      ctx.fillRect(x - 7, y + 3, 14, 4);
      ctx.fillStyle = flash ? '#ffffff' : '#552233';
      ctx.fillRect(x - 5, y - 3, 10, 6);
      // Eye
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(x - 3, y - 2, 6, 4);
      ctx.fillStyle = '#ffaaaa';
      ctx.fillRect(x - 2, y - 1, 4, 2);
    }
  }

  // === DRAW OBSTACLE (asteroid) ===
  function drawObstacle(obs) {
    ctx.save();
    ctx.translate(obs.x, obs.y);
    ctx.rotate(obs.rotation);

    drawGlow(0, 0, obs.r + 6, 'rgba(180, 100, 50, 0.3)', 0.5);

    // Rocky body
    ctx.fillStyle = '#5c4033';
    ctx.beginPath();
    const pts = obs.jagged;
    ctx.moveTo(Math.cos(pts[0].angle) * pts[0].dist, Math.sin(pts[0].angle) * pts[0].dist);
    for (let i = 1; i < pts.length; i++) {
      ctx.lineTo(Math.cos(pts[i].angle) * pts[i].dist, Math.sin(pts[i].angle) * pts[i].dist);
    }
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#7a5c4a';
    ctx.beginPath();
    ctx.moveTo(Math.cos(pts[0].angle) * pts[0].dist * 0.6, Math.sin(pts[0].angle) * pts[0].dist * 0.6);
    for (let i = 1; i < pts.length; i++) {
      ctx.lineTo(Math.cos(pts[i].angle) * pts[i].dist * 0.6, Math.sin(pts[i].angle) * pts[i].dist * 0.6);
    }
    ctx.closePath();
    ctx.fill();

    // Craters
    ctx.fillStyle = '#3d2a1f';
    ctx.beginPath();
    ctx.arc(2, -2, obs.r * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-3, 1, obs.r * 0.18, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // === DRAW CAVE WALL ===
  function drawCaveWall(seg) {
    const x = Math.floor(seg.x);
    const segW = seg.segW;

    // Top wall
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x, 0, seg.w + 2, seg.topH);

    // Bottom wall
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x, seg.botY, seg.w + 2, seg.botH);

    // Jagged edges - top wall bottom edge
    ctx.fillStyle = '#252545';
    for (let i = 0; i < seg.segs; i++) {
      const sx = x + i * segW;
      const jy = seg.topH + seg.jaggedTop[i];
      ctx.fillRect(sx, seg.topH - 2, segW, 6);
    }

    // Jagged edges - bottom wall top edge
    ctx.fillStyle = '#252545';
    for (let i = 0; i < seg.segs; i++) {
      const sx = x + i * segW;
      const jy = seg.botY + seg.jaggedBot[i];
      ctx.fillRect(sx, seg.botY - 2, segW, 6);
    }

    // Wall texture details
    ctx.fillStyle = '#2a2a4a';
    for (let i = 0; i < seg.segs; i++) {
      const sx = x + i * segW + segW * 0.3;
      // Top wall detail
      if (seg.topH > 20) {
        ctx.fillRect(sx, seg.topH * 0.4, 4, 2);
        ctx.fillRect(sx + segW * 0.4, seg.topH * 0.7, 3, 2);
      }
      // Bottom wall detail
      if (seg.botY < H - 30) {
        ctx.fillRect(sx, seg.botY + seg.botH * 0.3, 4, 2);
        ctx.fillRect(sx + segW * 0.3, seg.botY + seg.botH * 0.6, 3, 2);
      }
    }

    // Edge glow (subtle)
    ctx.strokeStyle = 'rgba(60, 60, 140, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, seg.topH);
    for (let i = 0; i < seg.segs; i++) {
      ctx.lineTo(x + i * segW + segW, seg.topH + seg.jaggedTop[i]);
    }
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x, seg.botY);
    for (let i = 0; i < seg.segs; i++) {
      ctx.lineTo(x + i * segW + segW, seg.botY + seg.jaggedBot[i]);
    }
    ctx.stroke();
  }

  // === DRAW HUD ===
  function drawHUD() {
    // Score background
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(8, 8, 200, 52);
    ctx.strokeStyle = 'rgba(100, 100, 200, 0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(8, 8, 200, 52);

    // Score
    ctx.fillStyle = '#ffffff';
    ctx.font = '11px "Press Start 2P"';
    ctx.fillText('SCORE', 16, 30);
    ctx.fillStyle = '#ffcc44';
    ctx.font = '16px "Press Start 2P"';
    ctx.fillText(String(score).padStart(6, '0'), 16, 52);

    // Lives
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(W - 140, 8, 132, 36);
    ctx.strokeStyle = 'rgba(100, 100, 200, 0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(W - 140, 8, 132, 36);

    ctx.fillStyle = '#ffffff';
    ctx.font = '10px "Press Start 2P"';
    ctx.fillText('LIVES', W - 132, 28);

    for (let i = 0; i < lives; i++) {
      const lx = W - 128 + i * 36;
      // Mini ship icon
      ctx.fillStyle = '#ff6d1a';
      ctx.fillRect(lx - 2, 32, 8, 3);
      ctx.fillRect(lx, 30, 6, 7);
      ctx.fillStyle = '#44ccff';
      ctx.fillRect(lx + 3, 31, 2, 3);
    }
  }

  // === GAME OVER SCREEN ===
  function drawGameOver() {
    // Dim overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
    ctx.fillRect(0, 0, W, H);

    // Panel
    const px = W / 2 - 200;
    const py = H / 2 - 120;
    ctx.fillStyle = 'rgba(10, 10, 30, 0.95)';
    ctx.fillRect(px, py, 400, 240);
    ctx.strokeStyle = '#4466aa';
    ctx.lineWidth = 2;
    ctx.strokeRect(px, py, 400, 240);
    ctx.strokeStyle = 'rgba(100, 150, 255, 0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 4, py + 4, 392, 232);

    // Title
    ctx.fillStyle = '#ff6644';
    ctx.font = '24px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, py + 60);

    // Score
    ctx.fillStyle = '#cccccc';
    ctx.font = '12px "Press Start 2P"';
    ctx.fillText('FINAL SCORE', W / 2, py + 110);
    ctx.fillStyle = '#ffcc44';
    ctx.font = '20px "Press Start 2P"';
    ctx.fillText(String(score).padStart(6, '0'), W / 2, py + 140);

    // Restart prompt
    const alpha = 0.5 + 0.5 * Math.sin(frameCount * 0.05);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.font = '10px "Press Start 2P"';
    ctx.fillText('PRESS SPACE TO RESTART', W / 2, py + 190);

    ctx.textAlign = 'start';
  }

  // === UPDATE ===
  function update() {
    if (gameState === 'over') return;
    frameCount++;
    difficulty = 1 + Math.floor(score / 500) * 0.3;

    // === PLAYER MOVEMENT ===
    if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= player.accel;
    if (keys['ArrowRight'] || keys['KeyD']) player.vx += player.accel;
    if (keys['ArrowUp'] || keys['KeyW']) player.vy -= player.accel;
    if (keys['ArrowDown'] || keys['KeyS']) player.vy += player.accel;

    player.vx *= player.friction;
    player.vy *= player.friction;
    player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));
    player.vy = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vy));

    player.x += player.vx;
    player.y += player.vy;

    // Clamp to screen
    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
    player.y = Math.max(player.h / 2 + 30, Math.min(H - player.h / 2 - 30, player.y));

    // Friction decay when no input
    if (!keys['ArrowLeft'] && !keys['KeyA'] && !keys['ArrowRight'] && !keys['KeyD']) {
      player.vx *= 0.96;
    }
    if (!keys['ArrowUp'] && !keys['KeyW'] && !keys['ArrowDown'] && !keys['KeyS']) {
      player.vy *= 0.96;
    }

    // Thruster
    if (keys['ArrowRight'] || keys['KeyD'] || keys['ArrowLeft'] || keys['KeyA'] ||
        keys['ArrowUp'] || keys['KeyW'] || keys['ArrowDown'] || keys['KeyS']) {
      player.thrusterFlicker = Math.min(1, player.thrusterFlicker + 0.15);
    } else {
      player.thrusterFlicker = Math.max(0.3, player.thrusterFlicker - 0.05);
    }

    // === SHOOTING ===
    if (player.shootCooldown > 0) player.shootCooldown--;
    if (keys['Space'] && player.shootCooldown <= 0) {
      bullets.push({
        x: player.x + 14,
        y: player.y - 1,
        vx: 8,
        vy: 0,
        w: 10, h: 3
      });
      bullets.push({
        x: player.x + 14,
        y: player.y + 1,
        vx: 8,
        vy: 0,
        w: 10, h: 3
      });
      spawnParticles(player.x - 10, player.y, 3, '#ffaa44', 2, 8);
      player.shootCooldown = player.shootDelay;
    }

    // === UPDATE BULLETS ===
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      if (b.x > W + 20) {
        bullets.splice(i, 1);
      }
    }

    // === UPDATE STARS ===
    for (const s of stars) {
      s.x -= s.speed;
      s.twinkle += s.twinkleSpeed;
      if (s.x < -5) {
        s.x = W + 5;
        s.y = Math.random() * H;
      }
    }

    // === UPDATE CAVES ===
    for (let i = caveSegments.length - 1; i >= 0; i--) {
      caveSegments[i].x -= 2.2;
      if (caveSegments[i].x + caveSegments[i].w < -10) {
        caveSegments.splice(i, 1);
        spawnCaveSegment(W + Math.random() * 100);
      }
    }

    // === SPAWN GEMS (near cave centers) ===
    for (const seg of caveSegments) {
      if (!seg.passed && seg.x + seg.w / 2 < W * 0.7 && seg.x + seg.w / 2 > W * 0.3) {
        if (Math.random() < 0.03) {
          spawnGem(seg.x + seg.w / 2 + (Math.random() - 0.5) * 100, seg.centerY + (Math.random() - 0.5) * 60);
        }
        seg.passed = true;
      }
    }
    // Extra random gems
    if (Math.random() < 0.008) {
      spawnGem(W + 20, CAVE_MIN_Y + 60 + Math.random() * (CAVE_MAX_Y - CAVE_MIN_Y - 120));
    }

    // === UPDATE GEMS ===
    for (let i = gems.length - 1; i >= 0; i--) {
      const g = gems[i];
      g.x -= 2.2;
      g.bobPhase += 0.05;
      if (g.x < -20) {
        gems.splice(i, 1);
        continue;
      }
      // Player collection
      if (rectCollide(
        { x: g.x, y: g.y + Math.sin(g.bobPhase) * 2, w: g.w, h: g.h },
        { x: player.x, y: player.y, w: player.w, h: player.h }
      )) {
        score += 100;
        spawnParticles(g.x, g.y, 12, '#66bbff', 3, 15);
        gems.splice(i, 1);
      }
    }

    // === SPAWN ENEMIES ===
    if (frameCount % Math.max(40, 90 - difficulty * 8) === 0) {
      spawnEnemy();
    }

    // === UPDATE ENEMIES ===
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.x += e.vx;
      if (e.flashTimer > 0) e.flashTimer--;

      if (e.type === 'chaser') {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        e.vy += (dy / dist) * 0.08;
        e.vy *= 0.95;
        e.y += e.vy;
      }

      e.y = Math.max(50, Math.min(H - 50, e.y));

      // Out of bounds
      if (e.x < -60) {
        enemies.splice(i, 1);
        continue;
      }

      // Bullet collision
      let hitByBullet = false;
      for (let j = bullets.length - 1; j >= 0; j--) {
        if (rectCollide(
          { x: bullets[j].x, y: bullets[j].y, w: bullets[j].w, h: bullets[j].h },
          { x: e.x, y: e.y, w: e.w, h: e.h }
        )) {
          bullets.splice(j, 1);
          e.health--;
          e.flashTimer = 4;
          spawnParticles(e.x, e.y, 4, '#ff6644', 2, 10);
          if (e.health <= 0) {
            spawnParticles(e.x, e.y, 10, '#ff8844', 3, 15);
            score += 50;
            enemies.splice(i, 1);
            hitByBullet = true;
            break;
          }
        }
      }
      if (hitByBullet) continue;

      // Player collision
      if (invincibleTimer <= 0 && rectCollide(
        { x: e.x, y: e.y, w: e.w, h: e.h },
        { x: player.x, y: player.y, w: player.w, h: player.h }
      )) {
        hurtPlayer();
        enemies.splice(i, 1);
      }
    }

    // === SPAWN OBSTACLES ===
    if (frameCount % Math.max(50, 110 - difficulty * 7) === 0) {
      spawnObstacle();
    }

    // === UPDATE OBSTACLES ===
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x += o.vx;
      o.y += o.vy;
      o.rotation += o.rotSpeed;

      if (o.y < 40 || o.y > H - 40) o.vy *= -1;
      if (o.x < -40) {
        obstacles.splice(i, 1);
        continue;
      }

      // Bullet collision
      for (let j = bullets.length - 1; j >= 0; j--) {
        if (circleRect(bullets[j].x, bullets[j].y, 4, o.x, o.y, o.r * 2, o.r * 2)) {
          bullets.splice(j, 1);
          spawnParticles(o.x, o.y, 5, '#aa8855', 2, 10);
          score += 25;
          obstacles.splice(i, 1);
          break;
        }
      }

      // Player collision (check if still exists after bullet check)
      if (i >= obstacles.length) continue;
      if (invincibleTimer <= 0 && circleRect(player.x, player.y, Math.min(player.w, player.h) / 2, obstacles[i].x, obstacles[i].y, obstacles[i].r * 2, obstacles[i].r * 2)) {
        hurtPlayer();
        obstacles.splice(i, 1);
      }
    }

    // === UPDATE PARTICLES ===
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // === INVINCIBILITY ===
    if (invincibleTimer > 0) invincibleTimer--;

    // === SCREEN SHAKE ===
    if (screenShake > 0) screenShake *= 0.85;
    if (screenShake < 0.1) screenShake = 0;
  }

  function hurtPlayer() {
    if (invincibleTimer > 0) return;
    lives--;
    invincibleTimer = 90;
    screenShake = 8;
    spawnParticles(player.x, player.y, 20, '#ff4444', 4, 20);
    if (lives <= 0) {
      gameState = 'over';
      spawnParticles(player.x, player.y, 40, '#ff6622', 5, 30);
    }
  }

  function restart() {
    score = 0;
    lives = 3;
    gameState = 'playing';
    invincibleTimer = 60;
    screenShake = 0;
    frameCount = 0;
    difficulty = 1;
    player.x = 120;
    player.y = H / 2;
    player.vx = 0;
    player.vy = 0;
    player.shootCooldown = 0;
    player.thrusterFlicker = 0.3;
    bullets = [];
    gems = [];
    enemies = [];
    obstacles = [];
    particles = [];
    initStars();
    initCaves();
  }

  // === RENDER ===
  function render() {
    ctx.clearRect(0, 0, W, H);

    // Screen shake offset
    const shakeX = (Math.random() - 0.5) * screenShake * 2;
    const shakeY = (Math.random() - 0.5) * screenShake * 2;
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Background
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#050510');
    bgGrad.addColorStop(0.5, '#0a0a20');
    bgGrad.addColorStop(1, '#050510');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(-10, -10, W + 20, H + 20);

    // Stars
    for (const s of stars) {
      const twinkleAlpha = 0.3 + 0.4 * Math.sin(s.twinkle);
      const alpha = s.brightness * (0.6 + 0.4 * twinkleAlpha);
      ctx.fillStyle = `rgba(200, 210, 255, ${alpha})`;
      ctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);

      if (s.size >= 2) {
        drawGlow(s.x, s.y, 3, `rgba(150, 180, 255, ${alpha * 0.5})`, 0.4);
      }
    }

    // Cave walls
    for (const seg of caveSegments) {
      drawCaveWall(seg);
    }

    // Gems
    for (const g of gems) {
      drawGem(g.x, g.y, g.glowPhase);
    }

    // Obstacles
    for (const o of obstacles) {
      drawObstacle(o);
    }

    // Enemies
    for (const e of enemies) {
      drawEnemy(e);
    }

    // Bullets
    for (const b of bullets) {
      drawGlow(b.x, b.y, 5, 'rgba(255, 200, 50, 0.7)', 0.6);
      ctx.fillStyle = '#ffee55';
      ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(b.x - b.w / 2 + 2, b.y - b.h / 2, b.w - 4, b.h);
    }

    // Player ship
    if (invincibleTimer <= 0 || Math.floor(invincibleTimer / 4) % 2 === 0) {
      drawShip(player.x, player.y, player.thrusterFlicker);
      drawGlow(player.x, player.y, 12, 'rgba(255, 100, 30, 0.25)', 0.5);
    }

    // Particles
    for (const p of particles) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    ctx.restore();

    // HUD
    drawHUD();

    // Game over
    if (gameState === 'over') {
      drawGameOver();
    }
  }

  // === GAME LOOP ===
  function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
  }

  // === INIT ===
  initStars();
  initCaves();
  gameLoop();
})();
</script>
</body>
</html>

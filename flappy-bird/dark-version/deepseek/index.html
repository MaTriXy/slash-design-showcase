<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Wings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #07050f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  .game-wrapper {
    position: relative;
    width: 420px;
    height: 640px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 0 0 2px rgba(139, 92, 255, 0.15),
      0 0 40px rgba(120, 60, 240, 0.1),
      0 20px 60px rgba(0,0,0,0.6);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  @media (max-width: 440px) {
    .game-wrapper {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border-radius: 0;
      box-shadow: none;
    }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="game"></canvas>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = 420;
  const H = 640;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.scale(DPR, DPR);

  /* ──── State ──── */
  let frame = 0;
  let state = 'title'; // 'title' | 'playing' | 'gameover'
  let score = 0;
  let best = parseInt(localStorage.getItem('flappyBest')) || 0;
  let shakeTimer = 0;

  /* ──── Bird ──── */
  const bird = {
    x: 110,
    y: H / 2,
    vy: 0,
    width: 34,
    height: 26,
    rotation: 0,
    targetRotation: 0,
    wingPhase: 0,
    trail: [],
  };

  const GRAVITY = 1400;
  const FLAP_VELOCITY = -420;
  const MAX_FALL = 700;

  function resetBird() {
    bird.y = H / 2 - 40;
    bird.vy = 0;
    bird.rotation = 0;
    bird.targetRotation = 0;
    bird.wingPhase = 0;
    bird.trail = [];
  }

  /* ──── Pipes ──── */
  let pipes = [];
  const PIPE_WIDTH = 52;
  const PIPE_GAP = 140;
  const PIPE_SPEED = 150;
  const PIPE_SPACING = 220;

  function spawnPipe() {
    const minTop = 80;
    const maxTop = H - PIPE_GAP - 80;
    const top = minTop + Math.random() * (maxTop - minTop);
    pipes.push({
      x: W + 40,
      top,
      scored: false,
    });
  }

  function resetPipes() {
    pipes = [];
  }

  /* ──── Parallax layers ──── */
  const layers = {
    sky: { offset: 0, speed: 0 },
    cloudsFar: { offset: 0, speed: 12 },
    mountains: { offset: 0, speed: 20 },
    cloudsNear: { offset: 0, speed: 30 },
    citySilhouette: { offset: 0, speed: 50 },
    ground: { offset: 0, speed: 100 },
  };

  /* ──── Particles ──── */
  let particles = [];

  function spawnScoreParticles(x, y) {
    for (let i = 0; i < 16; i++) {
      const angle = (Math.PI * 2 * i) / 16 + Math.random() * 0.4;
      const speed = 120 + Math.random() * 180;
      particles.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 1.8 + Math.random() * 1.5,
        color: ['#ff6b8a', '#ffb84d', '#60f0e8', '#b388ff'][Math.floor(Math.random() * 4)],
        size: 3 + Math.random() * 4,
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= p.decay * dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  /* ──── Stars ──── */
  const stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.62,
      r: 0.3 + Math.random() * 1.6,
      speed: 3 + Math.random() * 12,
      twinkle: Math.random() * Math.PI * 2,
      twinkleRate: 0.5 + Math.random() * 2.5,
    });
  }

  /* ──── Clouds (low-opacity noctilucent wisps) ──── */
  const clouds = [];
  for (let i = 0; i < 6; i++) {
    clouds.push({
      x: Math.random() * W,
      y: 30 + Math.random() * 220,
      w: 70 + Math.random() * 120,
      speed: 6 + Math.random() * 15,
      opacity: 0.04 + Math.random() * 0.08,
    });
  }

  /* ──── Ground bumps ──── */
  const groundBumps = [];
  for (let i = 0; i < 28; i++) {
    groundBumps.push({ x: i * 36 + Math.random() * 8, h: 2 + Math.random() * 5 });
  }

  /* ──── Input ──── */
  function flap() {
    if (state === 'playing') {
      bird.vy = FLAP_VELOCITY;
      bird.targetRotation = -0.5;
      bird.wingPhase = 0;
    } else if (state === 'title') {
      startGame();
    } else if (state === 'gameover') {
      restartGame();
    }
  }

  canvas.addEventListener('pointerdown', (e) => { e.preventDefault(); flap(); });
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      flap();
    }
  });

  /* ──── Game flow ──── */
  function startGame() {
    state = 'playing';
    score = 0;
    resetBird();
    resetPipes();
    particles = [];
    spawnPipe();
  }

  function restartGame() {
    startGame();
  }

  /* ──── Collision ──── */
  function checkCollision(b, pipe) {
    const bx = b.x - b.width / 2;
    const by = b.y - b.height / 2;
    const bw = b.width;
    const bh = b.height;
    const px = pipe.x - PIPE_WIDTH / 2;
    const pw = PIPE_WIDTH;

    if (bx + bw > px && bx < px + pw) {
      if (by < pipe.top) return true;
      if (by + bh > pipe.top + PIPE_GAP) return true;
    }
    return false;
  }

  /* ──── Update ──── */
  function update(dt) {
    dt = Math.min(dt, 0.05);

    if (state === 'title') {
      bird.y = H / 2 - 40 + Math.sin(frame * 0.04) * 14;
      bird.wingPhase = frame * 0.08;
      bird.rotation = Math.sin(frame * 0.04) * 0.1;
    }

    if (state === 'playing') {
      // Bird physics
      bird.vy += GRAVITY * dt;
      if (bird.vy > MAX_FALL) bird.vy = MAX_FALL;
      bird.y += bird.vy * dt;

      // Wing animation
      bird.wingPhase += dt * 12;
      if (bird.vy < -50) bird.wingPhase = Math.min(bird.wingPhase, 0.6);

      // Rotation
      if (bird.vy < 0) {
        bird.targetRotation = -0.5;
      } else {
        bird.targetRotation = Math.min(bird.vy / MAX_FALL * 1.3, 1.3);
      }
      bird.rotation += (bird.targetRotation - bird.rotation) * Math.min(dt * 12, 1);

      // Trail
      bird.trail.push({ x: bird.x, y: bird.y, life: 1 });
      for (let t of bird.trail) t.life -= dt * 4;
      bird.trail = bird.trail.filter(t => t.life > 0);

      // Move pipes
      for (let pipe of pipes) pipe.x -= PIPE_SPEED * dt;

      // Score
      for (let pipe of pipes) {
        if (!pipe.scored && pipe.x + PIPE_WIDTH / 2 < bird.x) {
          pipe.scored = true;
          score++;
          spawnScoreParticles(bird.x + 20, bird.y);
          if (score > best) {
            best = score;
            localStorage.setItem('flappyBest', best);
          }
        }
      }

      // Spawn pipes
      if (pipes.length === 0 || pipes[pipes.length - 1].x < W - PIPE_SPACING) {
        if (pipes.length < 4) spawnPipe();
      }

      // Remove off-screen pipes
      pipes = pipes.filter(p => p.x > -PIPE_WIDTH);

      // Collision
      for (let pipe of pipes) {
        if (checkCollision(bird, pipe)) {
          state = 'gameover';
          shakeTimer = 0.4;
          return;
        }
      }

      // Ground/ceiling
      if (bird.y - bird.height / 2 < 0 || bird.y + bird.height / 2 > H - 56) {
        state = 'gameover';
        shakeTimer = 0.4;
      }
    }

    if (state === 'gameover') {
      bird.vy += GRAVITY * dt;
      bird.y += bird.vy * dt;
      bird.rotation += (1.5 - bird.rotation) * Math.min(dt * 8, 1);
      if (bird.y + bird.height / 2 >= H - 56) {
        bird.y = H - 56 - bird.height / 2;
        bird.vy = 0;
      }
      if (shakeTimer > 0) shakeTimer -= dt;
    }

    // Parallax
    layers.cloudsFar.offset = (layers.cloudsFar.offset + layers.cloudsFar.speed * dt * (state === 'playing' ? 1 : 0)) % W;
    layers.mountains.offset = (layers.mountains.offset + layers.mountains.speed * dt * (state === 'playing' ? 1 : 0)) % W;
    layers.cloudsNear.offset = (layers.cloudsNear.offset + layers.cloudsNear.speed * dt * (state === 'playing' ? 1 : 0)) % (W * 2);
    layers.citySilhouette.offset = (layers.citySilhouette.offset + layers.citySilhouette.speed * dt * (state === 'playing' ? 1 : 0)) % W;
    layers.ground.offset = (layers.ground.offset + layers.ground.speed * dt * (state === 'playing' ? 1 : (state === 'gameover' ? 0 : 0.3))) % W;

    // Clouds
    for (let cloud of clouds) {
      cloud.x -= cloud.speed * dt * (state === 'playing' || state === 'title' ? 0.4 : 0);
      if (cloud.x < -cloud.w) cloud.x = W + cloud.w;
    }

    // Particles
    updateParticles(dt);

    // Stars
    for (let star of stars) {
      star.x -= star.speed * dt * (state === 'playing' ? 1 : 0.15);
      if (star.x < -4) star.x = W + 4;
    }
  }

  /* ──── Draw ──── */
  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0d0a25');
    grad.addColorStop(0.25, '#15103a');
    grad.addColorStop(0.5, '#1a1248');
    grad.addColorStop(0.7, '#1c1a3a');
    grad.addColorStop(0.88, '#1a1730');
    grad.addColorStop(1, '#191a28');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawStars() {
    for (let s of stars) {
      const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(s.twinkle + frame * 0.03 * s.twinkleRate));
      const alpha = twinkle * 0.75;
      ctx.fillStyle = `rgba(200,210,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();

      if (s.r > 1.1 && twinkle > 0.75) {
        ctx.fillStyle = `rgba(180,200,255,${alpha * 0.6})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawCloud(cx, cy, cw, opacity) {
    ctx.fillStyle = `rgba(140,140,255,${opacity})`;
    const r = cw * 0.22;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.arc(cx + cw * 0.2, cy - r * 0.3, r * 0.8, 0, Math.PI * 2);
    ctx.arc(cx + cw * 0.45, cy, r * 0.85, 0, Math.PI * 2);
    ctx.arc(cx + cw * 0.65, cy + r * 0.1, r * 0.7, 0, Math.PI * 2);
    ctx.arc(cx + cw * 0.35, cy + r * 0.2, r * 0.65, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawClouds() {
    for (let c of clouds) drawCloud(c.x, c.y, c.w, c.opacity);
  }

  function drawMountains(offset, color, yBase, heightRange, count, width) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let i = 0; i <= count; i++) {
      const x = -offset + i * width;
      const h = yBase - heightRange * (0.3 + 0.7 * Math.abs(Math.sin(i * 1.9 + 0.6)));
      ctx.lineTo(x, h);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
  }

  function drawCitySilhouette(offset) {
    ctx.fillStyle = '#0f0d20';
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let i = 0; i < 14; i++) {
      const x = -offset + i * 80;
      const h = H - 66 - (15 + Math.abs(Math.sin(i * 2.1) * 18) + Math.abs(Math.cos(i * 3.7) * 10));
      const w = 18 + Math.abs(Math.sin(i * 0.8) * 22);
      ctx.lineTo(x, h);
      ctx.lineTo(x + w, h);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    // Neon window dots
    for (let i = 0; i < 14; i++) {
      const x = -offset + i * 80;
      const h = H - 66 - (15 + Math.abs(Math.sin(i * 2.1) * 18) + Math.abs(Math.cos(i * 3.7) * 10));
      const w = 18 + Math.abs(Math.sin(i * 0.8) * 22);
      for (let wy = h + 6; wy < H - 60; wy += 9) {
        for (let wx = x + 4; wx < x + w - 2; wx += 7) {
          const litVal = Math.sin(i * 13.7 + wy * 0.3 + wx * 0.7);
          if (litVal > 0.15) {
            const a = 0.1 + (litVal * 0.5 + 0.5) * 0.25;
            ctx.fillStyle = `rgba(255,200,120,${a})`;
            ctx.fillRect(wx, wy, 2, 2);
          }
        }
      }
    }
  }

  function drawGround() {
    const groundY = H - 56;

    // Main ground body
    const gGrad = ctx.createLinearGradient(0, groundY, 0, H);
    gGrad.addColorStop(0, '#1c1f2a');
    gGrad.addColorStop(0.3, '#16192b');
    gGrad.addColorStop(1, '#0f1022');
    ctx.fillStyle = gGrad;
    ctx.fillRect(0, groundY, W, 56);

    // Neon ground-line glow
    ctx.strokeStyle = 'rgba(120,80,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(140,100,255,0.7)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(0, groundY + 1);
    ctx.lineTo(W, groundY + 1);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Ground surface detail line
    ctx.strokeStyle = 'rgba(100,70,220,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, groundY + 3);
    ctx.lineTo(W, groundY + 3);
    ctx.stroke();

    // Bumps
    for (let b of groundBumps) {
      const bx = (b.x - layers.ground.offset) % (28 * 36);
      const gx = bx < -36 ? bx + 28 * 36 : bx;
      ctx.fillStyle = '#191c2e';
      ctx.beginPath();
      ctx.ellipse(gx, groundY, 14, b.h, 0, Math.PI, 0);
      ctx.fill();
    }
  }

  function drawPipe(pipe) {
    const px = pipe.x;
    const hw = PIPE_WIDTH / 2;

    function drawPipeSegment(y, height, isTop) {
      const capH = 22;
      const capW = hw + 5;
      const capY = isTop ? y + height - capH : y;

      // Pipe body — dark with neon edge
      const bodyGrad = ctx.createLinearGradient(px - hw, 0, px + hw, 0);
      bodyGrad.addColorStop(0, '#0e1120');
      bodyGrad.addColorStop(0.15, '#181c38');
      bodyGrad.addColorStop(0.5, '#1d2240');
      bodyGrad.addColorStop(0.85, '#181c38');
      bodyGrad.addColorStop(1, '#0e1120');
      ctx.fillStyle = bodyGrad;
      ctx.fillRect(px - hw, y, PIPE_WIDTH, height);

      // Neon vertical highlights
      ctx.strokeStyle = 'rgba(80,180,255,0.35)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px - hw + 1.5, y + 4);
      ctx.lineTo(px - hw + 1.5, y + height - 4);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(140,200,255,0.2)';
      ctx.beginPath();
      ctx.moveTo(px + hw - 1.5, y + 4);
      ctx.lineTo(px + hw - 1.5, y + height - 4);
      ctx.stroke();

      // Inner glow near edges
      for (let gy = y + 8; gy < y + height - 8; gy += 14) {
        ctx.fillStyle = 'rgba(60,160,255,0.06)';
        ctx.fillRect(px - hw + 3, gy, PIPE_WIDTH - 6, 3);
      }

      // Cap
      const capGrad = ctx.createLinearGradient(0, capY, 0, capY + capH);
      capGrad.addColorStop(0, isTop ? '#1e2745' : '#252e50');
      capGrad.addColorStop(0.5, '#2a3358');
      capGrad.addColorStop(1, isTop ? '#252e50' : '#1e2745');
      ctx.fillStyle = capGrad;
      ctx.fillRect(px - capW, capY, capW * 2, capH);

      // Cap neon edge glow
      ctx.strokeStyle = 'rgba(80,180,255,0.4)';
      ctx.lineWidth = 1;
      ctx.shadowColor = 'rgba(80,180,255,0.5)';
      ctx.shadowBlur = 4;
      ctx.strokeRect(px - capW + 1, capY + 1, capW * 2 - 2, capH - 2);
      ctx.shadowBlur = 0;

      // Cap highlight line
      ctx.fillStyle = 'rgba(180,210,255,0.15)';
      ctx.fillRect(px - capW + 1, capY + 1, capW * 2 - 2, 3);
    }

    drawPipeSegment(0, pipe.top, true);
    drawPipeSegment(pipe.top + PIPE_GAP, H - 56 - pipe.top - PIPE_GAP, false);
  }

  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rotation);

    const bw = bird.width;
    const bh = bird.height;

    // Outer glow
    ctx.shadowColor = 'rgba(255,100,130,0.4)';
    ctx.shadowBlur = 14;

    // Body
    const bodyGrad = ctx.createLinearGradient(0, -bh / 2, 0, bh / 2);
    bodyGrad.addColorStop(0, '#ff5e7a');
    bodyGrad.addColorStop(0.4, '#ff3d60');
    bodyGrad.addColorStop(0.7, '#e82148');
    bodyGrad.addColorStop(1, '#b8123a');

    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, bw / 2, bh / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Belly highlight
    ctx.fillStyle = 'rgba(255,180,190,0.5)';
    ctx.beginPath();
    ctx.ellipse(bw * 0.05, bh * 0.15, bw * 0.26, bh * 0.26, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = '#f0f0ff';
    ctx.shadowColor = 'rgba(200,200,255,0.6)';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(bw * 0.35, -bh * 0.05, 6.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#0d0a25';
    ctx.beginPath();
    ctx.arc(bw * 0.38, -bh * 0.03, 3.8, 0, Math.PI * 2);
    ctx.fill();

    // Eye sparkle
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bw * 0.40, -bh * 0.07, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#ffb84d';
    ctx.shadowColor = 'rgba(255,160,60,0.5)';
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.moveTo(bw * 0.55, -bh * 0.02);
    ctx.lineTo(bw * 0.78, bh * 0.06);
    ctx.lineTo(bw * 0.55, bh * 0.14);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Beak split
    ctx.fillStyle = '#e08830';
    ctx.beginPath();
    ctx.moveTo(bw * 0.55, bh * 0.04);
    ctx.lineTo(bw * 0.72, bh * 0.1);
    ctx.lineTo(bw * 0.55, bh * 0.14);
    ctx.closePath();
    ctx.fill();

    // Wing
    const wingSwing = Math.sin(bird.wingPhase) * 0.5;
    ctx.save();
    ctx.translate(-bw * 0.08, -bh * 0.15);
    ctx.rotate(-0.3 + wingSwing);

    ctx.shadowColor = 'rgba(255,80,110,0.3)';
    ctx.shadowBlur = 8;

    const wingGrad = ctx.createLinearGradient(0, -bh * 0.2, 0, bh * 0.3);
    wingGrad.addColorStop(0, '#ff6b90');
    wingGrad.addColorStop(0.6, '#e83a58');
    wingGrad.addColorStop(1, '#b8123a');
    ctx.fillStyle = wingGrad;
    ctx.beginPath();
    ctx.ellipse(-bw * 0.1, bh * 0.05, bw * 0.32, bh * 0.4, -0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Wing glow streak
    ctx.fillStyle = 'rgba(255,140,170,0.35)';
    ctx.beginPath();
    ctx.ellipse(-bw * 0.06, bh * 0.02, bw * 0.14, bh * 0.18, -0.15, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Tail feathers
    ctx.fillStyle = '#e83a58';
    ctx.shadowColor = 'rgba(255,90,130,0.3)';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(-bw * 0.48, bh * 0.05);
    ctx.lineTo(-bw * 0.72, -bh * 0.1);
    ctx.lineTo(-bw * 0.62, bh * 0.0);
    ctx.lineTo(-bw * 0.74, bh * 0.12);
    ctx.lineTo(-bw * 0.52, bh * 0.18);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  function drawTrail() {
    for (let t of bird.trail) {
      ctx.fillStyle = `rgba(255,140,180,${t.life * 0.2})`;
      ctx.beginPath();
      ctx.arc(t.x - 2, t.y, 3 * t.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawParticles() {
    for (let p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  function drawScore() {
    ctx.save();
    ctx.font = '700 52px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(180,150,255,0.25)';
    ctx.shadowBlur = 10;
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillText(score, W / 2 + 2, 78);
    ctx.fillStyle = 'rgba(220,210,255,0.95)';
    ctx.fillText(score, W / 2, 76);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawTitleScreen() {
    drawClouds();
    drawStars();

    ctx.save();
    ctx.translate(W / 2, H * 0.28);

    const titleY = Math.sin(frame * 0.025) * 5;

    // Title shadow
    ctx.font = '800 44px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillText('Flappy Wings', 3, titleY + 3);

    // Title main — gradient
    const titleGrad = ctx.createLinearGradient(0, titleY - 20, 0, titleY + 20);
    titleGrad.addColorStop(0, '#ff6b8a');
    titleGrad.addColorStop(0.5, '#ffb84d');
    titleGrad.addColorStop(1, '#b388ff');
    ctx.fillStyle = titleGrad;
    ctx.fillText('Flappy Wings', 0, titleY);

    // Title glow
    ctx.shadowColor = 'rgba(255,120,150,0.3)';
    ctx.shadowBlur = 20;
    ctx.fillText('Flappy Wings', 0, titleY);
    ctx.shadowBlur = 0;

    ctx.font = '600 15px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = 'rgba(200,195,240,0.7)';
    ctx.fillText('Tap or press Space to fly', 0, titleY + 42);

    if (best > 0) {
      ctx.font = '600 14px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = 'rgba(180,170,220,0.4)';
      ctx.fillText(`Best: ${best}`, 0, titleY + 68);
    }

    ctx.restore();

    // Tap indicator
    const pulse = 1 + Math.sin(frame * 0.06) * 0.06;
    ctx.save();
    ctx.translate(W / 2, H * 0.62);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = 'rgba(180,160,240,0.15)';
    ctx.shadowColor = 'rgba(160,140,240,0.3)';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(0, 0, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(200,180,250,0.5)';
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(5,4,16,0.6)';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.textAlign = 'center';

    ctx.shadowColor = 'rgba(255,100,130,0.2)';
    ctx.shadowBlur = 16;
    ctx.font = '800 36px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#e0d8ff';
    ctx.fillText('Game Over', W / 2, H * 0.32);
    ctx.shadowBlur = 0;

    ctx.shadowColor = 'rgba(180,150,255,0.2)';
    ctx.shadowBlur = 12;
    ctx.font = '700 52px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = 'rgba(220,210,255,0.9)';
    ctx.fillText(score, W / 2, H * 0.44);
    ctx.shadowBlur = 0;

    ctx.font = '600 16px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = 'rgba(200,190,240,0.6)';
    ctx.fillText(`Best: ${best}`, W / 2, H * 0.52);

    if (score >= best && score > 0) {
      ctx.font = '700 15px "Segoe UI", system-ui, sans-serif';
      ctx.shadowColor = 'rgba(255,160,60,0.4)';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#ffb84d';
      ctx.fillText('\u2605 New Best! \u2605', W / 2, H * 0.59);
      ctx.shadowBlur = 0;
    }

    ctx.font = '600 15px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = 'rgba(200,190,240,0.7)';
    ctx.fillText('Tap to try again', W / 2, H * 0.70);

    ctx.restore();
  }

  /* ──── Render ──── */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    let sx = 0, sy = 0;
    if (state === 'gameover' && shakeTimer > 0) {
      const intensity = shakeTimer * 12;
      sx = (Math.random() - 0.5) * intensity;
      sy = (Math.random() - 0.5) * intensity;
    }

    ctx.save();
    ctx.translate(sx, sy);

    drawSky();

    if (state !== 'title') drawStars();

    // Far mountains
    drawMountains(layers.mountains.offset, '#130f2a', H - 62, 100, 9, 170);
    drawMountains(layers.mountains.offset + 50, '#19143a', H - 58, 85, 9, 170);

    drawClouds();

    // City silhouette
    drawCitySilhouette(layers.citySilhouette.offset);

    // Pipes
    for (let pipe of pipes) drawPipe(pipe);

    drawGround();
    drawTrail();
    drawBird();
    drawParticles();

    if (state === 'playing' || state === 'gameover') {
      drawScore();
    }

    ctx.restore();

    // Overlays (no shake)
    if (state === 'title') drawTitleScreen();
    if (state === 'gameover') drawGameOverScreen();
  }

  /* ──── Loop ──── */
  let lastTime = performance.now();

  function loop(now) {
    const rawDt = (now - lastTime) / 1000;
    lastTime = now;
    const dt = Math.min(rawDt, 0.05);

    frame++;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  resetBird();
  requestAnimationFrame(loop);
})();
</script>

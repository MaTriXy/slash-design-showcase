<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON REX — No Internet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #05010f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: ui-monospace, "Cascadia Mono", Menlo, Consolas, "Courier New", monospace;
    overflow: hidden;
  }
  #wrap {
    position: relative;
    width: min(96vw, 920px);
    aspect-ratio: 2 / 1;
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(95, 242, 255, 0.25),
      0 0 42px rgba(53, 230, 255, 0.18),
      0 24px 70px rgba(0, 0, 0, 0.7);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
    cursor: pointer;
  }
  #fx {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.028) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at center, transparent 55%, rgba(2,0,10,0.55) 100%);
    mix-blend-mode: overlay;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="fx"></div>
</div>
<script>
(() => {
"use strict";

const W = 800, H = 400, GROUND = 336;
const cv = document.getElementById("game");
const ctx = cv.getContext("2d");

function fitCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = W * dpr;
  cv.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
fitCanvas();
window.addEventListener("resize", fitCanvas);

const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const C = h => [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
const mix = (a, b, t) => `rgb(${a[0] + (b[0] - a[0]) * t | 0},${a[1] + (b[1] - a[1]) * t | 0},${a[2] + (b[2] - a[2]) * t | 0})`;
const pad5 = n => String(Math.max(0, Math.floor(n))).padStart(5, "0");
const hash = n => { const s = Math.sin(n * 127.1 + 311.7) * 43758.5453; return s - Math.floor(s); };

function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { AC = null; } }
  if (AC && AC.state === "suspended") AC.resume();
  return AC;
}
function tone(f0, f1, dur, type, vol, delay = 0) {
  const a = audio(); if (!a) return;
  const t = a.currentTime + delay;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
const sfxJump  = () => tone(420, 860, 0.10, "square", 0.10);
const sfxPoint = () => { tone(1150, 1150, 0.07, "sine", 0.14); tone(1720, 1720, 0.10, "sine", 0.12, 0.07); };
const sfxOrb   = () => tone(1350, 2100, 0.12, "triangle", 0.12);
const sfxDie   = () => { tone(220, 46, 0.28, "sawtooth", 0.22); tone(120, 30, 0.35, "square", 0.12, 0.02); };
const sfxLand  = () => tone(180, 90, 0.05, "sine", 0.05);

const BASE_SPEED = 340, MAX_SPEED = 760, ACCEL = 4.4;
const GRAVITY = 2050, JUMP_V = 645, FAST_FALL = 2500;
const SCORE_COEF = 0.028, MILESTONE = 100, INVERT_EVERY = 700;

let state = "waiting";
let t = 0;
let speed = BASE_SPEED, distance = 0, score = 0, orbBonus = 0, orbCount = 0;
let hi = parseInt(localStorage.getItem("neonRexHi") || "0", 10);
let lastMilestone = 0, flashT = 0, nextInvertAt = INVERT_EVERY;
let nightTarget = 0, night = 0;
let spawnDist = 500, lastKind = "", kindStreak = 0;
let shake = 0, deathFlash = 0, overT = 0, newBest = false;
let jumpBuffer = 0, duckHeld = false, touchY0 = null;

const dino = {
  x: 60, y: GROUND, vy: 0, onGround: true,
  runPhase: 0, duckAmt: 0, squash: 0, tilt: 0,
  blinkT: 0, blinkTimer: 2.4, dead: false, stepAcc: 0
};

const obstacles = [], orbs = [], parts = [], texts = [], clouds = [], decals = [];
const stars = [], mtPts = [], farCity = [], nearCity = [];
let mtnOff = 0, farOff = 0, nearOff = 0, gridOff = 0;

(function initScenery() {
  for (let i = 0; i < 80; i++) stars.push({ x: rand(0, W), y: rand(6, 220), r: rand(0.5, 1.6), tw: rand(1, 3.4), ph: rand(0, 6) });
  let x = 0;
  while (x < 1220) { mtPts.push({ x, h: rand(26, 96) }); x += rand(46, 110); }
  mtPts.push({ x: 1220, h: 30 });
  const buildCity = (arr, strip, minH, maxH, minW, maxW) => {
    let bx = 0;
    while (bx < strip) {
      const w = rand(minW, maxW), h = rand(minH, maxH);
      arr.push({ x: bx, w, h, seed: rand(0, 1000) });
      bx += w + rand(4, 14);
    }
  };
  buildCity(farCity, 1650, 40, 120, 26, 52);
  buildCity(nearCity, 1650, 26, 78, 34, 70);
  for (let i = 0; i < 26; i++) decals.push({ x: rand(0, W + 200), kind: randi(0, 2) });
  for (let i = 0; i < 4; i++) clouds.push(newCloud(rand(0, W)));
})();

function newCloud(x) {
  return { x, y: rand(34, 150), s: rand(0.55, 1.25), f: rand(0.14, 0.3) };
}

function reset() {
  speed = BASE_SPEED; distance = 0; score = 0; orbBonus = 0; orbCount = 0;
  lastMilestone = 0; flashT = 0; nextInvertAt = INVERT_EVERY;
  nightTarget = 0; spawnDist = 560; lastKind = ""; kindStreak = 0;
  shake = 0; deathFlash = 0; overT = 0; newBest = false; jumpBuffer = 0;
  obstacles.length = 0; orbs.length = 0; parts.length = 0; texts.length = 0;
  Object.assign(dino, { y: GROUND, vy: 0, onGround: true, runPhase: 0, duckAmt: 0, squash: 0, tilt: 0, dead: false, stepAcc: 0 });
}

function startGame() {
  reset();
  state = "playing";
  jump();
}

function jump() {
  if (dino.onGround) {
    dino.vy = -JUMP_V;
    dino.onGround = false;
    dino.squash = 0;
    burst(dino.x + 26, GROUND, 6, "#7ff3ff", 90);
    sfxJump();
  } else {
    jumpBuffer = 0.12;
  }
}

function cutJump() {
  if (!dino.onGround && dino.vy < -210) dino.vy = -210;
}

function press() {
  audio();
  if (state === "waiting") { startGame(); return; }
  if (state === "over") { if (overT > 0.45) { reset(); state = "playing"; } return; }
  jump();
}

function die() {
  state = "over";
  dino.dead = true;
  dino.vy = -275;
  dino.onGround = false;
  shake = 0.55;
  deathFlash = 0.5;
  overT = 0;
  burst(dino.x + 30, dino.y - 26, 22, "#ff5d7a", 230);
  burst(dino.x + 30, dino.y - 26, 12, "#5ff2ff", 170);
  sfxDie();
  if (score > hi) { hi = score; localStorage.setItem("neonRexHi", String(hi)); newBest = true; }
}

function burst(x, y, n, color, pow) {
  for (let i = 0; i < n; i++) {
    const a = rand(-Math.PI, 0.2), v = rand(pow * 0.3, pow);
    parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v * 0.7, life: rand(0.3, 0.8), max: 0.8, size: rand(1.4, 3.4), color, grav: 520 });
  }
}

function dust(x, y) {
  parts.push({ x, y: y - rand(0, 3), vx: rand(-70, -20), vy: rand(-46, -8), life: rand(0.25, 0.5), max: 0.5, size: rand(1.2, 2.6), color: "#9adfcf", grav: 130 });
}

function floatText(x, y, str, color) {
  texts.push({ x, y, str, color, life: 0.9 });
}

const OB_TYPES = {
  cactusS:  { minSpeed: 0,   w: 15, h: 42, weight: 4 },
  cactusL:  { minSpeed: 390, w: 21, h: 62, weight: 3 },
  robot:    { minSpeed: 430, w: 30, h: 46, weight: 2 },
  barrier:  { minSpeed: 520, w: 14, h: 66, weight: 2 },
  birdLow:  { minSpeed: 470, w: 34, h: 20, weight: 2, yMid: 300 },
  birdMid:  { minSpeed: 470, w: 34, h: 20, weight: 2, yMid: 272 },
  birdHigh: { minSpeed: 470, w: 34, h: 20, weight: 2, yMid: 240 }
};

function spawnObstacle() {
  const avail = Object.keys(OB_TYPES).filter(k => speed >= OB_TYPES[k].minSpeed && !(k === lastKind && kindStreak >= 2));
  const pool = [];
  for (const k of avail) for (let i = 0; i < OB_TYPES[k].weight; i++) pool.push(k);
  const kind = pool[randi(0, pool.length - 1)];
  const ty = OB_TYPES[kind];
  if (kind === lastKind) kindStreak++; else { lastKind = kind; kindStreak = 1; }

  let w = ty.w, h = ty.h, count = 1;
  if (kind === "cactusS" || kind === "cactusL") {
    count = randi(1, speed > 520 ? 3 : 2);
    w = ty.w * count + (count - 1) * 4;
  }
  const yTop = ty.yMid !== undefined ? ty.yMid - ty.h / 2 : GROUND - h;
  obstacles.push({ kind, x: W + 30, w, h, yTop, count, seed: rand(0, 100), sparkT: 0 });

  const gap = w + (235 + rand(0, 200)) * (0.6 + speed / 950);
  spawnDist = gap;

  if (Math.random() < 0.42) {
    const arcN = 5, cx = W + 30 + w + gap * 0.5;
    for (let i = 0; i < arcN; i++) {
      const u = (i - (arcN - 1) / 2) / ((arcN - 1) / 2);
      orbs.push({ x: cx + u * 46, y: GROUND - 30 - 72 * (1 - u * u), r: 7, ph: rand(0, 6) });
    }
  }
}

function collectOrbs() {
  const cx = dino.x + 28, cy = dino.y - lerp(26, 14, dino.duckAmt);
  for (let i = orbs.length - 1; i >= 0; i--) {
    const o = orbs[i];
    const dx = o.x - cx, dy = o.y - cy;
    if (dx * dx + dy * dy < 36 * 36) {
      orbs.splice(i, 1);
      orbBonus += 10; orbCount++;
      floatText(o.x - 6, o.y - 12, "+10", "#ffd75e");
      burst(o.x, o.y, 8, "#ffd75e", 120);
      sfxOrb();
    }
  }
}

function checkCollision() {
  const ducking = dino.duckAmt > 0.5;
  const hb = ducking
    ? { x: dino.x + 5, y: GROUND - 23, w: 49, h: 21 }
    : { x: dino.x + 12, y: dino.y - 50, w: 29, h: 48 };
  for (const o of obstacles) {
    const pad = o.kind.startsWith("bird") ? 5 : o.kind === "barrier" ? 2 : 4;
    if (hb.x < o.x + o.w - pad && hb.x + hb.w > o.x + pad &&
        hb.y < o.yTop + o.h - pad && hb.y + hb.h > o.yTop + pad) {
      die();
      return;
    }
  }
}

function update(dt) {
  t += dt;
  night += (nightTarget - night) * Math.min(1, dt * 2.2);
  if (flashT > 0) flashT -= dt;
  if (shake > 0) shake -= dt;
  if (deathFlash > 0) deathFlash -= dt * 1.4;

  const drifting = state === "playing" ? 1 : 0.12;
  mtnOff += speed * dt * 0.10 * drifting;
  farOff += speed * dt * 0.22 * drifting;
  nearOff += speed * dt * 0.40 * drifting;
  gridOff += speed * dt * drifting;

  for (const c of clouds) {
    c.x -= speed * dt * c.f * drifting;
    if (c.x < -90) Object.assign(c, newCloud(W + 80));
  }
  for (const d of decals) {
    d.x -= speed * dt * drifting;
    if (d.x < -30) { d.x = W + rand(20, 220); d.kind = randi(0, 2); }
  }

  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.life -= dt;
    if (p.life <= 0) { parts.splice(i, 1); continue; }
    p.vy += p.grav * dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
  for (let i = texts.length - 1; i >= 0; i--) {
    const tx = texts[i];
    tx.life -= dt; tx.y -= 34 * dt;
    if (tx.life <= 0) texts.splice(i, 1);
  }

  dino.blinkTimer -= dt;
  if (dino.blinkTimer <= 0) { dino.blinkT = 0.11; dino.blinkTimer = rand(1.6, 4.2); }
  if (dino.blinkT > 0) dino.blinkT -= dt;

  if (state === "over") {
    overT += dt;
    if (!dino.onGround) {
      dino.vy += GRAVITY * dt;
      dino.y += dino.vy * dt;
      if (dino.y >= GROUND) { dino.y = GROUND; dino.onGround = true; dino.vy = 0; }
    }
    return;
  }
  if (state !== "playing") return;

  speed = Math.min(MAX_SPEED, speed + ACCEL * dt);
  distance += speed * dt;
  score = Math.floor(distance * SCORE_COEF) + orbBonus;

  const ms = Math.floor(score / MILESTONE);
  if (ms > lastMilestone) { lastMilestone = ms; flashT = 1.0; sfxPoint(); }
  if (score >= nextInvertAt) { nightTarget ^= 1; nextInvertAt += INVERT_EVERY; }

  spawnDist -= speed * dt;
  if (spawnDist <= 0) spawnObstacle();

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.x -= speed * dt;
    if (o.kind === "robot") {
      o.sparkT -= dt;
      if (o.sparkT <= 0) {
        o.sparkT = rand(0.18, 0.5);
        parts.push({ x: o.x + rand(4, o.w - 4), y: o.yTop + rand(6, 20), vx: rand(-40, 40), vy: rand(-90, -20), life: 0.4, max: 0.4, size: rand(1, 2.2), color: "#ffc36b", grav: 700 });
      }
    }
    if (o.x + o.w < -40) obstacles.splice(i, 1);
  }
  for (let i = orbs.length - 1; i >= 0; i--) {
    orbs[i].x -= speed * dt;
    if (orbs[i].x < -30) orbs.splice(i, 1);
  }

  const d = dino;
  if (!d.onGround) {
    d.vy += GRAVITY * dt;
    if (duckHeld) d.vy += FAST_FALL * dt;
    d.y += d.vy * dt;
    d.tilt = clamp(d.vy * 0.00016, -0.12, 0.22);
    if (d.y >= GROUND) {
      d.y = GROUND; d.onGround = true; d.vy = 0;
      d.squash = 0.16; d.tilt = 0;
      burst(d.x + 24, GROUND, 7, "#9adfcf", 110);
      sfxLand();
      if (jumpBuffer > 0) { jumpBuffer = 0; jump(); }
    }
  }
  if (jumpBuffer > 0) jumpBuffer -= dt;

  const duckGoal = duckHeld && d.onGround ? 1 : 0;
  d.duckAmt += (duckGoal - d.duckAmt) * Math.min(1, dt * 14);
  d.squash = Math.max(0, d.squash - dt);

  if (d.onGround) {
    const freq = lerp(0.052, 0.075, d.duckAmt);
    const prev = d.runPhase;
    d.runPhase += speed * dt * freq;
    d.stepAcc += speed * dt;
    const strikeA = Math.floor(prev / Math.PI), strikeB = Math.floor(d.runPhase / Math.PI);
    if (strikeB > strikeA) dust(d.x + 18 + rand(0, 12), GROUND);
  }

  collectOrbs();
  checkCollision();
}

function drawSky() {
  const top = mix(C("#2b0f4b"), C("#040110"), night);
  const mid = mix(C("#4c1c63"), C("#0e0626"), night);
  const hor = mix(C("#ff7a45"), C("#241145"), night);
  const g = ctx.createLinearGradient(0, 0, 0, GROUND);
  g.addColorStop(0, top); g.addColorStop(0.62, mid); g.addColorStop(1, hor);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, GROUND);
}

function drawStars() {
  if (night < 0.03) return;
  for (const s of stars) {
    const a = night * (0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * s.tw + s.ph)));
    ctx.globalAlpha = a * 0.9;
    ctx.fillStyle = "#cfe9ff";
    ctx.fillRect(s.x, s.y, s.r, s.r);
  }
  ctx.globalAlpha = 1;
}

function drawSunMoon() {
  const sa = (1 - night) * 0.95;
  if (sa > 0.02) {
    ctx.save();
    ctx.globalAlpha = sa;
    const sx = 608, sy = 196, r = 58;
    ctx.shadowColor = "#ff5e8a"; ctx.shadowBlur = 40;
    const g = ctx.createLinearGradient(0, sy - r, 0, sy + r);
    g.addColorStop(0, "#ffd23d"); g.addColorStop(0.55, "#ff7a45"); g.addColorStop(1, "#ff3d81");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = mix(C("#4c1c63"), C("#0e0626"), night);
    let yy = sy + 4, hh = 3;
    while (yy < sy + r + 4) { ctx.fillRect(sx - r - 2, yy, r * 2 + 4, hh); yy += hh + 7; hh += 2.2; }
    ctx.restore();
  }
  const ma = night;
  if (ma > 0.02) {
    ctx.save();
    ctx.globalAlpha = ma;
    ctx.shadowColor = "#bfe6ff"; ctx.shadowBlur = 26;
    ctx.fillStyle = "#e9f6ff";
    ctx.beginPath(); ctx.arc(642, 84, 24, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = mix(C("#040110"), C("#040110"), 0);
    ctx.beginPath(); ctx.arc(652, 76, 21, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawMountains() {
  const off = mtnOff % 1220;
  ctx.save();
  for (let rep = -1; rep <= 0; rep++) {
    const ox = rep * 1220 - off + 1220 * (off > 0 ? 0 : 0);
    ctx.save();
    ctx.translate(-off + rep * 1220, 0);
    ctx.beginPath();
    ctx.moveTo(-4, GROUND);
    for (const p of mtPts) ctx.lineTo(p.x, GROUND - p.h);
    ctx.lineTo(1224, GROUND);
    ctx.closePath();
    ctx.fillStyle = mix(C("#3b1a5e"), C("#100828"), night);
    ctx.fill();
    ctx.strokeStyle = `rgba(255,77,240,${0.28 - night * 0.12})`;
    ctx.lineWidth = 1.4;
    ctx.stroke();
    ctx.restore();
    void ox;
  }
  ctx.restore();
}

function drawCityLayer(arr, off, strip, fill, winA) {
  ctx.save();
  for (let rep = 0; rep < 2; rep++) {
    ctx.save();
    ctx.translate(-(off % strip) + rep * strip, 0);
    for (const b of arr) {
      ctx.fillStyle = fill;
      ctx.fillRect(b.x, GROUND - b.h, b.w, b.h);
      const cols = Math.max(1, Math.floor(b.w / 12)), rows = Math.max(1, Math.floor(b.h / 16));
      for (let i = 0; i < cols; i++) for (let j = 0; j < rows; j++) {
        const hsh = hash(b.seed + i * 7.3 + j * 13.7);
        if (hsh < 0.42) {
          const flick = hsh > 0.36 ? (Math.sin(t * 4 + hsh * 90) > 0 ? 1 : 0.15) : 1;
          ctx.globalAlpha = winA * flick;
          ctx.fillStyle = hsh < 0.2 ? "#ffd75e" : "#5ff2ff";
          ctx.fillRect(b.x + 4 + i * 12, GROUND - b.h + 6 + j * 16, 4, 6);
        }
      }
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }
  ctx.restore();
}

function drawClouds() {
  for (const c of clouds) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(c.s, c.s);
    ctx.globalAlpha = lerp(0.16, 0.09, night);
    ctx.fillStyle = "#e8d8ff";
    ctx.beginPath();
    ctx.arc(0, 0, 13, 0, Math.PI * 2);
    ctx.arc(14, -5, 16, 0, Math.PI * 2);
    ctx.arc(30, 0, 12, 0, Math.PI * 2);
    ctx.arc(15, 4, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawGround() {
  const g = ctx.createLinearGradient(0, GROUND, 0, H);
  g.addColorStop(0, mix(C("#170a30"), C("#080314"), night));
  g.addColorStop(1, mix(C("#0a0418"), C("#030109"), night));
  ctx.fillStyle = g;
  ctx.fillRect(0, GROUND, W, H - GROUND);

  ctx.save();
  ctx.strokeStyle = "#35e6ff";
  ctx.shadowColor = "#35e6ff"; ctx.shadowBlur = 10;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.9;
  ctx.beginPath(); ctx.moveTo(0, GROUND + 0.5); ctx.lineTo(W, GROUND + 0.5); ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = `rgba(255,77,240,0.10)`;
  ctx.lineWidth = 1;
  for (const gy of [GROUND + 10, GROUND + 22, GROUND + 38, GROUND + 56]) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }
  const step = 42, off = gridOff % step;
  for (let x = -off; x < W + step; x += step) {
    ctx.beginPath(); ctx.moveTo(x, GROUND + 3); ctx.lineTo(x - 8, H); ctx.stroke();
  }
  ctx.restore();

  for (const d of decals) {
    ctx.save();
    ctx.translate(d.x, GROUND + randFromSeed(d.x) * 18 + 7);
    if (d.kind === 0) {
      ctx.fillStyle = "rgba(154,223,207,0.5)";
      ctx.fillRect(0, 0, 3, 2); ctx.fillRect(5, 1, 2, 2);
    } else if (d.kind === 1) {
      ctx.fillStyle = "rgba(95,242,255,0.35)";
      ctx.fillRect(0, 0, 9, 1.6);
    } else {
      ctx.strokeStyle = "rgba(255,77,240,0.4)"; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(1, -4); ctx.moveTo(3, 0); ctx.lineTo(4, -5); ctx.moveTo(6, 0); ctx.lineTo(6, -3); ctx.stroke();
    }
    ctx.restore();
  }
}
function randFromSeed(s) { return hash(Math.floor(s)); }

function drawOrb(o) {
  const pulse = 1 + 0.18 * Math.sin(t * 5 + o.ph);
  ctx.save();
  ctx.translate(o.x, o.y);
  ctx.scale(pulse, pulse);
  ctx.shadowColor = "#ffd75e"; ctx.shadowBlur = 14;
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 8);
  g.addColorStop(0, "#fff6d8"); g.addColorStop(0.5, "#ffd75e"); g.addColorStop(1, "rgba(255,160,40,0.15)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0, -8); ctx.lineTo(5.5, 0); ctx.lineTo(0, 8); ctx.lineTo(-5.5, 0);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawCactus(o) {
  ctx.save();
  const grad = ctx.createLinearGradient(0, o.yTop, 0, GROUND);
  grad.addColorStop(0, "#0f5132"); grad.addColorStop(1, "#082b1c");
  ctx.fillStyle = grad;
  ctx.strokeStyle = "#46ff9e";
  ctx.shadowColor = "#2dff8f"; ctx.shadowBlur = 12;
  ctx.lineWidth = 1.6;
  for (let i = 0; i < o.count; i++) {
    const sw = o.kind === "cactusL" ? 21 : 15;
    const sx = o.x + i * (sw + 4) + sw / 2;
    const sh = o.h * (i === 1 && o.count > 2 ? 0.82 : i === 2 ? 0.9 : 1);
    const top = GROUND - sh;
    rr(sx - sw / 2, top, sw, sh, 6); ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.lineWidth = 5.5; ctx.lineCap = "round";
    ctx.strokeStyle = "#0d4a2e";
    ctx.shadowBlur = 0;
    ctx.moveTo(sx - sw / 2 + 2, top + sh * 0.45);
    ctx.lineTo(sx - sw / 2 - 6, top + sh * 0.45);
    ctx.lineTo(sx - sw / 2 - 6, top + sh * 0.22);
    ctx.moveTo(sx + sw / 2 - 2, top + sh * 0.55);
    ctx.lineTo(sx + sw / 2 + 6, top + sh * 0.55);
    ctx.lineTo(sx + sw / 2 + 6, top + sh * 0.32);
    ctx.stroke();
    ctx.lineWidth = 1.4;
    ctx.strokeStyle = "#46ff9e";
    ctx.shadowColor = "#2dff8f"; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(sx - sw / 2 - 6, top + sh * 0.45 + 2.5); ctx.lineTo(sx - sw / 2 - 6, top + sh * 0.22);
    ctx.moveTo(sx + sw / 2 + 6, top + sh * 0.55 + 2.5); ctx.lineTo(sx + sw / 2 + 6, top + sh * 0.32);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBird(o) {
  const midY = o.yTop + o.h / 2;
  const cx = o.x + o.w / 2;
  const flap = Math.sin(t * 11 + o.seed);
  ctx.save();
  ctx.shadowColor = "#ff4df0"; ctx.shadowBlur = 12;
  const g = ctx.createLinearGradient(0, midY - 8, 0, midY + 8);
  g.addColorStop(0, "#5c1150"); g.addColorStop(1, "#2a0a2e");
  ctx.fillStyle = g;
  ctx.strokeStyle = "#ff4df0"; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 4, midY - 3);
  ctx.lineTo(cx - 4 - 15, midY - 3 - flap * 9 - 6);
  ctx.lineTo(cx - 7, midY + 1);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 2, midY - 3);
  ctx.lineTo(cx + 2 - 11, midY - 4 + flap * 7 - 7);
  ctx.lineTo(cx + 5, midY + 1);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(cx, midY, 13, 5.5, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 11, midY - 2); ctx.lineTo(cx + 19, midY); ctx.lineTo(cx + 11, midY + 2);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 6;
  ctx.fillStyle = "#ff3355";
  ctx.beginPath(); ctx.arc(cx + 6, midY - 1.5, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawRobot(o) {
  ctx.save();
  const x = o.x, base = GROUND;
  ctx.shadowColor = "#ffb14d"; ctx.shadowBlur = 12;
  ctx.fillStyle = "#2a1608";
  ctx.strokeStyle = "#ffb14d"; ctx.lineWidth = 1.6;
  rr(x + 2, base - 30, 26, 30, 4); ctx.fill(); ctx.stroke();
  rr(x + 6, base - 44, 20, 14, 3); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 16, base - 44); ctx.lineTo(x + 16, base - 51); ctx.stroke();
  ctx.fillStyle = Math.sin(t * 6 + o.seed) > 0 ? "#ff3355" : "#5e1622";
  ctx.shadowColor = "#ff3355"; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(x + 16, base - 53, 2.4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#ff3355";
  ctx.beginPath(); ctx.arc(x + 18, base - 38, 2.6, 0, Math.PI * 2); ctx.fill();
  ctx.shadowColor = "#ffb14d"; ctx.shadowBlur = 0;
  ctx.strokeStyle = "rgba(255,177,77,0.55)"; ctx.lineWidth = 1.2;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.moveTo(x + 7, base - 22 + i * 6); ctx.lineTo(x + 23, base - 22 + i * 6); ctx.stroke();
  }
  const dangle = Math.sin(t * 3.2 + o.seed) * 0.25;
  ctx.save();
  ctx.translate(x + 4, base - 26); ctx.rotate(0.9 + dangle);
  ctx.strokeStyle = "#ffb14d"; ctx.lineWidth = 3; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 12); ctx.stroke();
  ctx.restore();
  ctx.restore();
}

function drawBarrier(o) {
  ctx.save();
  const x = o.x + o.w / 2, top = o.yTop;
  ctx.shadowColor = "#ff3355"; ctx.shadowBlur = 10;
  ctx.fillStyle = "#3d0a18";
  ctx.strokeStyle = "#ff3355"; ctx.lineWidth = 1.4;
  rr(x - 5, top - 4, 10, 8, 2); ctx.fill(); ctx.stroke();
  rr(x - 5, GROUND - 6, 10, 6, 2); ctx.fill(); ctx.stroke();
  const flick = 0.65 + 0.35 * Math.sin(t * 27 + o.seed) * Math.sin(t * 13.7);
  const g = ctx.createLinearGradient(x, top, x, GROUND);
  g.addColorStop(0, `rgba(255,80,110,${0.9 * flick})`);
  g.addColorStop(0.5, `rgba(255,190,205,${0.95 * flick})`);
  g.addColorStop(1, `rgba(255,80,110,${0.9 * flick})`);
  ctx.shadowBlur = 18;
  ctx.fillStyle = g;
  ctx.fillRect(x - 1.6, top + 4, 3.2, GROUND - top - 8);
  ctx.restore();
}

function drawObstacle(o) {
  if (o.kind === "cactusS" || o.kind === "cactusL") drawCactus(o);
  else if (o.kind === "robot") drawRobot(o);
  else if (o.kind === "barrier") drawBarrier(o);
  else drawBird(o);
}

function drawDino() {
  const d = dino;
  const k = d.duckAmt;
  const idle = state === "waiting" ? Math.sin(t * 2.2) * 1.4 : 0;
  const squashY = 1 - d.squash * 0.9;
  const stretchY = !d.onGround && !d.dead ? 1.04 : 1;

  ctx.save();
  ctx.translate(d.x + 26, d.y + idle);
  ctx.rotate(d.dead ? -0.16 : d.tilt);
  ctx.scale(1 / Math.sqrt(squashY * stretchY), squashY * stretchY);

  const p = d.runPhase;
  const amp = d.onGround && state !== "over" ? lerp(1, 0.7, k) : 0.25;
  const hipX = -1, hipY = lerp(-24, -13, k);

  const bodyGrad = ctx.createLinearGradient(0, -58, 0, 0);
  bodyGrad.addColorStop(0, "#1a6d8c");
  bodyGrad.addColorStop(0.55, "#10405c");
  bodyGrad.addColorStop(1, "#0a2436");

  const legDraw = (ph, back) => {
    const sw = Math.sin(ph) * 10 * amp;
    const lift = Math.max(0, Math.cos(ph)) * 9 * amp;
    const fx = hipX + sw, fy = -lift;
    const kx = hipX + sw * 0.45 - 6.5, ky = (hipY + fy) / 2 + 2;
    ctx.save();
    if (back) ctx.globalAlpha = 0.55;
    ctx.strokeStyle = back ? "#0c2f45" : bodyGrad;
    ctx.shadowColor = "#35e6ff"; ctx.shadowBlur = back ? 6 : 10;
    ctx.lineCap = "round";
    ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(hipX, hipY); ctx.lineTo(kx, ky); ctx.stroke();
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(fx, fy); ctx.stroke();
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx + 6, fy); ctx.stroke();
    ctx.restore();
  };

  if (state === "playing" || state === "over") {
    if (d.dead) { legDraw(0.5, true); legDraw(2.6, false); }
    else { legDraw(p + Math.PI, true); legDraw(p, false); }
  } else { legDraw(0.4, true); legDraw(2.7, false); }

  ctx.shadowColor = "#35e6ff";
  ctx.shadowBlur = 15;
  ctx.fillStyle = bodyGrad;

  const tailTipY = lerp(-31, -22, k) + Math.sin(p * 0.5 + t) * 2;
  ctx.beginPath();
  ctx.moveTo(-7, lerp(-27, -13, k));
  ctx.quadraticCurveTo(-22, lerp(-27, -16, k), -31, tailTipY);
  ctx.quadraticCurveTo(-21, lerp(-34, -22, k), -6, lerp(-37, -20, k));
  ctx.closePath(); ctx.fill();

  const tcx = 2, tcy = lerp(-32, -15, k);
  ctx.save();
  ctx.translate(tcx, tcy);
  ctx.rotate(lerp(-0.33, -0.04, k));
  ctx.beginPath();
  ctx.ellipse(0, 0, lerp(13, 16, k), lerp(9.5, 7.5, k), 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const hx = lerp(14, 21, k), hy = lerp(-47, -19, k);
  ctx.beginPath(); ctx.arc(hx, hy, 7.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(hx + 2, hy - 5);
  ctx.lineTo(hx + 15, hy - 3);
  ctx.quadraticCurveTo(hx + 17.5, hy + 0.5, hx + 13.5, hy + 2.2);
  ctx.lineTo(hx + 3, hy + 2.6);
  ctx.closePath(); ctx.fill();

  if (d.dead) {
    ctx.save();
    ctx.translate(hx + 3, hy + 2.6); ctx.rotate(0.5);
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(12, 0.6); ctx.lineTo(11, 3.4); ctx.lineTo(0, 2.4);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  ctx.shadowBlur = 0;
  ctx.strokeStyle = "rgba(127,243,255,0.5)";
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.ellipse(0, 0, 0, 0, 0, 0, 0);
  ctx.moveTo(-4, lerp(-26, -11, k));
  ctx.quadraticCurveTo(4, lerp(-22, -8, k), 11, lerp(-30, -12, k));
  ctx.stroke();

  ctx.shadowColor = "#ff4df0"; ctx.shadowBlur = 8;
  ctx.fillStyle = "#ff4df0";
  const spikes = [[-15, lerp(-34, -19, k)], [-6, lerp(-40, -21, k)], [4, lerp(-42, -22, k)]];
  for (const [sx, sy] of spikes) {
    ctx.beginPath();
    ctx.moveTo(sx - 3, sy + 2); ctx.lineTo(sx, sy - 5); ctx.lineTo(sx + 3, sy + 2);
    ctx.closePath(); ctx.fill();
  }

  ctx.shadowColor = "#bdfcff"; ctx.shadowBlur = 10;
  ctx.strokeStyle = "#bdfcff";
  ctx.lineWidth = 2.6; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(hx - 5, hy - 1.6);
  ctx.lineTo(hx + 12, hy - 1.2);
  ctx.stroke();

  if (d.dead) {
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "#ff5d7a"; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(hx + 1, hy - 4); ctx.lineTo(hx + 6, hy + 1);
    ctx.moveTo(hx + 6, hy - 4); ctx.lineTo(hx + 1, hy + 1);
    ctx.stroke();
  } else {
    const er = d.blinkT > 0 ? 0.5 : 2.2;
    ctx.fillStyle = "#eafdff";
    ctx.beginPath(); ctx.arc(hx + 3, hy - 1.8, er, 0, Math.PI * 2); ctx.fill();
  }

  const armA = Math.sin(p) * 0.25 + 0.4;
  ctx.save();
  ctx.translate(lerp(9, 12, k), lerp(-29, -13, k));
  ctx.rotate(armA);
  ctx.strokeStyle = "#10405c";
  ctx.shadowColor = "#35e6ff"; ctx.shadowBlur = 6;
  ctx.lineWidth = 3.4; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(5, 4); ctx.stroke();
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(5, 4); ctx.lineTo(8, 3); ctx.moveTo(5, 4); ctx.lineTo(8, 5.4); ctx.stroke();
  ctx.restore();

  ctx.restore();
}

function drawParticles() {
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawTexts() {
  ctx.save();
  ctx.textAlign = "left";
  ctx.font = "bold 13px ui-monospace, monospace";
  for (const tx of texts) {
    ctx.globalAlpha = clamp(tx.life / 0.9, 0, 1);
    ctx.fillStyle = tx.color;
    ctx.shadowColor = tx.color; ctx.shadowBlur = 8;
    ctx.fillText(tx.str, tx.x, tx.y);
  }
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  ctx.textAlign = "right";
  ctx.font = "bold 15px ui-monospace, monospace";
  ctx.shadowColor = "#5ff2ff"; ctx.shadowBlur = 8;
  const flashOn = flashT > 0 && Math.sin(t * 24) > 0;
  ctx.fillStyle = flashOn ? "rgba(95,242,255,0.25)" : "#aefcff";
  let label = pad5(score);
  if (hi > 0) label = "HI " + pad5(hi) + "  " + label;
  ctx.fillText(label, W - 18, 28);

  ctx.textAlign = "left";
  ctx.shadowColor = "#ffd75e"; ctx.shadowBlur = 8;
  const gx = 20, gy = 24;
  const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, 7);
  g.addColorStop(0, "#fff6d8"); g.addColorStop(0.6, "#ffd75e"); g.addColorStop(1, "rgba(255,160,40,0.1)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(gx, gy - 7); ctx.lineTo(gx + 5, gy); ctx.lineTo(gx, gy + 7); ctx.lineTo(gx - 5, gy);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#ffe9a8";
  ctx.fillText("× " + orbCount, gx + 12, gy + 5);
  ctx.restore();
}

function drawStartScreen() {
  ctx.save();
  ctx.textAlign = "center";
  ctx.shadowColor = "#5ff2ff"; ctx.shadowBlur = 16;
  ctx.fillStyle = "#d9fbff";
  ctx.font = "bold 27px ui-monospace, monospace";
  ctx.fillText("N O   I N T E R N E T", W / 2, 128);
  ctx.shadowColor = "#ff4df0"; ctx.shadowBlur = 8;
  ctx.fillStyle = "#ff8df5";
  ctx.font = "11px ui-monospace, monospace";
  ctx.fillText("ERR_CONNECTION_LOST // NEON REX v2.0", W / 2, 152);
  const a = 0.45 + 0.55 * (0.5 + 0.5 * Math.sin(t * 3.4));
  ctx.globalAlpha = a;
  ctx.shadowColor = "#5ff2ff"; ctx.shadowBlur = 10;
  ctx.fillStyle = "#aefcff";
  ctx.font = "bold 14px ui-monospace, monospace";
  ctx.fillText("PRESS  SPACE  OR  TAP  TO  RUN", W / 2, 208);
  ctx.globalAlpha = 0.65;
  ctx.font = "11px ui-monospace, monospace";
  ctx.fillText("↑ / SPACE jump      ↓ duck      collect ◆ for +10", W / 2, 232);
  ctx.restore();
}

function drawGameOver() {
  const a = clamp(overT * 2.2, 0, 1);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.textAlign = "center";
  ctx.shadowColor = "#ff3355"; ctx.shadowBlur = 16;
  ctx.fillStyle = "#ffd9e0";
  ctx.font = "bold 24px ui-monospace, monospace";
  ctx.fillText("G A M E   O V E R", W / 2, 118);
  ctx.shadowColor = "#5ff2ff"; ctx.shadowBlur = 8;
  ctx.fillStyle = "#aefcff";
  ctx.font = "bold 14px ui-monospace, monospace";
  ctx.fillText("SCORE " + pad5(score) + "     HI " + pad5(hi), W / 2, 150);
  if (newBest) {
    ctx.globalAlpha = a * (0.5 + 0.5 * Math.sin(t * 6));
    ctx.shadowColor = "#ffd75e"; ctx.shadowBlur = 12;
    ctx.fillStyle = "#ffd75e";
    ctx.font = "bold 13px ui-monospace, monospace";
    ctx.fillText("★ NEW BEST ★", W / 2, 174);
    ctx.globalAlpha = a;
  }
  const bx = W / 2, by = 222;
  const pulse = 1 + 0.06 * Math.sin(t * 4);
  ctx.save();
  ctx.translate(bx, by); ctx.scale(pulse, pulse);
  ctx.shadowColor = "#5ff2ff"; ctx.shadowBlur = 14;
  ctx.strokeStyle = "#5ff2ff"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI * 2); ctx.stroke();
  ctx.lineWidth = 3.4; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(0, 0, 11, -0.6, Math.PI * 1.35); ctx.stroke();
  ctx.fillStyle = "#5ff2ff";
  ctx.beginPath();
  ctx.moveTo(11, -13); ctx.lineTo(19, -10); ctx.lineTo(12, -4);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = a * (0.5 + 0.4 * Math.sin(t * 3.4));
  ctx.fillStyle = "#aefcff";
  ctx.font = "11px ui-monospace, monospace";
  ctx.shadowColor = "#5ff2ff"; ctx.shadowBlur = 6;
  ctx.fillText("SPACE / TAP TO RETRY", W / 2, 272);
  ctx.restore();
}

function render() {
  ctx.save();
  if (shake > 0) {
    const m = shake * 14;
    ctx.translate(rand(-m, m), rand(-m, m));
  }
  drawSky();
  drawStars();
  drawSunMoon();
  drawMountains();
  drawCityLayer(farCity, farOff, 1650, mix(C("#1e1040"), C("#0b0620"), night), 0.4);
  drawCityLayer(nearCity, nearOff, 1650, mix(C("#150a2e"), C("#070312"), night), 0.65);
  drawClouds();
  drawGround();

  for (const o of orbs) drawOrb(o);
  for (const o of obstacles) drawObstacle(o);
  drawDino();
  drawParticles();
  drawTexts();

  if (speed > 560 && state === "playing") {
    ctx.save();
    ctx.globalAlpha = Math.min(0.16, (speed - 560) / 1200);
    ctx.strokeStyle = "#aefcff"; ctx.lineWidth = 1.4;
    for (let i = 0; i < 6; i++) {
      const y = 60 + hash(i * 3.3 + Math.floor(t * 9)) * 260;
      const x = W - ((t * speed * 3 + i * 260) % (W + 200));
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 70, y); ctx.stroke();
    }
    ctx.restore();
  }

  ctx.restore();

  if (deathFlash > 0) {
    ctx.fillStyle = `rgba(255,45,85,${deathFlash * 0.45})`;
    ctx.fillRect(0, 0, W, H);
  }

  drawHUD();
  if (state === "waiting") drawStartScreen();
  if (state === "over") drawGameOver();
}

window.addEventListener("keydown", e => {
  if (["Space", "ArrowUp", "ArrowDown", "KeyW", "KeyS"].includes(e.code)) e.preventDefault();
  if (e.repeat) return;
  if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW" || e.code === "Enter") press();
  if (e.code === "ArrowDown" || e.code === "KeyS") { duckHeld = true; audio(); }
});
window.addEventListener("keyup", e => {
  if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") cutJump();
  if (e.code === "ArrowDown" || e.code === "KeyS") duckHeld = false;
});

cv.addEventListener("pointerdown", e => {
  e.preventDefault();
  touchY0 = e.clientY;
  if (state === "over" && overT > 0.45) {
    const r = cv.getBoundingClientRect();
    const mx = (e.clientX - r.left) * (W / r.width), my = (e.clientY - r.top) * (H / r.height);
    const dx = mx - W / 2, dy = my - 222;
    if (dx * dx + dy * dy < 40 * 40) { reset(); state = "playing"; return; }
  }
  press();
});
cv.addEventListener("pointermove", e => {
  if (touchY0 !== null && e.clientY - touchY0 > 26) duckHeld = true;
});
const endTouch = () => { touchY0 = null; duckHeld = false; cutJump(); };
cv.addEventListener("pointerup", endTouch);
cv.addEventListener("pointercancel", endTouch);
cv.addEventListener("contextmenu", e => e.preventDefault());

let last = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 1 / 30) dt = 1 / 30;
  if (dt <= 0) return;
  update(dt);
  render();
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>

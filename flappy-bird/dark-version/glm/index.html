<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Flappy Bird</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: radial-gradient(120% 120% at 50% 0%, #142a3e 0%, #0b1226 55%, #060a14 100%);
    font-family: "Rajdhani", system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  #game {
    display: block;
    border-radius: 18px;
    background: #070b1a;
    box-shadow:
      0 2px 0 rgba(255,255,255,0.05) inset,
      0 0 0 1px rgba(47,214,198,0.14),
      0 30px 80px -20px rgba(0,0,0,0.8),
      0 0 70px -12px rgba(47,214,198,0.18);
    touch-action: none;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="game" width="400" height="600" aria-label="Flappy Bird game"></canvas>
<script>
(() => {
  "use strict";

  // ---- World constants ----
  const W = 400, H = 600;
  const GROUND_H = 104;
  const SCROLL = 136;
  const GRAV = 1250;
  const FLAP_V = -388;
  const PIPE_W = 64;
  const GAP_H = 170;
  const SPAWN = 1.5;
  const GAP_MARGIN = 72;
  const BIRD_X = 112;
  const BIRD_R = 11;          // forgiving hitbox
  const GRID_X = 40, GRID_Y = 26;
  const TRAIL_MAX = 12;

  // ---- Canvas / scaling ----
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  let dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  let sx = 1, sy = 1;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    const pad = 18, vw = window.innerWidth, vh = window.innerHeight;
    const scale = Math.min((vw - pad * 2) / W, (vh - pad * 2) / H);
    const cssW = Math.round(W * scale);
    const cssH = Math.round(H * scale);
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    sx = canvas.width / W;
    sy = canvas.height / H;
  }
  window.addEventListener("resize", resize);

  // ---- Utils ----
  const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
  const rand = (a, b) => a + Math.random() * (b - a);
  const TAU = Math.PI * 2;

  // ---- State ----
  const STATE = { READY: "ready", PLAY: "play", DEAD: "dead", OVER: "over" };
  let state = STATE.READY;
  let perfTime = 0;

  const bird = {
    x: BIRD_X, y: H * 0.45, vy: 0, rot: 0, wing: 0,
    blinkTimer: 2.4, blinkClose: 0
  };

  let pipes = [];
  let spawnT = 0;
  let score = 0;
  let best = parseInt(localStorage.getItem("flappy_best") || "0", 10) || 0;
  let scorePop = 0;
  let newBest = false;

  let groundX = 0, hillFarX = 0, hillNearX = 0;
  let stars = [];
  let trail = [];
  let particles = [];

  let flash = 0, shakeT = 0, shakeMag = 0, overT = 0;

  const reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---- Sound ----
  const Sound = {
    ac: null, muted: false,
    init() {
      if (this.ac) { if (this.ac.state === "suspended") this.ac.resume(); return; }
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) this.ac = new AC();
    },
    tone(freq, dur, type, vol, slideTo, when) {
      if (this.muted || !this.ac) return;
      const t0 = this.ac.currentTime + (when || 0);
      const o = this.ac.createOscillator();
      const g = this.ac.createGain();
      o.type = type || "square";
      o.frequency.setValueAtTime(freq, t0);
      if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t0 + dur);
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(this.ac.destination);
      o.start(t0); o.stop(t0 + dur + 0.03);
    },
    flap() { this.tone(540, 0.10, "square", 0.05, 300); },
    score() { this.tone(680, 0.09, "square", 0.06); this.tone(910, 0.11, "square", 0.06, null, 0.07); },
    hit() { this.tone(190, 0.18, "sawtooth", 0.09, 70); },
    die() { this.tone(120, 0.34, "sawtooth", 0.07, 55); }
  };

  // ---- Stars ----
  function initStars() {
    stars = [];
    const n = reduced ? 40 : 70;
    for (let i = 0; i < n; i++) {
      const big = Math.random() < 0.12;
      stars.push({
        x: rand(0, W), y: rand(20, H - GROUND_H - 30),
        r: big ? rand(1.8, 2.6) : rand(0.5, 1.4),
        big, a: rand(0.45, 1), sp: rand(0.5, 2.4), ph: rand(0, TAU)
      });
    }
  }

  // ---- Pipes ----
  function spawnPipe() {
    const min = GAP_MARGIN;
    const max = H - GROUND_H - GAP_H - GAP_MARGIN;
    pipes.push({ x: W + 24, gapTop: rand(min, max), scored: false });
  }

  // ---- Particles ----
  function spawnPuff() {
    if (reduced) return;
    for (let i = 0; i < 4; i++) {
      particles.push({
        x: bird.x - 8, y: bird.y + 6, vx: rand(-30, -8), vy: rand(-12, 18),
        life: 0.45, max: 0.45, size: rand(2.5, 5), col: "rgba(180,240,230,0.9)", g: -40
      });
    }
  }
  function spawnSparkle() {
    const k = reduced ? 4 : 9;
    for (let i = 0; i < k; i++) {
      const a = rand(0, TAU), sp = rand(40, 120);
      particles.push({
        x: bird.x + 8, y: bird.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30,
        life: 0.6, max: 0.6, size: rand(2.5, 5), col: "rgba(255,207,90,0.95)", g: 120, star: true
      });
    }
  }
  function spawnFeathers() {
    if (reduced) return;
    for (let i = 0; i < 7; i++) {
      particles.push({
        x: bird.x, y: bird.y, vx: rand(-70, 70), vy: rand(-90, -20),
        life: 0.9, max: 0.9, size: rand(2.5, 5), col: "rgba(255,180,60,0.95)", g: 300, star: true
      });
    }
  }
  function updateParticles(dt) {
    for (const p of particles) {
      p.vy += (p.g || 0) * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);
  }

  // ---- Flow ----
  function resetGame() {
    bird.x = BIRD_X; bird.y = H * 0.45; bird.vy = 0; bird.rot = 0; bird.wing = 0;
    pipes = []; spawnT = 0.6; score = 0; scorePop = 0; newBest = false;
    trail = []; particles = []; flash = 0; shakeT = 0; overT = 0;
    state = STATE.READY;
  }
  function startPlay() {
    state = STATE.PLAY;
    flap();
  }
  function flap() {
    bird.vy = FLAP_V;
    bird.wing = 0;
    Sound.flap();
    spawnPuff();
  }
  function die() {
    if (state !== STATE.PLAY) return;
    state = STATE.DEAD;
    Sound.hit();
    flash = 1; shakeT = 0.42; shakeMag = 9;
    bird.vy = -150;
    spawnFeathers();
  }
  function land() {
    state = STATE.OVER;
    overT = 0;
    Sound.die();
    if (score > best) { best = score; newBest = true; localStorage.setItem("flappy_best", String(best)); }
    else newBest = false;
  }

  // ---- Update ----
  function updateBlink(dt) {
    bird.blinkTimer -= dt;
    if (bird.blinkTimer <= 0) { bird.blinkTimer = rand(1.8, 4.2); bird.blinkClose = 0.13; }
    if (bird.blinkClose > 0) bird.blinkClose -= dt;
  }

  function update(dt) {
    perfTime += dt;
    if (state === STATE.READY) {
      groundX += SCROLL * dt;
      hillFarX += SCROLL * 0.25 * dt;
      hillNearX += SCROLL * 0.55 * dt;
      updateParticles(dt);
      bird.y = H * 0.45 + Math.sin(perfTime * 2) * 9;
      bird.wing += dt * 9;
      bird.rot = Math.sin(perfTime * 2) * 0.08;
      updateBlink(dt);
    } else if (state === STATE.PLAY) {
      groundX += SCROLL * dt;
      hillFarX += SCROLL * 0.25 * dt;
      hillNearX += SCROLL * 0.55 * dt;
      updateParticles(dt);

      bird.vy += GRAV * dt;
      bird.y += bird.vy * dt;
      const target = bird.vy < 0 ? -0.5 : clamp(bird.vy / 950, -0.3, 1.45);
      bird.rot += (target - bird.rot) * Math.min(1, dt * 11);
      bird.wing += dt * (bird.vy < 0 ? 28 : 13);
      updateBlink(dt);

      trail.push({ x: bird.x, y: bird.y, life: 0.3 });
      if (trail.length > TRAIL_MAX) trail.shift();

      if (bird.y < BIRD_R) { bird.y = BIRD_R; bird.vy = 0; }

      spawnT -= dt;
      if (spawnT <= 0) { spawnPipe(); spawnT = SPAWN; }
      for (const p of pipes) {
        p.x -= SCROLL * dt;
        if (!p.scored && p.x + PIPE_W < BIRD_X) {
          p.scored = true; score++; scorePop = 1; Sound.score(); spawnSparkle();
        }
      }
      pipes = pipes.filter(p => p.x > -PIPE_W - 24);

      if (bird.y + BIRD_R >= H - GROUND_H) {
        bird.y = H - GROUND_H - BIRD_R; die(); land();
      } else {
        for (const p of pipes) {
          const topHit = circleRect(BIRD_X, bird.y, BIRD_R, p.x, 0, PIPE_W, p.gapTop);
          const botHit = circleRect(BIRD_X, bird.y, BIRD_R, p.x, p.gapTop + GAP_H, PIPE_W, (H - GROUND_H) - (p.gapTop + GAP_H));
          if (topHit || botHit) { die(); break; }
        }
      }
    } else if (state === STATE.DEAD) {
      updateParticles(dt);
      bird.vy += GRAV * dt;
      bird.y += bird.vy * dt;
      bird.rot += (1.5 - bird.rot) * Math.min(1, dt * 8);
      trail.push({ x: bird.x, y: bird.y, life: 0.3 });
      if (trail.length > TRAIL_MAX) trail.shift();
      if (bird.y + BIRD_R >= H - GROUND_H) { bird.y = H - GROUND_H - BIRD_R; land(); }
    } else if (state === STATE.OVER) {
      overT += dt;
      updateParticles(dt);
    }

    for (const t of trail) t.life -= dt;
    trail = trail.filter(t => t.life > 0);

    if (scorePop > 0) scorePop -= dt * 2.6;
    if (flash > 0) flash -= dt * 4;
    if (shakeT > 0) shakeT -= dt;
  }

  function circleRect(cx, cy, r, rx, ry, rw, rh) {
    const nx = clamp(cx, rx, rx + rw);
    const ny = clamp(cy, ry, ry + rh);
    const dx = cx - nx, dy = cy - ny;
    return dx * dx + dy * dy < r * r;
  }

  // ---- Render helpers ----
  function drawSky() {
    const g = ctx.createLinearGradient(0, -14, 0, H + 14);
    g.addColorStop(0, "#070b1a");
    g.addColorStop(0.45, "#0d1c33");
    g.addColorStop(0.8, "#16314a");
    g.addColorStop(1, "#1d3a4e");
    ctx.fillStyle = g;
    ctx.fillRect(-14, -14, W + 28, H + 28);
    // warm horizon haze
    const hg = ctx.createRadialGradient(W * 0.5, H - GROUND_H + 10, 20, W * 0.5, H - GROUND_H + 10, 280);
    hg.addColorStop(0, "rgba(255,160,80,0.10)");
    hg.addColorStop(1, "rgba(255,160,80,0)");
    ctx.fillStyle = hg;
    ctx.fillRect(-14, -14, W + 28, H + 28);
  }

  function drawMoon() {
    const cx = W - 72, cy = 82;
    const halo = ctx.createRadialGradient(cx, cy, 10, cx, cy, 92);
    halo.addColorStop(0, "rgba(246,239,217,0.30)");
    halo.addColorStop(1, "rgba(246,239,217,0)");
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(cx, cy, 92, 0, TAU); ctx.fill();
    ctx.shadowColor = "rgba(246,239,217,0.55)"; ctx.shadowBlur = 24;
    ctx.fillStyle = "#f6efd9";
    ctx.beginPath(); ctx.arc(cx, cy, 26, 0, TAU); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    ctx.fillStyle = "rgba(170,160,130,0.32)";
    ctx.beginPath(); ctx.arc(cx - 8, cy - 6, 4, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 6, cy + 8, 3, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 9, cy - 9, 2.4, 0, TAU); ctx.fill();
  }

  function drawStar(s) {
    const tw = 0.5 + 0.5 * Math.sin(perfTime * s.sp + s.ph);
    ctx.globalAlpha = clamp(s.a * tw, 0, 1);
    if (s.big) {
      ctx.shadowColor = "rgba(180,230,255,0.8)"; ctx.shadowBlur = 6;
    }
    ctx.fillStyle = "#eaf6ff";
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    ctx.globalAlpha = 1;
  }

  function drawRidges(offset, baseY, color, r, step, edgeColor) {
    const off = ((offset % step) + step) % step;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-r - off, baseY + r);
    for (let x = -r - off; x < W + r; x += step) {
      ctx.arc(x + r, baseY, r, Math.PI, 0, false);
      ctx.lineTo(x + step, baseY + r);
    }
    ctx.lineTo(W + r, H);
    ctx.lineTo(-r - off, H);
    ctx.closePath();
    ctx.fill();
    if (edgeColor) {
      ctx.shadowColor = edgeColor; ctx.shadowBlur = 8;
      ctx.strokeStyle = edgeColor; ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let x = -r - off; x < W + r; x += step) {
        ctx.arc(x + r, baseY, r, Math.PI, 0, false);
      }
      ctx.stroke();
      ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    }
  }

  function pillarBody(x, y, w, h, core, rim) {
    if (h <= 0) return;
    roundRect(x, y, w, h, 6);
    ctx.fillStyle = core; ctx.fill();
    ctx.save();
    ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
    ctx.strokeStyle = "rgba(47,214,198,0.22)"; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 12, y); ctx.lineTo(x + 12, y + h);
    ctx.moveTo(x + w - 14, y); ctx.lineTo(x + w - 14, y + h);
    ctx.stroke();
    ctx.shadowColor = rim; ctx.shadowBlur = 12;
    ctx.strokeStyle = rim; ctx.lineWidth = 2.5;
    roundRect(x, y, w, h, 6); ctx.stroke();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    ctx.restore();
  }

  function pillarCap(x, y, w, h, fill, rim, topCap) {
    roundRect(x, y, w, h, 7);
    ctx.fillStyle = fill; ctx.fill();
    ctx.shadowColor = rim; ctx.shadowBlur = 16;
    ctx.strokeStyle = rim; ctx.lineWidth = 2.5;
    roundRect(x, y, w, h, 7); ctx.stroke();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    const ey = topCap ? y + h - 3 : y + 3;
    ctx.shadowColor = rim; ctx.shadowBlur = 14;
    ctx.strokeStyle = "#bff8f0"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x + 4, ey); ctx.lineTo(x + w - 4, ey); ctx.stroke();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
  }

  function drawPillar(p) {
    const x = p.x, top = p.gapTop, bot = p.gapTop + GAP_H;
    const groundTop = H - GROUND_H;
    const capH = 28, capW = PIPE_W + 14;
    const core = "#0b1626", rim = "#2fd6c6", capFill = "#0e2c44", capRim = "#5ef2e2";
    pillarBody(x, -6, PIPE_W, top - capH + 6, core, rim);
    pillarCap(x - 7, top - capH, capW, capH, capFill, capRim, true);
    pillarBody(x, bot + capH, PIPE_W, groundTop - (bot + capH) + 6, core, rim);
    pillarCap(x - 7, bot, capW, capH, capFill, capRim, false);
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawGrid() {
    const top = H - GROUND_H;
    const g = ctx.createLinearGradient(0, top, 0, H);
    g.addColorStop(0, "#0c1c2e");
    g.addColorStop(1, "#070d18");
    ctx.fillStyle = g;
    ctx.fillRect(-14, top, W + 28, GROUND_H + 14);

    const off = ((groundX % GRID_X) + GRID_X) % GRID_X;
    ctx.strokeStyle = "rgba(47,214,198,0.16)"; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = -off; x < W + GRID_X; x += GRID_X) { ctx.moveTo(x, top); ctx.lineTo(x, H); }
    for (let y = top; y < H; y += GRID_Y) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();

    ctx.shadowColor = "#2fd6c6"; ctx.shadowBlur = 14;
    ctx.strokeStyle = "#3ff0e0"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(-14, top); ctx.lineTo(W + 14, top); ctx.stroke();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
  }

  function drawBird() {
    // comet trail
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const k = i / trail.length;
      ctx.globalAlpha = clamp(t.life / 0.3, 0, 1) * 0.5 * (1 - k);
      ctx.shadowColor = "rgba(255,180,60,0.8)"; ctx.shadowBlur = 12;
      ctx.fillStyle = "#ffcf5a";
      ctx.beginPath(); ctx.arc(t.x, t.y, 9 * (1 - k * 0.6), 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.shadowColor = "transparent";

    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);

    // glowing body
    ctx.shadowColor = "rgba(255,180,60,0.9)"; ctx.shadowBlur = 18;
    const bg = ctx.createRadialGradient(-3, -3, 2, 0, 0, 16);
    bg.addColorStop(0, "#fff4cf");
    bg.addColorStop(0.5, "#ffcf5a");
    bg.addColorStop(1, "#ff9d2f");
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(0, 0, 14, 0, TAU); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";

    ctx.fillStyle = "rgba(255,244,207,0.55)";
    ctx.beginPath(); ctx.arc(2, 3, 7, 0, TAU); ctx.fill();

    // wing
    const wAng = Math.sin(bird.wing) * 0.8 - 0.1;
    ctx.save();
    ctx.translate(-2, 1);
    ctx.rotate(wAng);
    ctx.fillStyle = "#f0a020";
    ctx.beginPath();
    ctx.moveTo(2, -2); ctx.lineTo(-9, 0); ctx.lineTo(2, 4); ctx.closePath(); ctx.fill();
    ctx.restore();

    // eye (cool cyan on warm body)
    const blinking = bird.blinkClose > 0;
    if (blinking) {
      ctx.strokeStyle = "#0b1226"; ctx.lineWidth = 2; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(5, -5); ctx.lineTo(11, -5); ctx.stroke();
    } else {
      ctx.fillStyle = "#0b1226";
      ctx.beginPath(); ctx.arc(8, -5, 4.2, 0, TAU); ctx.fill();
      ctx.fillStyle = "#bff8f0";
      ctx.beginPath(); ctx.arc(8, -5, 2.4, 0, TAU); ctx.fill();
      ctx.fillStyle = "#0b1226";
      ctx.beginPath(); ctx.arc(8.8, -4.4, 1.2, 0, TAU); ctx.fill();
    }

    // beak
    ctx.fillStyle = "#ff9d2f";
    ctx.beginPath();
    ctx.moveTo(12, -2); ctx.lineTo(21, 0); ctx.lineTo(12, 3); ctx.closePath(); ctx.fill();

    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      const a = clamp(p.life / p.max, 0, 1);
      ctx.globalAlpha = a;
      ctx.shadowColor = p.col; ctx.shadowBlur = 8;
      ctx.fillStyle = p.col;
      if (p.star) {
        star(p.x, p.y, p.size, p.size * 0.45, 5);
        ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, TAU); ctx.fill();
      }
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
  }

  function star(cx, cy, outer, inner, points) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? outer : inner;
      const a = (i / (points * 2)) * TAU - Math.PI / 2;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  function drawScore() {
    const s = 1 + Math.max(0, scorePop) * 0.4;
    ctx.save();
    ctx.translate(W / 2, 74);
    ctx.scale(s, s);
    ctx.font = "900 52px Orbitron, system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(255,180,60,0.9)"; ctx.shadowBlur = 16;
    ctx.lineWidth = 6;
    ctx.strokeStyle = "rgba(8,14,28,0.85)";
    ctx.strokeText(String(score), 0, 0);
    ctx.shadowBlur = 12;
    ctx.fillStyle = "#fff4cf";
    ctx.fillText(String(score), 0, 0);
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    ctx.restore();
  }

  function drawReady() {
    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.font = "900 44px Orbitron, system-ui, sans-serif";
    ctx.shadowColor = "rgba(255,180,60,0.8)"; ctx.shadowBlur = 18;
    ctx.lineWidth = 7;
    ctx.strokeStyle = "rgba(8,14,28,0.8)";
    ctx.strokeText("Flappy Bird", W / 2, 148);
    ctx.shadowBlur = 14;
    ctx.fillStyle = "#ffcf5a";
    ctx.fillText("Flappy Bird", W / 2, 148);
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";

    ctx.strokeStyle = "rgba(47,214,198,0.7)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W / 2 - 60, 170); ctx.lineTo(W / 2 + 60, 170); ctx.stroke();

    const hy = H * 0.45 + 96;
    ctx.font = "600 18px Rajdhani, system-ui, sans-serif";
    const label = "Tap to start";
    const tw = ctx.measureText(label).width + 44;
    roundRect(W / 2 - tw / 2, hy - 22, tw, 44, 22);
    ctx.fillStyle = "rgba(10,18,36,0.7)"; ctx.fill();
    ctx.shadowColor = "rgba(47,214,198,0.6)"; ctx.shadowBlur = 12;
    ctx.strokeStyle = "rgba(47,214,198,0.7)"; ctx.lineWidth = 1.5;
    roundRect(W / 2 - tw / 2, hy - 22, tw, 44, 22); ctx.stroke();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    ctx.fillStyle = "#ffcf5a";
    ctx.fillText(label, W / 2, hy);

    const ay = hy + 46 + Math.sin(perfTime * 4) * 5;
    ctx.shadowColor = "rgba(255,180,60,0.7)"; ctx.shadowBlur = 10;
    ctx.fillStyle = "rgba(255,207,90,0.9)";
    ctx.beginPath();
    ctx.moveTo(W / 2 - 9, ay); ctx.lineTo(W / 2 + 9, ay); ctx.lineTo(W / 2, ay + 11);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";

    if (best > 0) {
      ctx.font = "600 15px Rajdhani, system-ui, sans-serif";
      ctx.fillStyle = "rgba(180,210,235,0.85)";
      ctx.fillText("BEST  " + best, W / 2, 196);
    }
    ctx.restore();
  }

  function medalTier(s) {
    if (s >= 40) return { a: "#dffbff", b: "#7fe9e0", c: "#3fd6c6" };
    if (s >= 20) return { a: "#fff4cf", b: "#ffcf5a", c: "#e09a2a" };
    if (s >= 10) return { a: "#eef4fa", b: "#b9c6d6", c: "#8499ad" };
    if (s >= 5) return { a: "#f0c79a", b: "#cd8b4e", c: "#a96f33" };
    return null;
  }

  function drawMedal(cx, cy, tier) {
    ctx.shadowColor = tier.b; ctx.shadowBlur = 16;
    const g = ctx.createRadialGradient(cx - 6, cy - 6, 4, cx, cy, 26);
    g.addColorStop(0, tier.a);
    g.addColorStop(0.6, tier.b);
    g.addColorStop(1, tier.c);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, 24, 0, TAU); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, 17, 0, TAU); ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    star(cx, cy, 10, 4.4, 5); ctx.fill();
  }

  function drawOver() {
    ctx.fillStyle = "rgba(6,10,20,0.55)";
    ctx.fillRect(0, 0, W, H);

    const cw = 304, ch = 232;
    const cx0 = (W - cw) / 2, cy0 = (H - ch) / 2 - 14;
    const ease = clamp(overT / 0.32, 0, 1);
    const pop = 0.86 + 0.14 * easeOutBack(ease);

    ctx.save();
    ctx.translate(W / 2, cy0 + ch / 2);
    ctx.scale(pop, pop);
    ctx.translate(-W / 2, -(cy0 + ch / 2));

    ctx.shadowColor = "rgba(47,214,198,0.4)"; ctx.shadowBlur = 24;
    ctx.fillStyle = "rgba(10,18,36,0.82)";
    roundRect(cx0, cy0, cw, ch, 18); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    ctx.strokeStyle = "rgba(47,214,198,0.5)"; ctx.lineWidth = 1.5;
    roundRect(cx0, cy0, cw, ch, 18); ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,0.06)"; ctx.lineWidth = 1;
    roundRect(cx0 + 1, cy0 + 1, cw - 2, ch - 2, 17); ctx.stroke();

    ctx.shadowColor = "rgba(255,180,60,0.7)"; ctx.shadowBlur = 14;
    ctx.fillStyle = "#ffcf5a";
    roundRect(cx0 + (cw - 150) / 2, cy0 - 15, 150, 30, 14); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    ctx.fillStyle = "#0b1226";
    ctx.font = "700 15px Orbitron, system-ui, sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("GAME OVER", cx0 + cw / 2, cy0 + 1);

    const tier = medalTier(score);
    if (tier) drawMedal(cx0 + 56, cy0 + 124, tier);
    else {
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.beginPath(); ctx.arc(cx0 + 56, cy0 + 124, 24, 0, TAU); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx0 + 56, cy0 + 124, 24, 0, TAU); ctx.stroke();
      ctx.fillStyle = "rgba(180,210,235,0.5)";
      ctx.font = "600 11px Rajdhani, system-ui, sans-serif";
      ctx.fillText("NO MEDAL", cx0 + 56, cy0 + 124);
    }

    ctx.textAlign = "right";
    ctx.fillStyle = "rgba(120,170,200,0.9)";
    ctx.font = "600 13px Rajdhani, system-ui, sans-serif";
    ctx.fillText("SCORE", cx0 + cw - 24, cy0 + 82);
    ctx.fillText("BEST", cx0 + cw - 24, cy0 + 140);
    ctx.shadowColor = "rgba(255,180,60,0.5)"; ctx.shadowBlur = 10;
    ctx.fillStyle = "#eaf4ff";
    ctx.font = "700 30px Orbitron, system-ui, sans-serif";
    ctx.fillText(String(score), cx0 + cw - 24, cy0 + 108);
    ctx.fillText(String(best), cx0 + cw - 24, cy0 + 166);
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";

    if (newBest) {
      ctx.save();
      ctx.translate(cx0 + cw - 58, cy0 + 132);
      ctx.rotate(-0.12);
      ctx.shadowColor = "rgba(255,180,60,0.8)"; ctx.shadowBlur = 12;
      ctx.fillStyle = "#ffcf5a";
      roundRect(-36, -11, 72, 22, 11); ctx.fill();
      ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
      ctx.fillStyle = "#0b1226";
      ctx.textAlign = "center";
      ctx.font = "700 11px Orbitron, system-ui, sans-serif";
      ctx.fillText("NEW BEST", 0, 0);
      ctx.restore();
    }

    const by = cy0 + ch - 46;
    const bw = 190, bh = 46, bx = (W - bw) / 2;
    const pulse = 0.5 + 0.5 * Math.sin(perfTime * 3);
    ctx.shadowColor = "rgba(47,214,198," + (0.35 + 0.3 * pulse) + ")"; ctx.shadowBlur = 14 + 8 * pulse;
    ctx.fillStyle = "rgba(12,22,40,0.9)";
    roundRect(bx, by, bw, bh, 22); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    ctx.strokeStyle = "rgba(47,214,198,0.8)"; ctx.lineWidth = 1.5;
    roundRect(bx, by, bw, bh, 22); ctx.stroke();
    ctx.fillStyle = "#ffcf5a";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "700 17px Orbitron, system-ui, sans-serif";
    ctx.fillText("PLAY AGAIN", W / 2, by + bh / 2);

    ctx.restore();
  }

  function easeOutBack(t) {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  function drawMute() {
    const cx = W - 30, cy = 30, r = 15;
    ctx.fillStyle = "rgba(10,18,36,0.7)";
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.fill();
    ctx.shadowColor = "rgba(47,214,198,0.5)"; ctx.shadowBlur = 10;
    ctx.strokeStyle = "rgba(47,214,198,0.7)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.stroke();
    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
    ctx.fillStyle = "#ffcf5a";
    ctx.beginPath();
    ctx.moveTo(cx - 7, cy - 3); ctx.lineTo(cx - 2, cy - 3);
    ctx.lineTo(cx + 3, cy - 7); ctx.lineTo(cx + 3, cy + 7);
    ctx.lineTo(cx - 2, cy + 3); ctx.lineTo(cx - 7, cy + 3);
    ctx.closePath(); ctx.fill();
    if (Sound.muted) {
      ctx.strokeStyle = "#ff5d73"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(cx - 8, cy - 8); ctx.lineTo(cx + 9, cy + 9); ctx.stroke();
    } else {
      ctx.strokeStyle = "#ffcf5a"; ctx.lineWidth = 1.8; ctx.lineCap = "round";
      ctx.beginPath(); ctx.arc(cx + 4, cy, 6, -0.6, 0.6); ctx.stroke();
    }
  }

  // ---- Render ----
  function render() {
    ctx.setTransform(sx, 0, 0, sy, 0, 0);
    ctx.clearRect(0, 0, W, H);

    let shx = 0, shy = 0;
    if (shakeT > 0) {
      const m = shakeMag * (shakeT / 0.42);
      shx = (Math.random() * 2 - 1) * m;
      shy = (Math.random() * 2 - 1) * m;
    }
    ctx.save();
    ctx.setTransform(sx, 0, 0, sy, shx * sx, shy * sy);
    drawSky();
    drawMoon();
    for (const s of stars) drawStar(s);
    drawRidges(hillFarX, H - GROUND_H + 8, "#0e2138", 80, 160, "rgba(47,214,198,0.22)");
    drawRidges(hillNearX, H - GROUND_H + 18, "#0a1830", 46, 92, "rgba(47,214,198,0.3)");
    for (const p of pipes) drawPillar(p);
    drawGrid();
    drawBird();
    drawParticles();
    ctx.restore();

    ctx.setTransform(sx, 0, 0, sy, 0, 0);
    if (flash > 0) {
      ctx.fillStyle = "rgba(255,255,255," + clamp(flash, 0, 1) * 0.8 + ")";
      ctx.fillRect(0, 0, W, H);
    }
    if (state === STATE.PLAY || state === STATE.DEAD) drawScore();
    if (state === STATE.READY) drawReady();
    if (state === STATE.OVER) drawOver();
    drawMute();
  }

  // ---- Loop ----
  let last = performance.now();
  function frame(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05;
    update(dt);
    render();
    requestAnimationFrame(frame);
  }

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) last = performance.now();
  });

  // ---- Input ----
  function worldPos(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0));
    const cy = (e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0));
    return { x: (cx - rect.left) / rect.width * W, y: (cy - rect.top) / rect.height * H };
  }

  function handleTap(e) {
    if (e) e.preventDefault();
    Sound.init();
    const pos = e ? worldPos(e) : null;
    if (pos) {
      const dx = pos.x - (W - 30), dy = pos.y - 30;
      if (dx * dx + dy * dy < 24 * 24) { Sound.muted = !Sound.muted; return; }
    }
    if (state === STATE.READY) { startPlay(); }
    else if (state === STATE.PLAY) { flap(); }
    else if (state === STATE.OVER && overT > 0.5) { resetGame(); }
  }

  canvas.addEventListener("pointerdown", handleTap, { passive: false });
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "Enter") {
      e.preventDefault();
      handleTap(null);
    }
  });

  // ---- Boot ----
  resize();
  initStars();
  resetGame();
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => { last = performance.now(); });
  requestAnimationFrame(frame);
})();
</script>
</body>

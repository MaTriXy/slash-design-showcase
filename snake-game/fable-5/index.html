<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON SERPENT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #05060f;
    --bg-panel: #0a0c1c;
    --cyan: #00f5ff;
    --magenta: #ff2df7;
    --violet: #7b5cff;
    --food: #ffb347;
    --text-dim: #6b74a8;
  }

  html, body {
    height: 100%;
    background: radial-gradient(ellipse at 50% 30%, #0c0f24 0%, var(--bg-deep) 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 600px;
    height: 600px;
  }

  canvas {
    display: block;
    width: 600px;
    height: 600px;
    border-radius: 14px;
    background: var(--bg-panel);
    box-shadow:
      0 0 0 1px rgba(123, 92, 255, 0.25),
      0 0 40px rgba(0, 245, 255, 0.08),
      0 0 90px rgba(255, 45, 247, 0.06),
      0 24px 60px rgba(0, 0, 0, 0.7);
  }

  /* ---------- HUD ---------- */
  #hud {
    position: absolute;
    top: 18px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #hud.visible { opacity: 1; }

  #score {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--cyan);
    text-shadow: 0 0 12px rgba(0, 245, 255, 0.8), 0 0 30px rgba(0, 245, 255, 0.4);
    background: rgba(5, 6, 15, 0.45);
    border: 1px solid rgba(0, 245, 255, 0.2);
    padding: 8px 22px;
    border-radius: 100px;
    backdrop-filter: blur(6px);
  }

  /* ---------- overlays ---------- */
  .overlay {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: rgba(5, 6, 15, 0.78);
    backdrop-filter: blur(10px);
    opacity: 1;
    transition: opacity 0.45s ease;
  }
  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .title {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: 12px;
    background: linear-gradient(90deg, var(--cyan), var(--violet), var(--magenta));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 18px rgba(0, 245, 255, 0.45));
    text-align: center;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%, 100% { filter: drop-shadow(0 0 14px rgba(0,245,255,.35)); }
    50%      { filter: drop-shadow(0 0 30px rgba(255,45,247,.55)); }
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .keys {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .key {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(123, 92, 255, 0.45);
    border-radius: 8px;
    color: var(--violet);
    font-size: 15px;
    box-shadow: 0 0 12px rgba(123, 92, 255, 0.15), inset 0 0 8px rgba(123, 92, 255, 0.08);
  }

  .btn {
    margin-top: 8px;
    padding: 13px 44px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #05060f;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    border: none;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(0, 245, 255, 0.4), 0 0 50px rgba(255, 45, 247, 0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 34px rgba(0, 245, 255, 0.65), 0 0 70px rgba(255, 45, 247, 0.35);
  }
  .btn:active { transform: translateY(0) scale(0.98); }

  .final-score {
    font-size: 64px;
    font-weight: 800;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0, 245, 255, 0.8), 0 0 60px rgba(0, 245, 255, 0.35);
    line-height: 1;
  }
  .final-label {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .game-over-title {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 10px;
    color: var(--magenta);
    text-shadow: 0 0 18px rgba(255, 45, 247, 0.7), 0 0 50px rgba(255, 45, 247, 0.3);
  }

  @media (prefers-reduced-motion: reduce) {
    .title { animation: none; }
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game" width="600" height="600"></canvas>

  <div id="hud"><div id="score">SCORE&nbsp;&nbsp;0</div></div>

  <div id="startScreen" class="overlay">
    <div class="title">NEON SERPENT</div>
    <div class="subtitle">Eat the light &middot; Avoid the walls &middot; Don't bite yourself</div>
    <div class="keys">
      <div class="key">&larr;</div><div class="key">&uarr;</div><div class="key">&darr;</div><div class="key">&rarr;</div>
    </div>
    <button class="btn" id="startBtn">START</button>
  </div>

  <div id="gameOverScreen" class="overlay hidden">
    <div class="game-over-title">GAME OVER</div>
    <div class="final-label">Final Score</div>
    <div class="final-score" id="finalScore">0</div>
    <button class="btn" id="restartBtn">RESTART</button>
  </div>
</div>

<script>
(() => {
  const W = 600, H = 600;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Offscreen canvas for the fading light trail
  const trailCanvas = document.createElement('canvas');
  trailCanvas.width = W; trailCanvas.height = H;
  const tctx = trailCanvas.getContext('2d');

  const hud = document.getElementById('hud');
  const scoreEl = document.getElementById('score');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const finalScoreEl = document.getElementById('finalScore');

  // ---------------- tuning ----------------
  const SEG_SPACING   = 11;      // px between body segments along the path
  const START_SEGS    = 10;      // initial body length (segments)
  const GROW_PER_FOOD = 4;       // segments gained per food
  const BASE_SPEED    = 150;     // px/s cruising speed
  const TURN_BOOST    = 55;      // extra px/s injected when turning (momentum feel)
  const TURN_RATE     = 9.5;     // rad/s steering responsiveness
  const HEAD_R        = 9;       // head radius
  const FOOD_R        = 8;
  const WALL_PAD      = 4;       // forgiveness at the walls

  // ---------------- state ----------------
  let head, angle, targetAngle, speed, boost;
  let path, segCount, segments;
  let food, foodPulse;
  let score, playing, dead;
  let lastTime = 0;
  let shake = 0;
  let popFlash = 0, popPos = { x: 0, y: 0 };

  const TAU = Math.PI * 2;

  function resetGame() {
    head = { x: W / 2, y: H / 2 };
    angle = 0;                 // facing right
    targetAngle = 0;
    speed = BASE_SPEED;
    boost = 0;
    segCount = START_SEGS;
    score = 0;
    dead = false;
    shake = 0;
    foodPulse = 0;
    popFlash = 0;

    // seed the path straight behind the head
    path = [];
    for (let i = 0; i < 400; i++) {
      path.push({ x: head.x - i * 2, y: head.y });
    }
    segments = [];

    tctx.clearRect(0, 0, W, H);
    spawnFood();
    updateScore();
  }

  function updateScore() {
    scoreEl.innerHTML = 'SCORE&nbsp;&nbsp;' + score;
  }

  // ---------------- input ----------------
  const DIRS = {
    ArrowRight: 0,
    ArrowDown: Math.PI / 2,
    ArrowLeft: Math.PI,
    ArrowUp: -Math.PI / 2
  };

  window.addEventListener('keydown', (e) => {
    if (!(e.key in DIRS)) return;
    e.preventDefault();
    if (!playing || dead) return;

    const want = DIRS[e.key];
    // block 180° reversals (relative to current heading)
    let diff = normalizeAngle(want - angle);
    if (Math.abs(Math.abs(diff) - Math.PI) < 0.35) return;

    if (want !== targetAngle) {
      targetAngle = want;
      boost = TURN_BOOST;   // little kick of acceleration into the turn
    }
  });

  function normalizeAngle(a) {
    while (a > Math.PI) a -= TAU;
    while (a < -Math.PI) a += TAU;
    return a;
  }

  // ---------------- food ----------------
  function spawnFood() {
    let tries = 0;
    while (tries++ < 200) {
      const x = 40 + Math.random() * (W - 80);
      const y = 40 + Math.random() * (H - 80);
      let ok = Math.hypot(x - head.x, y - head.y) > 90;
      if (ok) {
        for (const s of segments) {
          if (Math.hypot(x - s.x, y - s.y) < 30) { ok = false; break; }
        }
      }
      if (ok) { food = { x, y }; return; }
    }
    food = { x: 60 + Math.random() * (W - 120), y: 60 + Math.random() * (H - 120) };
  }

  // ---------------- update ----------------
  function update(dt) {
    // --- fluid steering: ease heading toward target with capped turn rate ---
    let diff = normalizeAngle(targetAngle - angle);
    const maxTurn = TURN_RATE * dt;
    if (Math.abs(diff) <= maxTurn) angle = targetAngle;
    else angle += Math.sign(diff) * maxTurn;
    angle = normalizeAngle(angle);

    // --- momentum: boost decays, speed eases toward cruise + boost ---
    boost = Math.max(0, boost - dt * 140);
    const targetSpeed = BASE_SPEED + score * 2.2 + boost;
    speed += (targetSpeed - speed) * Math.min(1, dt * 6);

    // --- move head ---
    head.x += Math.cos(angle) * speed * dt;
    head.y += Math.sin(angle) * speed * dt;

    // --- record path ---
    const last = path[0];
    const d = Math.hypot(head.x - last.x, head.y - last.y);
    if (d > 1.5) {
      path.unshift({ x: head.x, y: head.y });
      const maxNeeded = Math.ceil((segCount * SEG_SPACING) / 1.5) + 60;
      if (path.length > maxNeeded) path.length = maxNeeded;
    }

    // --- sample body segments along the path at fixed arc spacing ---
    segments = [];
    let target = SEG_SPACING;
    let acc = Math.hypot(head.x - path[0].x, head.y - path[0].y);
    let prev = { x: head.x, y: head.y };
    let pi = 0;
    while (segments.length < segCount && pi < path.length) {
      const p = path[pi];
      const step = Math.hypot(p.x - prev.x, p.y - prev.y);
      if (acc + step >= target) {
        const t = (target - acc) / (step || 1);
        segments.push({
          x: prev.x + (p.x - prev.x) * t,
          y: prev.y + (p.y - prev.y) * t
        });
        target += SEG_SPACING;
      }
      acc += step;
      prev = p;
      pi++;
    }

    // --- food ---
    foodPulse += dt * 3.2;
    if (Math.hypot(head.x - food.x, head.y - food.y) < HEAD_R + FOOD_R + 3) {
      score++;
      segCount += GROW_PER_FOOD;
      boost += 30;              // satisfying surge on eat
      updateScore();
      popFlash = 1;
      popPos = { x: food.x, y: food.y };
      spawnFood();
    }

    // --- wall collision ---
    if (head.x < HEAD_R - WALL_PAD || head.x > W - HEAD_R + WALL_PAD ||
        head.y < HEAD_R - WALL_PAD || head.y > H - HEAD_R + WALL_PAD) {
      die();
    }

    // --- self collision (skip the neck) ---
    for (let i = 6; i < segments.length; i++) {
      const s = segments[i];
      if (Math.hypot(head.x - s.x, head.y - s.y) < HEAD_R + 2) {
        die();
        break;
      }
    }

    if (popFlash > 0) popFlash = Math.max(0, popFlash - dt * 2.5);
    if (shake > 0) shake = Math.max(0, shake - dt * 30);
  }

  function die() {
    if (dead) return;
    dead = true;
    shake = 10;
    setTimeout(() => {
      playing = false;
      finalScoreEl.textContent = score;
      hud.classList.remove('visible');
      gameOverScreen.classList.remove('hidden');
    }, 550);
  }

  // ---------------- render ----------------
  function lerpColor(c1, c2, t) {
    return [
      Math.round(c1[0] + (c2[0] - c1[0]) * t),
      Math.round(c1[1] + (c2[1] - c1[1]) * t),
      Math.round(c1[2] + (c2[2] - c1[2]) * t)
    ];
  }
  const CYAN = [0, 245, 255], MAGENTA = [255, 45, 247];

  function render() {
    // --- fade the trail canvas, then stamp new light at the head ---
    tctx.globalCompositeOperation = 'destination-out';
    tctx.fillStyle = 'rgba(0,0,0,0.075)';
    tctx.fillRect(0, 0, W, H);
    tctx.globalCompositeOperation = 'lighter';
    if (playing && !dead) {
      const g = tctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 26);
      g.addColorStop(0, 'rgba(0,245,255,0.16)');
      g.addColorStop(0.6, 'rgba(123,92,255,0.07)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      tctx.fillStyle = g;
      tctx.beginPath();
      tctx.arc(head.x, head.y, 26, 0, TAU);
      tctx.fill();
    }
    tctx.globalCompositeOperation = 'source-over';

    // --- main canvas ---
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, W, H);

    if (shake > 0) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }

    drawGrid();

    // light trail underneath everything
    ctx.globalCompositeOperation = 'lighter';
    ctx.drawImage(trailCanvas, 0, 0);
    ctx.globalCompositeOperation = 'source-over';

    drawFood();
    drawSnake();

    if (popFlash > 0) {
      ctx.save();
      ctx.globalAlpha = popFlash;
      ctx.strokeStyle = 'rgba(255,179,71,0.9)';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#ffb347';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(popPos.x, popPos.y, 14 + (1 - popFlash) * 30, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawGrid() {
    ctx.strokeStyle = 'rgba(123, 92, 255, 0.055)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 30; x < W; x += 30) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = 30; y < H; y += 30) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();

    // subtle border glow
    ctx.strokeStyle = 'rgba(0,245,255,0.12)';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, W - 2, H - 2);
  }

  function drawFood() {
    const pulse = 0.5 + 0.5 * Math.sin(foodPulse);
    const r = FOOD_R + pulse * 2.5;

    ctx.save();
    // outer bloom
    const g = ctx.createRadialGradient(food.x, food.y, 0, food.x, food.y, r * 4);
    g.addColorStop(0, 'rgba(255,179,71,' + (0.30 + pulse * 0.20) + ')');
    g.addColorStop(1, 'rgba(255,179,71,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(food.x, food.y, r * 4, 0, TAU);
    ctx.fill();

    // core
    ctx.shadowColor = '#ffb347';
    ctx.shadowBlur = 18 + pulse * 14;
    const core = ctx.createRadialGradient(food.x - 2, food.y - 2, 0, food.x, food.y, r);
    core.addColorStop(0, '#fff4de');
    core.addColorStop(0.5, '#ffb347');
    core.addColorStop(1, '#ff7b3d');
    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(food.x, food.y, r, 0, TAU);
    ctx.fill();

    // rotating ring
    ctx.strokeStyle = 'rgba(255,200,120,' + (0.25 + pulse * 0.3) + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(food.x, food.y, r + 6 + pulse * 3, foodPulse, foodPulse + Math.PI * 1.3);
    ctx.stroke();
    ctx.restore();
  }

  function drawSnake() {
    if (!segments.length) return;
    const n = segments.length;

    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // body drawn back-to-front as overlapping glowing strokes
    for (let i = n - 1; i >= 0; i--) {
      const t = i / n; // 0 at head-side, 1 at tail
      const col = lerpColor(CYAN, MAGENTA, t);
      const radius = HEAD_R * (1 - t * 0.62);
      const a = segments[i];
      const b = i === 0 ? head : segments[i - 1];

      ctx.strokeStyle = 'rgb(' + col[0] + ',' + col[1] + ',' + col[2] + ')';
      ctx.lineWidth = radius * 2;
      ctx.shadowColor = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0.9)';
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    // bright inner spine for that hot-neon core
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(head.x, head.y);
    for (let i = 0; i < Math.min(n, 40); i++) ctx.lineTo(segments[i].x, segments[i].y);
    ctx.strokeStyle = 'rgba(255,255,255,0.30)';
    ctx.lineWidth = 3;
    ctx.stroke();

    // --- head ---
    ctx.shadowColor = 'rgba(0,245,255,1)';
    ctx.shadowBlur = 22;
    const hg = ctx.createRadialGradient(head.x - 3, head.y - 3, 0, head.x, head.y, HEAD_R + 2);
    hg.addColorStop(0, '#eaffff');
    hg.addColorStop(0.45, '#7df9ff');
    hg.addColorStop(1, '#00c8ff');
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.arc(head.x, head.y, HEAD_R + 1, 0, TAU);
    ctx.fill();

    // eyes
    ctx.shadowBlur = 0;
    const ex = Math.cos(angle), ey = Math.sin(angle);
    const px = -ey, py = ex; // perpendicular
    ctx.fillStyle = '#05060f';
    ctx.beginPath();
    ctx.arc(head.x + ex * 4 + px * 4, head.y + ey * 4 + py * 4, 2.2, 0, TAU);
    ctx.arc(head.x + ex * 4 - px * 4, head.y + ey * 4 - py * 4, 2.2, 0, TAU);
    ctx.fill();

    ctx.restore();
  }

  // ---------------- loop ----------------
  function frame(now) {
    const dt = Math.min(0.033, (now - lastTime) / 1000 || 0.016);
    lastTime = now;

    if (playing && !dead) update(dt);
    if (playing || dead) render();

    requestAnimationFrame(frame);
  }

  // ---------------- flow ----------------
  function startGame() {
    resetGame();
    playing = true;
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    hud.classList.add('visible');
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);

  // idle render of an empty board behind the start screen
  resetGame();
  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>

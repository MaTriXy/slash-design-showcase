<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FROST CITY — Winter Street Racing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background:
      linear-gradient(rgba(10,17,29,.82), rgba(5,9,16,.94)),
      repeating-linear-gradient(90deg, transparent 0 39px, rgba(106,214,255,.035) 40px),
      repeating-linear-gradient(0deg, transparent 0 39px, rgba(106,214,255,.035) 40px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  .frame {
    position: relative;
    padding: 0;
    border-radius: 0;
    background: transparent;
    box-shadow: none;
  }
  canvas {
    display: block;
    border-radius: 0;
    background: #111a24;
    height: min(800px, 100vh, calc(100vw * 16 / 9));
    width: auto;
    aspect-ratio: 9 / 16;
    box-shadow: 0 24px 80px rgba(0,0,0,.55);
  }
</style>
</head>
<body>
<div class="frame"><canvas id="game" width="450" height="800"></canvas></div>
<script>
(() => {
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 450, H = 800;

// ---------- Road geometry ----------
const ROAD = { x: 55, w: 340, lanes: 4 };
const LANE_W = ROAD.w / ROAD.lanes;
const laneCenter = i => ROAD.x + LANE_W * i + LANE_W / 2;

// ---------- Game state ----------
const STATE = { MENU: 0, PLAY: 1, PAUSE: 2, OVER: 3 };
let state = STATE.MENU;

let score = 0, coinsGot = 0, lives = 3, distance = 0;
let best = 0;
let shieldTime = 0, boostTime = 0;
let invulnTime = 0;           // brief mercy after a hit
let shake = 0;
let crashSpin = 0, crashKick = 0, crashFlash = 0;
let scrollY = 0;              // short repeating offset for lane markings
let worldScroll = 0;           // continuous distance used by city scenery
let frame = 0;

// ---------- Player ----------
const player = {
  x: W / 2, y: 645,
  w: 48, h: 82,
  angle: 0,          // visual heading (radians, 0 = up)
  vx: 0,             // lateral velocity (momentum steering)
  speed: 0,          // forward speed (world scroll speed)
  maxSpeed: 11,
  accel: 0.085,
  brake: 0.20,
  drag: 0.045,
  throttle: 0,
  steer: 0,
  drifting: false
};

// ---------- Entities ----------
let enemies = [], coins = [], powerups = [], particles = [], sparks = [], popups = [];

// ---------- Input ----------
const keys = {};
addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) || e.key === ' ') e.preventDefault();
  keys[k] = true;

  if (e.key === ' ') {
    if (state === STATE.MENU) startGame();
    else if (state === STATE.OVER) startGame();
  }
  if (k === 'p' && (state === STATE.PLAY || state === STATE.PAUSE)) {
    state = state === STATE.PLAY ? STATE.PAUSE : STATE.PLAY;
    if (state === STATE.PAUSE) engineGainTarget = 0;
  }
  if (k === 'r' && state === STATE.OVER) startGame();
  initAudio();
});
addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

const up    = () => keys['arrowup'] || keys['w'];
const down  = () => keys['arrowdown'] || keys['s'];
const left  = () => keys['arrowleft'] || keys['a'];
const right = () => keys['arrowright'] || keys['d'];

// ---------- Audio (Web Audio API) ----------
let AC = null, engineOsc = null, engineGain = null, engineOsc2 = null;
let engineGainTarget = 0;

function initAudio() {
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    engineGain = AC.createGain();
    engineGain.gain.value = 0;
    engineGain.connect(AC.destination);

    engineOsc = AC.createOscillator();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 55;
    const f1 = AC.createBiquadFilter();
    f1.type = 'lowpass'; f1.frequency.value = 420;
    engineOsc.connect(f1); f1.connect(engineGain);
    engineOsc.start();

    engineOsc2 = AC.createOscillator();
    engineOsc2.type = 'square';
    engineOsc2.frequency.value = 110;
    const g2 = AC.createGain(); g2.gain.value = 0.35;
    engineOsc2.connect(g2); g2.connect(engineGain);
    engineOsc2.start();
  } catch (e) { AC = null; }
}

function updateEngine() {
  if (!AC || !engineOsc) return;
  const r = player.speed / player.maxSpeed;
  const rpm = 50 + r * 180 + (boostTime > 0 ? 60 : 0);
  engineOsc.frequency.setTargetAtTime(rpm, AC.currentTime, 0.06);
  engineOsc2.frequency.setTargetAtTime(rpm * 2.01, AC.currentTime, 0.06);
  engineGainTarget = state === STATE.PLAY ? 0.03 + r * 0.05 : 0;
  engineGain.gain.setTargetAtTime(engineGainTarget, AC.currentTime, 0.1);
}

function beep(freq, dur, type = 'sine', vol = 0.15, slideTo = null) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur);
}

function coinSound() { beep(880, 0.09, 'sine', 0.12); setTimeout(() => beep(1320, 0.14, 'sine', 0.12), 60); }
function powerSound() { beep(440, 0.3, 'triangle', 0.16, 1100); }
function crashSound() {
  if (!AC) return;

  // Short metallic impact followed by a deeper body thump.
  const len = Math.floor(AC.sampleRate * 0.24);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) {
    const t = i / len;
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 3) * (0.7 + Math.sin(i * 0.37) * 0.3);
  }
  const src = AC.createBufferSource(); src.buffer = buf;
  const gain = AC.createGain(); gain.gain.value = 0.28;
  const metal = AC.createBiquadFilter(); metal.type = 'bandpass'; metal.frequency.value = 1450; metal.Q.value = 0.8;
  src.connect(metal); metal.connect(gain); gain.connect(AC.destination);
  src.start();

  beep(150, 0.18, 'square', 0.16, 72);
  setTimeout(() => beep(74, 0.34, 'sawtooth', 0.18, 38), 35);
}

// ---------- Helpers ----------
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------- Spawning ----------
function difficulty() { return Math.min(1, score / 3000); }

function spawnEnemy() {
  const lane = Math.floor(rand(0, ROAD.lanes));
  const x = laneCenter(lane);
  // avoid stacking on an existing enemy near the top
  for (const e of enemies) if (Math.abs(e.x - x) < LANE_W * 0.8 && e.y < 40) return;
  const isYellow = Math.random() < 0.4;
  enemies.push({
    x, y: -100, w: 43, h: 78,
    lane,
    speed: rand(2.2, 3.8) + difficulty() * 2.2,   // their own pace; world scroll adds on top
    color: isYellow ? '#3fb6c9' : '#7d5cff',
    color2: isYellow ? '#1f6f80' : '#4a30b0',
    swayT: rand(0, 6.28),
    changeTimer: rand(120, 400)
  });
}

function spawnCoin() {
  const lane = Math.floor(rand(0, ROAD.lanes));
  const n = 3 + Math.floor(rand(0, 3));
  for (let i = 0; i < n; i++) {
    coins.push({ x: laneCenter(lane), y: -40 - i * 55, r: 11, t: rand(0, 6.28) });
  }
}

function spawnPowerup() {
  const lane = Math.floor(rand(0, ROAD.lanes));
  const type = Math.random() < 0.5 ? 'boost' : 'shield';
  powerups.push({ x: laneCenter(lane), y: -50, r: 16, type, t: 0 });
}

// ---------- Particles ----------
function smoke(x, y, amount) {
  for (let i = 0; i < amount; i++) {
    particles.push({
      x: x + rand(-4, 4), y: y + rand(-2, 2),
      vx: rand(-0.6, 0.6), vy: rand(0.5, 2.2),
      r: rand(3, 7), life: 1, decay: rand(0.02, 0.045),
      color: '245,250,255'
    });
  }
}
function boostFlame(x, y) {
  particles.push({
    x: x + rand(-5, 5), y,
    vx: rand(-0.4, 0.4), vy: rand(2, 4.5),
    r: rand(3, 6), life: 1, decay: rand(0.05, 0.09),
    color: Math.random() < 0.5 ? '80,180,255' : '160,220,255'
  });
}
function burstSparks(x, y, n = 18) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2), s = rand(1.5, 6);
    sparks.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 1, decay: rand(0.02, 0.05),
      color: Math.random() < 0.6 ? '#ffcf5e' : '#ff7a3c'
    });
  }
}
function popup(x, y, text, color) {
  popups.push({ x, y, text, color, life: 1 });
}

// ---------- Game flow ----------
function startGame() {
  state = STATE.PLAY;
  score = 0; coinsGot = 0; lives = 3; distance = 0;
  shieldTime = 0; boostTime = 0; invulnTime = 0; shake = 0;
  enemies = []; coins = []; powerups = []; particles = []; sparks = []; popups = [];
  player.x = W / 2; player.vx = 0; player.speed = 3.2; player.angle = 0; player.throttle = 0;
  crashSpin = 0; crashKick = 0; crashFlash = 0;
  worldScroll = 0; scrollY = 0;
  initAudio();
  if (AC && AC.state === 'suspended') AC.resume();
}

function gameOver() {
  state = STATE.OVER;
  best = Math.max(best, Math.floor(score));
  engineGainTarget = 0;
  if (engineGain && AC) engineGain.gain.setTargetAtTime(0, AC.currentTime, 0.1);
}

// ---------- Update ----------
function update() {
  frame++;
  if (state !== STATE.PLAY) { updateEngine(); return; }

  const effMax = player.maxSpeed + (boostTime > 0 ? 5 : 0);

  // --- smoother forward physics ---
  const targetThrottle = up() ? 1 : 0;
  player.throttle += (targetThrottle - player.throttle) * 0.075;
  if (down()) player.throttle *= 0.72;

  // Acceleration gently tapers near top speed, avoiding the sudden speed jump.
  const speedHeadroom = clamp(1 - player.speed / effMax, 0.12, 1);
  player.speed += player.throttle * player.accel * speedHeadroom * (boostTime > 0 ? 1.55 : 1);
  if (down()) player.speed -= player.brake * (0.55 + player.speed / player.maxSpeed * 0.45);
  player.speed -= player.drag * (0.24 + player.speed * 0.035);
  player.speed = clamp(player.speed, 1.2, effMax);

  // --- smoother steering with progressive input and controlled momentum ---
  const rawSteer = (right() ? 1 : 0) - (left() ? 1 : 0);
  player.steer += (rawSteer - player.steer) * 0.16;
  const grip = player.drifting ? 0.91 : 0.885;
  const steerPower = 0.30 + (player.speed / player.maxSpeed) * 0.42;
  player.vx += player.steer * steerPower;
  player.vx *= grip;
  player.x += player.vx + crashKick;
  crashKick *= 0.82;

  // drift detection: on ice it kicks in sooner
  const speedRatio = player.speed / player.maxSpeed;
  player.drifting = Math.abs(player.vx) > 2.1 && speedRatio > 0.5;

  // visual heading leans into velocity
  const targetAngle = clamp(player.vx * 0.06, -0.38, 0.38);
  player.angle += (targetAngle - player.angle) * 0.18;

  // road bounds — scraping the barrier
  const minX = ROAD.x + player.w / 2 + 6, maxX = ROAD.x + ROAD.w - player.w / 2 - 6;
  if (player.x < minX || player.x > maxX) {
    player.x = clamp(player.x, minX, maxX);
    if (Math.abs(player.vx) > 1.5) {
      burstSparks(player.x + (player.x <= minX ? -player.w / 2 : player.w / 2), player.y, 4);
      player.speed *= 0.985;
    }
    player.vx *= -0.35;
  }

  // tire smoke while drifting or hard braking at speed
  if (player.drifting || (down() && player.speed > 5)) {
    smoke(player.x - 14, player.y + player.h / 2 - 6, 1);
    smoke(player.x + 14, player.y + player.h / 2 - 6, 1);
  }
  if (boostTime > 0) { boostFlame(player.x, player.y + player.h / 2 + 4); }

  // --- world scroll ---
  const scroll = player.speed;
  scrollY = (scrollY + scroll) % 80;
  worldScroll += scroll;
  distance += scroll;
  score += scroll * 0.08 * (boostTime > 0 ? 2 : 1);

  // timers
  if (shieldTime > 0) shieldTime--;
  if (boostTime > 0) boostTime--;
  if (invulnTime > 0) invulnTime--;
  if (shake > 0) shake *= 0.84;
  if (crashSpin !== 0) crashSpin *= 0.86;
  if (crashFlash > 0) crashFlash *= 0.78;

  // --- spawns (scale with difficulty) ---
  const d = difficulty();
  const enemyEvery = Math.max(34, 95 - d * 60);
  if (frame % Math.floor(enemyEvery) === 0) spawnEnemy();
  if (d > 0.4 && frame % Math.floor(enemyEvery * 1.6) === 17) spawnEnemy();
  if (frame % 150 === 0 && Math.random() < 0.8) spawnCoin();
  if (frame % 600 === 0 && Math.random() < 0.75) spawnPowerup();

  // --- enemies ---
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += scroll - e.speed;                    // they drive forward too
    e.swayT += 0.03;
    e.x += Math.sin(e.swayT) * 0.25;

    // occasional lane change at higher difficulty
    if (--e.changeTimer <= 0 && d > 0.25) {
      e.changeTimer = rand(200, 500);
      const dir = Math.random() < 0.5 ? -1 : 1;
      const target = clamp(e.lane + dir, 0, ROAD.lanes - 1);
      e.lane = target;
    }
    e.x += (laneCenter(e.lane) - e.x) * 0.02;

    if (e.y > H + 100) { enemies.splice(i, 1); score += 5; popup(e.x, H - 80, '+5', '#9fd6ff'); continue; }

    // collision with player
    if (Math.abs(e.x - player.x) < (e.w + player.w) / 2 - 8 &&
        Math.abs(e.y - player.y) < (e.h + player.h) / 2 - 10) {
      enemies.splice(i, 1);
      const impactX = (e.x + player.x) / 2;
      const impactY = (e.y + player.y) / 2;
      const impactSide = e.x < player.x ? 1 : -1;
      burstSparks(impactX, impactY, 42);
      smoke(player.x - impactSide * 10, player.y + 24, 7);
      shake = 22;
      crashFlash = 1;
      crashSpin = impactSide * 0.48;
      crashKick = impactSide * 5.8;
      player.vx += impactSide * 3.6;
      crashSound();
      if (shieldTime > 0) {
        shieldTime = 0;
        popup(player.x, player.y - 50, 'SHIELD DOWN', '#57e0ff');
      } else if (invulnTime <= 0) {
        lives--;
        invulnTime = 90;
        player.speed = Math.max(1.8, player.speed * 0.58);
        popup(player.x, player.y - 50, '-1 LIFE', '#ff5d5d');
        if (lives <= 0) { gameOver(); return; }
      }
    }
  }

  // --- coins ---
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.y += scroll; c.t += 0.15;
    if (c.y > H + 30) { coins.splice(i, 1); continue; }
    if (Math.abs(c.x - player.x) < 30 && Math.abs(c.y - player.y) < 45) {
      coins.splice(i, 1);
      coinsGot++; score += 25;
      coinSound();
      popup(c.x, c.y, '+25', '#ffd94d');
      for (let j = 0; j < 6; j++) sparks.push({
        x: c.x, y: c.y, vx: rand(-2, 2), vy: rand(-2.5, -0.5),
        life: 1, decay: 0.05, color: '#ffd94d'
      });
    }
  }

  // --- powerups ---
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += scroll; p.t += 0.08;
    if (p.y > H + 40) { powerups.splice(i, 1); continue; }
    if (Math.abs(p.x - player.x) < 34 && Math.abs(p.y - player.y) < 48) {
      powerups.splice(i, 1);
      powerSound();
      if (p.type === 'boost') { boostTime = 240; popup(player.x, player.y - 50, 'NITRO!', '#7dc4ff'); }
      else { shieldTime = 480; popup(player.x, player.y - 50, 'SHIELD', '#57e0ff'); }
    }
  }

  // --- particles / sparks / popups ---
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy + scroll * 0.35; p.life -= p.decay; p.r += 0.15;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy + scroll * 0.4; s.vy += 0.12; s.life -= s.decay;
    if (s.life <= 0) sparks.splice(i, 1);
  }
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.y -= 1.2; p.life -= 0.02;
    if (p.life <= 0) popups.splice(i, 1);
  }

  updateEngine();
}

// ---------- Drawing ----------
function wrappedY(base, spacing, speed = 1, extra = 0) {
  const span = H + spacing * 2;
  return ((base + worldScroll * speed + extra) % span + span) % span - spacing;
}

function drawBackground() {
  // Elevated winter bridge: open skyline, river below, guard rails and supports.
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#17283a');
  sky.addColorStop(0.55, '#27445b');
  sky.addColorStop(1, '#102131');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Distant skyline drifting more slowly for depth.
  for (let side = 0; side < 2; side++) {
    const left = side === 0;
    const baseX = left ? 0 : ROAD.x + ROAD.w;
    const width = left ? ROAD.x : W - ROAD.x - ROAD.w;
    ctx.save();
    ctx.beginPath(); ctx.rect(baseX, 0, width, H); ctx.clip();
    for (let k = 0; k < 8; k++) {
      const y = wrappedY(k * 128, 128, 0.28, -90);
      const bw = 28 + ((k * 17 + side * 11) % 18);
      const bh = 72 + ((k * 31 + side * 7) % 55);
      const bx = left ? 3 + (k % 2) * 7 : W - bw - 3 - (k % 2) * 7;
      ctx.fillStyle = k % 2 ? '#26394a' : '#31485b';
      rr(bx, y, bw, bh, 3); ctx.fill();
      for (let wy = y + 13, r = 0; wy < y + bh - 8; wy += 18, r++) {
        for (let wx = bx + 6, c = 0; wx < bx + bw - 5; wx += 11, c++) {
          ctx.fillStyle = ((k + r + c + side) % 3) ? 'rgba(255,211,128,.48)' : 'rgba(124,180,214,.22)';
          ctx.fillRect(wx, wy, 5, 7);
        }
      }
    }
    ctx.restore();
  }

  // Dark river / lower city visible beyond bridge deck.
  ctx.fillStyle = 'rgba(6,18,30,.72)';
  ctx.fillRect(0, 0, ROAD.x - 13, H);
  ctx.fillRect(ROAD.x + ROAD.w + 13, 0, W - ROAD.x - ROAD.w - 13, H);
  for (let k = 0; k < 22; k++) {
    const y = wrappedY(k * 59, 59, 0.58, -30);
    ctx.fillStyle = k % 2 ? 'rgba(105,188,230,.14)' : 'rgba(255,216,145,.10)';
    ctx.fillRect(5, y, ROAD.x - 25, 2);
    ctx.fillRect(ROAD.x + ROAD.w + 20, y, W - ROAD.x - ROAD.w - 25, 2);
  }

  // Bridge deck and concrete edge beams.
  const roadGrad = ctx.createLinearGradient(ROAD.x, 0, ROAD.x + ROAD.w, 0);
  roadGrad.addColorStop(0, '#252c34');
  roadGrad.addColorStop(.12, '#3e4851');
  roadGrad.addColorStop(.5, '#333c45');
  roadGrad.addColorStop(.88, '#3e4851');
  roadGrad.addColorStop(1, '#252c34');
  ctx.fillStyle = roadGrad;
  ctx.fillRect(ROAD.x, 0, ROAD.w, H);

  ctx.fillStyle = '#788691';
  ctx.fillRect(ROAD.x - 13, 0, 13, H);
  ctx.fillRect(ROAD.x + ROAD.w, 0, 13, H);
  ctx.fillStyle = '#d5dde2';
  ctx.fillRect(ROAD.x - 3, 0, 3, H);
  ctx.fillRect(ROAD.x + ROAD.w, 0, 3, H);

  // Guard rails with repeating vertical posts.
  for (let side = 0; side < 2; side++) {
    const railX = side === 0 ? ROAD.x - 10 : ROAD.x + ROAD.w + 7;
    ctx.fillStyle = '#9aabb7';
    ctx.fillRect(railX, 0, 3, H);
    ctx.fillRect(railX + (side === 0 ? -3 : 3), 0, 2, H);
    for (let k = 0; k < 14; k++) {
      const y = wrappedY(k * 68, 68, 1, -30);
      ctx.fillStyle = '#566773';
      ctx.fillRect(railX - 2, y, 7, 22);
      ctx.save();
      ctx.shadowColor = '#9ee7ff'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#b7edff';
      ctx.fillRect(railX - 1, y + 2, 5, 5);
      ctx.restore();
    }
  }

  // Massive bridge support joints pass beneath the road.
  for (let k = 0; k < 4; k++) {
    const y = wrappedY(k * 300, 300, 1, -80);
    ctx.fillStyle = 'rgba(14,19,25,.55)';
    ctx.fillRect(ROAD.x, y + 7, ROAD.w, 18);
    ctx.fillStyle = '#707b84';
    ctx.fillRect(ROAD.x, y, ROAD.w, 8);
    ctx.fillStyle = 'rgba(212,230,239,.34)';
    ctx.fillRect(ROAD.x, y, ROAD.w, 2);
    for (let i = 0; i < 6; i++) {
      ctx.fillStyle = '#323b43';
      ctx.beginPath(); ctx.arc(ROAD.x + 28 + i * 57, y + 4, 3, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Asphalt texture and tire lanes.
  for (let k = 0; k < 76; k++) {
    const px = ROAD.x + 12 + (k * 83) % (ROAD.w - 24);
    const py = wrappedY(k * 149, 149, 1.12, -15);
    ctx.fillStyle = k % 4 === 0 ? 'rgba(205,230,240,.09)' : 'rgba(255,255,255,.035)';
    ctx.fillRect(px, py, k % 4 === 0 ? 17 : 3, k % 4 === 0 ? 2 : 3);
  }
  ctx.fillStyle = 'rgba(0,0,0,.10)';
  for (let l = 0; l < ROAD.lanes; l++) {
    ctx.fillRect(laneCenter(l) - 15, 0, 7, H);
    ctx.fillRect(laneCenter(l) + 8, 0, 7, H);
  }

  // Lane markings.
  ctx.fillStyle = '#eef3f5';
  const dashOffset = worldScroll % 80;
  for (let l = 1; l < ROAD.lanes; l++) {
    const lx = ROAD.x + LANE_W * l - 3;
    for (let y = -80 + dashOffset; y < H + 80; y += 80) {
      rr(lx, y, 6, 42, 3); ctx.fill();
    }
  }

  // Overhead bridge gantries add structure and variety.
  for (let k = 0; k < 3; k++) {
    const y = wrappedY(k * 520, 520, 1, -150);
    ctx.fillStyle = '#45545f';
    ctx.fillRect(ROAD.x - 9, y, ROAD.w + 18, 8);
    ctx.fillRect(ROAD.x - 7, y, 7, 52);
    ctx.fillRect(ROAD.x + ROAD.w, y, 7, 52);
    ctx.fillStyle = '#193b53';
    rr(W / 2 - 62, y + 11, 124, 28, 5); ctx.fill();
    ctx.fillStyle = '#a8e6ff';
    ctx.font = '700 10px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('NORTH BRIDGE  •  CITY LOOP', W / 2, y + 29);
  }
}

function drawCar(x, y, w, h, angle, bodyA, bodyB, isPlayer) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Long soft shadow for a heavier, more modern silhouette.
  ctx.fillStyle = 'rgba(0,0,0,.34)';
  ctx.beginPath();
  ctx.ellipse(2, 5, w * .57, h * .52, 0, 0, Math.PI * 2); ctx.fill();

  // Wide performance tires.
  ctx.fillStyle = '#0b0e12';
  rr(-w / 2 - 5, -h * .30, 9, 22, 4); ctx.fill();
  rr(w / 2 - 4, -h * .30, 9, 22, 4); ctx.fill();
  rr(-w / 2 - 5, h * .16, 9, 23, 4); ctx.fill();
  rr(w / 2 - 4, h * .16, 9, 23, 4); ctx.fill();

  // Angular coupe body, distinct from the old rounded rectangle car.
  const body = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
  body.addColorStop(0, bodyB);
  body.addColorStop(.45, bodyA);
  body.addColorStop(.58, bodyA);
  body.addColorStop(1, bodyB);
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(-w * .34, -h * .5);
  ctx.quadraticCurveTo(0, -h * .57, w * .34, -h * .5);
  ctx.lineTo(w * .49, -h * .26);
  ctx.lineTo(w * .46, h * .37);
  ctx.quadraticCurveTo(w * .32, h * .49, w * .22, h * .5);
  ctx.lineTo(-w * .22, h * .5);
  ctx.quadraticCurveTo(-w * .32, h * .49, -w * .46, h * .37);
  ctx.lineTo(-w * .49, -h * .26);
  ctx.closePath(); ctx.fill();

  // Side intakes and sculpted fenders.
  ctx.fillStyle = 'rgba(0,0,0,.22)';
  rr(-w * .47, -h * .07, w * .12, h * .27, 4); ctx.fill();
  rr(w * .35, -h * .07, w * .12, h * .27, 4); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.13)';
  ctx.beginPath(); ctx.moveTo(-w*.28,-h*.45); ctx.lineTo(-w*.12,-h*.48); ctx.lineTo(-w*.17,h*.35); ctx.lineTo(-w*.30,h*.25); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(w*.28,-h*.45); ctx.lineTo(w*.12,-h*.48); ctx.lineTo(w*.17,h*.35); ctx.lineTo(w*.30,h*.25); ctx.closePath(); ctx.fill();

  // Panoramic glass canopy.
  ctx.fillStyle = '#091827';
  ctx.beginPath();
  ctx.moveTo(-w * .25, -h * .25);
  ctx.quadraticCurveTo(0, -h * .38, w * .25, -h * .25);
  ctx.lineTo(w * .29, h * .16);
  ctx.quadraticCurveTo(0, h * .25, -w * .29, h * .16);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(127,202,240,.32)';
  ctx.beginPath();
  ctx.moveTo(-w*.20,-h*.22); ctx.quadraticCurveTo(0,-h*.31,w*.20,-h*.22);
  ctx.lineTo(w*.22,-h*.12); ctx.quadraticCurveTo(0,-h*.17,-w*.22,-h*.12); ctx.closePath(); ctx.fill();

  // Center spine and rear engine cover for player.
  if (isPlayer) {
    ctx.fillStyle = 'rgba(235,249,255,.75)';
    rr(-3, -h * .48, 6, h * .24, 3); ctx.fill();
    ctx.fillStyle = 'rgba(7,17,27,.38)';
    for (let i = -2; i <= 2; i++) ctx.fillRect(i * 5 - 1, h * .27, 3, h * .12);
  }

  // Slim LED headlights and cones.
  if (isPlayer) {
    ctx.save(); ctx.shadowColor = '#bceeff'; ctx.shadowBlur = 18;
    ctx.strokeStyle = '#effcff'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-w*.32,-h*.43); ctx.lineTo(-w*.08,-h*.49); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w*.32,-h*.43); ctx.lineTo(w*.08,-h*.49); ctx.stroke();
    ctx.restore();
    const cone = ctx.createLinearGradient(0, -h/2, 0, -h/2 - 105);
    cone.addColorStop(0, 'rgba(190,238,255,.20)'); cone.addColorStop(1, 'rgba(190,238,255,0)');
    ctx.fillStyle = cone;
    ctx.beginPath(); ctx.moveTo(-w*.37,-h*.46); ctx.lineTo(-w*.70,-h*.5-100); ctx.lineTo(w*.70,-h*.5-100); ctx.lineTo(w*.37,-h*.46); ctx.closePath(); ctx.fill();
  } else {
    ctx.fillStyle = '#fff1bb';
    rr(-w*.32,-h*.48,w*.18,5,2); ctx.fill(); rr(w*.14,-h*.48,w*.18,5,2); ctx.fill();
  }

  // Continuous rear light bar and spoiler.
  ctx.save();
  if (isPlayer && down()) { ctx.shadowColor = '#ff3857'; ctx.shadowBlur = 18; }
  ctx.fillStyle = isPlayer ? '#ff3456' : '#bd253c';
  rr(-w * .34, h * .42, w * .68, 5, 2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#111820';
  ctx.fillRect(-w * .30, h * .48, w * .60, 3);
  ctx.fillRect(-w * .34, h * .44, 3, 8);
  ctx.fillRect(w * .31, h * .44, 3, 8);

  ctx.restore();
}

function drawEntities() {
  // coins
  for (const c of coins) {
    const pulse = 1 + Math.sin(c.t) * 0.12;
    const squash = Math.abs(Math.cos(c.t * 0.8));   // spin illusion
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.shadowColor = '#ffd94d';
    ctx.shadowBlur = 16 * pulse;
    ctx.fillStyle = '#ffd94d';
    ctx.beginPath();
    ctx.ellipse(0, 0, c.r * squash * pulse, c.r * pulse, 0, 0, 7);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#c7900a';
    ctx.beginPath();
    ctx.ellipse(0, 0, c.r * 0.55 * squash, c.r * 0.55, 0, 0, 7);
    ctx.fill();
    ctx.restore();
  }

  // powerups
  for (const p of powerups) {
    const bob = Math.sin(p.t * 2) * 3;
    ctx.save();
    ctx.translate(p.x, p.y + bob);
    const col = p.type === 'boost' ? '#7dc4ff' : '#57e0ff';
    ctx.shadowColor = col; ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(13,25,45,0.92)';
    ctx.strokeStyle = col; ctx.lineWidth = 2.5;
    rr(-16, -16, 32, 32, 9); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = col;
    if (p.type === 'boost') {
      // lightning bolt
      ctx.beginPath();
      ctx.moveTo(3, -11); ctx.lineTo(-7, 2); ctx.lineTo(-1, 2);
      ctx.lineTo(-3, 11); ctx.lineTo(7, -2); ctx.lineTo(1, -2);
      ctx.closePath(); ctx.fill();
    } else {
      // shield emblem
      ctx.beginPath();
      ctx.moveTo(0, -10); ctx.lineTo(9, -5); ctx.lineTo(9, 3);
      ctx.quadraticCurveTo(9, 9, 0, 12);
      ctx.quadraticCurveTo(-9, 9, -9, 3);
      ctx.lineTo(-9, -5); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  // enemies
  for (const e of enemies) drawCar(e.x, e.y, e.w, e.h, Math.sin(e.swayT) * 0.03, e.color, e.color2, false);

  // smoke particles (under player)
  for (const p of particles) {
    ctx.fillStyle = `rgba(${p.color},${p.life * 0.4})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
  }

  // player (flicker while invulnerable)
  if (invulnTime <= 0 || Math.floor(frame / 4) % 2 === 0) {
    drawCar(player.x, player.y, player.w, player.h, player.angle + crashSpin, '#e8443a', '#9c1f18', true);
  }

  // shield bubble
  if (shieldTime > 0) {
    const a = shieldTime < 90 ? (Math.floor(frame / 5) % 2 === 0 ? 0.5 : 0.15) : 0.45;
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.strokeStyle = `rgba(87,224,255,${a})`;
    ctx.fillStyle = `rgba(87,224,255,${a * 0.14})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(0, 0, 42, 58, 0, 0, 7);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  // sparks (on top)
  for (const s of sparks) {
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.color;
    ctx.fillRect(s.x - 2, s.y - 2, 4, 4);
    ctx.globalAlpha = 1;
  }

  // popups
  for (const p of popups) {
    ctx.globalAlpha = p.life;
    ctx.font = 'bold 17px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  ctx.save();

  // compact translucent command strip
  const panel = ctx.createLinearGradient(14, 0, W - 14, 0);
  panel.addColorStop(0, 'rgba(7,17,29,0.92)');
  panel.addColorStop(0.55, 'rgba(14,30,46,0.82)');
  panel.addColorStop(1, 'rgba(7,17,29,0.92)');
  ctx.fillStyle = panel;
  rr(14, 14, W - 28, 48, 15); ctx.fill();
  ctx.strokeStyle = 'rgba(129,221,255,0.28)';
  ctx.lineWidth = 1;
  rr(14, 14, W - 28, 48, 15); ctx.stroke();

  // score — centered and wider
  ctx.textAlign = 'center';
  ctx.fillStyle = '#7edcff';
  ctx.font = '700 9px "Segoe UI", sans-serif';
  ctx.fillText('CITY RUN SCORE', W / 2, 29);
  ctx.fillStyle = '#f4fbff';
  ctx.font = '800 21px "Segoe UI", sans-serif';
  ctx.fillText(Math.floor(score).toLocaleString(), W / 2, 52);

  // coin pill on left
  ctx.fillStyle = 'rgba(255,205,74,0.11)';
  rr(25, 23, 76, 30, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(255,217,77,0.35)';
  rr(25, 23, 76, 30, 10); ctx.stroke();
  ctx.fillStyle = '#ffd94d';
  ctx.beginPath(); ctx.arc(43, 38, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#a96f00';
  ctx.beginPath(); ctx.arc(43, 38, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff5c5';
  ctx.font = '800 15px "Segoe UI", sans-serif';
  ctx.fillText(coinsGot, 57, 44);

  // lives — compact vertical bars on right
  ctx.textAlign = 'right';
  ctx.fillStyle = '#89a9be';
  ctx.font = '700 8px "Segoe UI", sans-serif';
  ctx.fillText('ARMOR', W - 27, 28);
  for (let i = 0; i < 3; i++) {
    const x = W - 91 + i * 22;
    ctx.fillStyle = i < lives ? '#ff6376' : 'rgba(255,255,255,0.12)';
    rr(x, 35, 16, 9, 4); ctx.fill();
    if (i < lives) {
      ctx.fillStyle = 'rgba(255,255,255,0.42)';
      rr(x + 2, 37, 8, 2, 1); ctx.fill();
    }
  }

  // new digital speed console at bottom-left
  const sx = 18, sy = H - 142, sw = 118, sh = 112;
  const speedPanel = ctx.createLinearGradient(sx, sy, sx + sw, sy + sh);
  speedPanel.addColorStop(0, 'rgba(7,18,29,0.94)');
  speedPanel.addColorStop(1, 'rgba(12,38,56,0.86)');
  ctx.fillStyle = speedPanel;
  rr(sx, sy, sw, sh, 18); ctx.fill();
  ctx.strokeStyle = boostTime > 0 ? 'rgba(181,128,255,.72)' : 'rgba(91,210,255,.42)';
  ctx.lineWidth = 1.5;
  rr(sx, sy, sw, sh, 18); ctx.stroke();

  ctx.textAlign = 'left';
  ctx.fillStyle = '#7da9bf';
  ctx.font = '700 9px "Segoe UI", sans-serif';
  ctx.fillText('VELOCITY', sx + 14, sy + 21);
  ctx.fillStyle = '#f5fcff';
  ctx.font = '900 34px "Segoe UI", sans-serif';
  ctx.fillText(String(Math.round(player.speed * 22)).padStart(3, '0'), sx + 13, sy + 57);
  ctx.fillStyle = '#78d9ff';
  ctx.font = '800 10px "Segoe UI", sans-serif';
  ctx.fillText('KM/H', sx + 78, sy + 55);

  // segmented speed bar
  const speedRatio = clamp(player.speed / (player.maxSpeed + 5), 0, 1);
  for (let i = 0; i < 10; i++) {
    const active = i < Math.ceil(speedRatio * 10);
    ctx.fillStyle = active
      ? (boostTime > 0 ? '#b58aff' : i > 7 ? '#ffd45d' : '#62d7ff')
      : 'rgba(255,255,255,0.10)';
    rr(sx + 13 + i * 9, sy + 72, 6, 19 - Math.abs(5 - i) * .8, 2); ctx.fill();
  }
  ctx.fillStyle = '#6f8fa2';
  ctx.font = '600 8px "Segoe UI", sans-serif';
  ctx.fillText(player.drifting ? 'DRIFT ACTIVE' : 'TRACTION STABLE', sx + 13, sy + 101);

  // powerups move to right side as vertical cards
  let py = H - 92;
  if (boostTime > 0) {
    drawBadge(W - 134, py, '#9b7dff', 'NITRO', boostTime / 240); py -= 40;
  }
  if (shieldTime > 0) {
    drawBadge(W - 134, py, '#57e0ff', 'SHIELD', shieldTime / 480);
  }

  ctx.restore();
}
function drawBadge(x, y, color, label, pct) {
  ctx.fillStyle = 'rgba(6,17,28,0.90)';
  rr(x, y, 116, 31, 10); ctx.fill();
  ctx.strokeStyle = color;
  ctx.globalAlpha = 0.45;
  rr(x, y, 116, 31, 10); ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = color;
  rr(x + 8, y + 8, 5, 15, 3); ctx.fill();
  ctx.font = '800 11px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(label, x + 21, y + 20);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  rr(x + 70, y + 11, 36, 8, 4); ctx.fill();
  ctx.fillStyle = color;
  rr(x + 70, y + 11, 36 * clamp(pct, 0, 1), 8, 4); ctx.fill();
}
function overlay(alpha = 0.62) {
  ctx.fillStyle = `rgba(10,18,30,${alpha})`;
  ctx.fillRect(0, 0, W, H);
}

function drawMenu() {
  overlay(0.55);
  ctx.textAlign = 'center';

  // title
  const bounce = Math.sin(frame * 0.05) * 5;
  ctx.save();
  ctx.shadowColor = '#8fd4ff'; ctx.shadowBlur = 30;
  ctx.fillStyle = '#eaf6ff';
  ctx.font = '900 46px "Segoe UI", sans-serif';
  ctx.fillText('NORTH BRIDGE', W / 2, 250 + bounce);
  ctx.restore();
  ctx.fillStyle = '#8fd4ff';
  ctx.font = '600 14px "Segoe UI", sans-serif';
  ctx.fillText('ELEVATED WINTER RUN · CITY LOOP', W / 2, 284 + bounce);

  // controls card
  ctx.fillStyle = 'rgba(10,18,36,0.85)';
  rr(W / 2 - 165, 350, 330, 170, 16); ctx.fill();
  ctx.strokeStyle = 'rgba(125,196,255,0.25)'; ctx.lineWidth = 1;
  rr(W / 2 - 165, 350, 330, 170, 16); ctx.stroke();
  ctx.fillStyle = '#cfe2ff';
  ctx.font = '600 14px "Segoe UI", sans-serif';
  ctx.fillText('↑ / W — accelerate    ↓ / S — brake', W / 2, 390);
  ctx.fillText('← → / A D — steer', W / 2, 420);
  ctx.fillText('P — pause', W / 2, 450);
  ctx.fillStyle = '#9cc4e8';
  ctx.font = '500 12px "Segoe UI", sans-serif';
  ctx.fillText('Bridge deck is slick — steer early and hold your line', W / 2, 492);

  if (Math.floor(frame / 30) % 2 === 0) {
    ctx.fillStyle = '#ffd94d';
    ctx.font = '800 21px "Segoe UI", sans-serif';
    ctx.fillText('PRESS SPACE TO START', W / 2, 600);
  }
  if (best > 0) {
    ctx.fillStyle = '#9cc4e8';
    ctx.font = '600 14px "Segoe UI", sans-serif';
    ctx.fillText('BEST ' + best.toLocaleString(), W / 2, 644);
  }
}

function drawPause() {
  overlay(0.6);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#eaf4ff';
  ctx.font = '900 52px "Segoe UI", sans-serif';
  ctx.fillText('PAUSED', W / 2, H / 2 - 10);
  ctx.fillStyle = '#9cc4e8';
  ctx.font = '600 17px "Segoe UI", sans-serif';
  ctx.fillText('press P to resume', W / 2, H / 2 + 30);
}

function drawOver() {
  overlay(0.68);
  ctx.textAlign = 'center';
  ctx.save();
  ctx.shadowColor = '#ff4d4d'; ctx.shadowBlur = 26;
  ctx.fillStyle = '#ffe3e3';
  ctx.font = '900 46px "Segoe UI", sans-serif';
  ctx.fillText('GAME OVER', W / 2, 280);
  ctx.restore();

  ctx.fillStyle = 'rgba(10,18,36,0.85)';
  rr(W / 2 - 150, 330, 300, 150, 16); ctx.fill();
  ctx.fillStyle = '#9cc4e8';
  ctx.font = '600 13px "Segoe UI", sans-serif';
  ctx.fillText('FINAL SCORE', W / 2, 366);
  ctx.fillStyle = '#ffffff';
  ctx.font = '900 42px "Segoe UI", sans-serif';
  ctx.fillText(Math.floor(score).toLocaleString(), W / 2, 414);
  ctx.fillStyle = '#ffd94d';
  ctx.font = '600 14px "Segoe UI", sans-serif';
  ctx.fillText(`coins ${coinsGot}   ·   best ${best.toLocaleString()}`, W / 2, 452);

  if (Math.floor(frame / 30) % 2 === 0) {
    ctx.fillStyle = '#7dc4ff';
    ctx.font = '800 19px "Segoe UI", sans-serif';
    ctx.fillText('PRESS SPACE TO RESTART', W / 2, 560);
  }
}

// ---------- Main loop ----------
// falling snow field (drifts sideways, loops)
const snow = [];
for (let i = 0; i < 90; i++)
  snow.push({ x: Math.random() * W, y: Math.random() * H,
              r: rand(1, 3), sp: rand(1.2, 3.2), sw: rand(-0.6, 0.6), ph: rand(0, 6.28) });

function drawSnow() {
  const gust = (state === STATE.PLAY ? player.speed * 0.25 : 1);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (const f of snow) {
    f.y += f.sp + gust * 0.15;
    f.ph += 0.05;
    f.x += f.sw + Math.sin(f.ph) * 0.4;
    if (f.y > H + 4) { f.y = -4; f.x = Math.random() * W; }
    if (f.x > W + 4) f.x = -4; else if (f.x < -4) f.x = W + 4;
    ctx.globalAlpha = 0.55 + 0.35 * Math.sin(f.ph);
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function render() {
  ctx.save();
  if (shake > 0.5) ctx.translate(rand(-shake, shake) * 0.5, rand(-shake, shake) * 0.5);

  drawBackground();
  drawEntities();
  drawSnow();
  if (state !== STATE.MENU) drawHUD();

  ctx.restore();

  // Brief directional white-red flash sells the impact without hiding gameplay.
  if (crashFlash > 0.02) {
    const flash = ctx.createRadialGradient(player.x, player.y, 10, player.x, player.y, 220);
    flash.addColorStop(0, `rgba(255,245,235,${crashFlash * 0.42})`);
    flash.addColorStop(0.45, `rgba(255,90,55,${crashFlash * 0.16})`);
    flash.addColorStop(1, 'rgba(255,60,40,0)');
    ctx.fillStyle = flash;
    ctx.fillRect(0, 0, W, H);
  }

  if (state === STATE.MENU) drawMenu();
  else if (state === STATE.PAUSE) drawPause();
  else if (state === STATE.OVER) drawOver();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// idle demo motion on menu: slow scroll
setInterval(() => {
  if (state === STATE.MENU || state === STATE.OVER) {
    scrollY = (scrollY + 2) % 80;
    worldScroll += 2;
  }
}, 16);

loop();
})();
</script>

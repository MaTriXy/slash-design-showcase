<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Asphalt — Horizon Drive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050810; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 90% 70% at 50% 35%, #1a2a45 0%, #0a101c 55%, #04060c 100%);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: #e8f0ff; user-select: none;
  }
  #wrap {
    position: relative; width: 700px; height: 700px;
    max-width: 100vw; max-height: 100vh;
    box-shadow: 0 0 0 2px #1a2a44, 0 0 0 5px #0c121c,
      0 0 60px rgba(40,140,255,0.18), 0 28px 90px rgba(0,0,0,0.75);
    border-radius: 6px; overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; background: #4a90d9; }
  #hud { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
  .hud-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 12px 16px; font-weight: 700; font-size: 14px; letter-spacing: 0.6px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.95), 0 0 8px rgba(0,0,0,0.6);
  }
  .score { color: #ffd76a; }
  .speed-label { color: #9ad8ff; font-variant-numeric: tabular-nums; }
  .lives { color: #ff6b7a; letter-spacing: 3px; }
  .power-badge {
    position: absolute; top: 44px; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 700; letter-spacing: 1.2px;
    padding: 5px 16px; border-radius: 20px; opacity: 0; transition: opacity 0.2s;
  }
  .power-badge.show { opacity: 1; }
  .power-badge.boost {
    background: rgba(0,180,255,0.25); color: #6df;
    border: 1px solid rgba(80,220,255,0.65); box-shadow: 0 0 18px rgba(0,200,255,0.35);
  }
  .power-badge.shield {
    background: rgba(60,255,140,0.2); color: #7f8;
    border: 1px solid rgba(80,255,160,0.6); box-shadow: 0 0 18px rgba(60,255,140,0.3);
  }
  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(4,8,18,0.82); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); z-index: 10; transition: opacity 0.28s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h1 {
    font-size: 44px; font-weight: 800; letter-spacing: 5px;
    background: linear-gradient(180deg, #9ae0ff 0%, #3a9fff 45%, #1560c0 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 28px rgba(60,160,255,0.55)); margin-bottom: 6px;
  }
  .overlay .sub {
    font-size: 13px; color: #7a92b8; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 28px;
  }
  .overlay .prompt {
    font-size: 17px; color: #fff; animation: pulse 1.5s ease-in-out infinite; margin-top: 10px;
  }
  .overlay .stats { font-size: 22px; color: #ffd76a; margin: 14px 0 6px; font-weight: 700; }
  .overlay .hint {
    margin-top: 30px; font-size: 12px; color: #5e7090; line-height: 2; text-align: center;
  }
  .overlay .hint kbd {
    display: inline-block; min-width: 22px; padding: 2px 7px;
    background: #152033; border: 1px solid #2e4060; border-radius: 4px;
    font-family: inherit; font-size: 11px; color: #9ec4ff; text-align: center;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="700" height="700"></canvas>
  <div id="hud">
    <div class="hud-top">
      <span class="score" id="scoreTxt">SCORE 0</span>
      <span class="speed-label" id="speedTxt">0 km/h</span>
      <span class="lives" id="livesTxt">♥ ♥ ♥</span>
    </div>
    <div class="power-badge" id="powerBadge"></div>
  </div>
  <div class="overlay" id="startScreen">
    <h1>NEON ASPHALT</h1>
    <div class="sub">Horizon Drive</div>
    <div class="prompt">PRESS SPACE TO START</div>
    <div class="hint">
      <kbd>W</kbd> / <kbd>↑</kbd> Accelerate &nbsp;&nbsp;
      <kbd>S</kbd> / <kbd>↓</kbd> Brake · Reverse<br>
      <kbd>A</kbd> <kbd>D</kbd> / <kbd>←</kbd> <kbd>→</kbd> Steer &nbsp;&nbsp;
      <kbd>P</kbd> Pause
    </div>
  </div>
  <div class="overlay hidden" id="pauseScreen">
    <h1 style="font-size:34px">PAUSED</h1>
    <div class="prompt">PRESS P TO RESUME</div>
  </div>
  <div class="overlay hidden" id="gameOverScreen">
    <h1 style="font-size:38px">GAME OVER</h1>
    <div class="stats" id="finalScore">SCORE 0</div>
    <div class="prompt">PRESS SPACE TO RESTART</div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = 700, H = 700;

  // ═══════════════════════════════════════════════════════════
  //  FORZA-STYLE CHASE CAMERA  (pseudo-3D perspective)
  //  Camera sits behind & above the car, looking at the horizon
  // ═══════════════════════════════════════════════════════════
  const CAM = {
    height: 1000,     // camera height in world units
    horizon: 0.34,    // horizon line (fraction of screen)
    roadW: 900,       // road half-width in world units
    segLen: 140,      // length of one road segment
    drawN: 130,       // segments drawn ahead
    fog0: 30,
    fog1: 120
  };

  let position = 0;   // player progress along Z
  let playerX = 0;    // lateral world position
  let camX = 0;       // camera X (lags behind player for chase feel)

  const hy = () => H * CAM.horizon;

  /** Project world (x, y, absoluteZ) → screen. y=0 is road surface. */
  function project(wx, wy, absZ) {
    let z = absZ - position;
    if (z < 10) z = 10;
    const scale = CAM.height / z;
    return {
      x: W / 2 + (wx - camX) * scale * 0.15,
      y: hy() + scale * 20 + wy * scale * 0.02,
      s: scale * 0.15,          // pixels per world unit
      hw: CAM.roadW * scale * 0.15, // road half-width in px
      z
    };
  }

  // ── Road segments (gentle curves + soft hills) ─────────────
  // Smooth, driveable highway — not sudden hairpins
  const SEG_N = 1200;
  const segs = [];
  for (let i = 0; i < SEG_N; i++) {
    // Layered sines = natural flowing road (classic arcade style)
    let curve =
      Math.sin(i * 0.018) * 0.55 +
      Math.sin(i * 0.007) * 0.35 +
      Math.sin(i * 0.041) * 0.18;
    // Long straight sections every so often
    const stretch = (i % 280);
    if (stretch < 50 || stretch > 230) curve *= 0.15;
    // Mild hills only (big hills make the road feel jumpy)
    const hill = Math.sin(i * 0.02) * 18 + Math.sin(i * 0.008) * 12;
    segs.push({ curve, y: hill });
  }

  // ── State ──────────────────────────────────────────────────
  const ST = { MENU: 0, PLAY: 1, PAUSE: 2, OVER: 3 };
  let state = ST.MENU;
  let score = 0, lives = 3, highScore = 0;
  try { highScore = +localStorage.getItem("neonAsphaltHS") || 0; } catch (_) {}
  let gameTime = 0, invuln = 0, lastTs = 0;
  let difficulty = 1, shake = 0, shakeX = 0, shakeY = 0;

  // ── Input ──────────────────────────────────────────────────
  const keys = Object.create(null);
  addEventListener("keydown", e => {
    keys[e.code] = true;
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) e.preventDefault();
    if (e.code === "Space" && (state === ST.MENU || state === ST.OVER)) startGame();
    if (e.code === "KeyP") {
      if (state === ST.PLAY) { state = ST.PAUSE; stopEngine(); show("pauseScreen"); }
      else if (state === ST.PAUSE) { state = ST.PLAY; startEngine(); hide("pauseScreen"); lastTs = 0; }
    }
  });
  addEventListener("keyup", e => { keys[e.code] = false; });

  // ── Audio ──────────────────────────────────────────────────
  let actx, engOsc, engSub, engGain, engFilt, engOn = false;

  function audio() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === "suspended") actx.resume();
    return actx;
  }

  function startEngine() {
    audio();
    if (engOn) return;
    engOn = true;
    engOsc = actx.createOscillator();
    engSub = actx.createOscillator();
    engGain = actx.createGain();
    engFilt = actx.createBiquadFilter();
    const g2 = actx.createGain();
    engOsc.type = "sawtooth"; engOsc.frequency.value = 55;
    engSub.type = "square"; engSub.frequency.value = 27;
    engFilt.type = "lowpass"; engFilt.frequency.value = 400;
    engGain.gain.value = 0.03; g2.gain.value = 0.01;
    engOsc.connect(engFilt); engFilt.connect(engGain); engGain.connect(actx.destination);
    engSub.connect(g2); g2.connect(actx.destination);
    engOsc.start(); engSub.start();
  }

  function stopEngine() {
    if (!engOn) return;
    engOn = false;
    try { engOsc.stop(); engSub.stop(); } catch (_) {}
  }

  function setEngine(spd, thr) {
    if (!engOn || !engOsc) return;
    const t = actx.currentTime;
    const rpm = 50 + Math.abs(spd) * 1.15 + (thr > 0 ? 35 : 0);
    engOsc.frequency.setTargetAtTime(rpm, t, 0.04);
    engSub.frequency.setTargetAtTime(rpm * 0.5, t, 0.04);
    engFilt.frequency.setTargetAtTime(300 + Math.abs(spd) * 4 + thr * 100, t, 0.06);
    engGain.gain.setTargetAtTime(0.016 + Math.min(0.05, Math.abs(spd) * 0.0009) + thr * 0.012, t, 0.05);
  }

  function sfxCoin() {
    audio();
    const t = actx.currentTime;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(988, t);
    o.frequency.exponentialRampToValueAtTime(1976, t + 0.07);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + 0.2);
  }

  function sfxCrash() {
    audio();
    const t = actx.currentTime;
    const n = actx.sampleRate * 0.4;
    const buf = actx.createBuffer(1, n, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 1.5);
    const src = actx.createBufferSource();
    src.buffer = buf;
    const f = actx.createBiquadFilter();
    f.type = "bandpass"; f.frequency.value = 550;
    const g = actx.createGain();
    g.gain.setValueAtTime(0.38, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    src.connect(f); f.connect(g); g.connect(actx.destination);
    src.start(t);
  }

  function sfxPower() {
    audio();
    const t = actx.currentTime;
    [523, 659, 784, 1047].forEach((freq, i) => {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = "triangle"; o.frequency.value = freq;
      const st = t + i * 0.055;
      g.gain.setValueAtTime(0, st);
      g.gain.linearRampToValueAtTime(0.09, st + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, st + 0.14);
      o.connect(g); g.connect(actx.destination);
      o.start(st); o.stop(st + 0.15);
    });
  }

  // ── Player (arcade handling — easy to follow the road) ─────
  // Design goal: hold gas + light steer into bends = stay centered.
  // Curve force is always weaker than full steering at the same speed.
  const player = {
    speed: 0, maxSpeed: 280, maxRev: 40,
    accel: 100, brake: 170, coast: 22,
    steer: 0, latVel: 0, drift: 0, yaw: 0,
    shield: 0, boost: 0
  };

  function resetPlayer() {
    Object.assign(player, {
      speed: 0, steer: 0, latVel: 0, drift: 0, yaw: 0, shield: 0, boost: 0
    });
    playerX = 0; position = 0; camX = 0;
  }

  function curSegIndex() {
    return Math.floor(position / CAM.segLen) % SEG_N;
  }

  /** Average curve ahead so force is smooth, not twitchy per-segment */
  function curveAhead() {
    const base = curSegIndex();
    let sum = 0, wsum = 0;
    for (let i = 0; i < 12; i++) {
      const w = 1 - i * 0.06;
      sum += segs[(base + i) % SEG_N].curve * w;
      wsum += w;
    }
    return sum / wsum;
  }

  function updatePlayer(dt) {
    const up = keys.ArrowUp || keys.KeyW;
    const down = keys.ArrowDown || keys.KeyS;
    const left = keys.ArrowLeft || keys.KeyA;
    const right = keys.ArrowRight || keys.KeyD;

    // Snappy but smooth steering input
    const steerIn = (left ? -1 : 0) + (right ? 1 : 0);
    player.steer += (steerIn - player.steer) * Math.min(1, 14 * dt);

    const absSpd = Math.abs(player.speed);
    const spdN = clamp(absSpd / player.maxSpeed, 0, 1);
    const offRoad = Math.abs(playerX) > CAM.roadW * 0.92;
    const curve = curveAhead();

    // ── Throttle / brake ─────────────────────────────────────
    let thr = 0;
    if (up) thr = 1;
    if (down) {
      if (player.speed > 10) {
        player.speed -= player.brake * dt;
        if (player.speed < 0) player.speed = 0;
      } else thr = -0.45;
    }

    const boosting = player.boost > 0;
    const maxSpd = player.maxSpeed * (boosting ? 1.45 : 1) * (offRoad ? 0.65 : 1);
    const acc = player.accel * (boosting ? 1.35 : 1) * (offRoad ? 0.8 : 1);

    if (thr > 0) player.speed += acc * thr * dt;
    else if (thr < 0) player.speed += acc * thr * dt;
    else {
      if (player.speed > 0) player.speed = Math.max(0, player.speed - player.coast * dt);
      else player.speed = Math.min(0, player.speed + player.coast * 1.4 * dt);
    }
    if (offRoad && player.speed > 50) player.speed -= 28 * dt;
    player.speed = clamp(player.speed, -player.maxRev, maxSpd);

    // ── Lateral physics (simple + fair) ──────────────────────
    // Steer response: scales with speed but never collapses at high speed
    // Full steer always beats max curve force so the road is followable
    const steerRate = 520 + absSpd * 1.15;          // px-world / s at full lock
    const curveRate = curve * absSpd * 1.05;        // outward push from bend
    // Gentle center assist when not hard-steering (arcade "lane keep" help)
    const centerAssist = Math.abs(player.steer) < 0.25
      ? -playerX * (0.55 + spdN * 0.35)
      : -playerX * 0.12;

    playerX += player.steer * steerRate * dt;
    playerX -= curveRate * dt;
    playerX += centerAssist * dt;

    // Light momentum for drift feel (doesn't fight the player)
    player.latVel += player.steer * absSpd * 0.08 * dt;
    player.latVel -= curve * absSpd * 0.04 * dt;
    player.latVel *= Math.exp(-5.5 * dt);
    playerX += player.latVel * 18 * dt;

    // Drift smoke when steering hard at speed
    if (Math.abs(player.steer) > 0.55 && absSpd > 160) {
      player.drift = Math.min(1, player.drift + 2 * dt);
    } else {
      player.drift = Math.max(0, player.drift - 2.5 * dt);
    }

    // Off-road: easy recovery toward asphalt
    if (offRoad) {
      playerX += -Math.sign(playerX || 1) * 280 * dt;
      if (player.steer * -Math.sign(playerX) > 0.2) {
        playerX += player.steer * 200 * dt;
      }
    }

    // Soft walls — bounce back onto road
    const wall = CAM.roadW * 1.25;
    if (playerX < -wall) {
      playerX = -wall;
      player.latVel = Math.max(0.8, -player.latVel * 0.4);
      player.speed = Math.max(player.speed * 0.9, 40);
      shake = 0.12;
    } else if (playerX > wall) {
      playerX = wall;
      player.latVel = Math.min(-0.8, -player.latVel * 0.4);
      player.speed = Math.max(player.speed * 0.9, 40);
      shake = 0.12;
    }

    // Soft clamp inside road when almost centered (reduces edge jitter)
    playerX = clamp(playerX, -wall, wall);

    position += Math.max(0, player.speed) * dt * 20;

    // Visual bank — subtle
    const targetYaw = player.steer * 0.32 + curve * 0.12 + player.latVel * 0.04;
    player.yaw += (targetYaw - player.yaw) * Math.min(1, 8 * dt);

    // Stable chase cam: mostly follow car, slight look into curve
    const camTarget = playerX * 0.55 + curve * 40;
    camX += (camTarget - camX) * Math.min(1, 5 * dt);

    if (player.boost > 0) player.boost -= dt;
    if (player.shield > 0) player.shield -= dt;
    if (invuln > 0) invuln -= dt;

    setEngine(player.speed, thr > 0 ? thr : 0);
    powerBadge();
  }

  function powerBadge() {
    const el = document.getElementById("powerBadge");
    if (player.boost > 0) {
      el.textContent = "⚡ BOOST " + player.boost.toFixed(1) + "s";
      el.className = "power-badge show boost";
    } else if (player.shield > 0) {
      el.textContent = "🛡 SHIELD " + player.shield.toFixed(1) + "s";
      el.className = "power-badge show shield";
    } else el.className = "power-badge";
  }

  // ── Enemies ────────────────────────────────────────────────
  const enemies = [];
  const PAL = [
    { b: "#e02020", a: "#ffcc00" },
    { b: "#f0b800", a: "#222222" },
    { b: "#cc1838", a: "#ffffff" },
    { b: "#e8a000", a: "#880000" },
    { b: "#d82848", a: "#ffee88" }
  ];
  let enemyTimer = 0;

  function spawnEnemy() {
    const lane = ((Math.random() * 3) | 0) - 1;
    const pal = PAL[(Math.random() * PAL.length) | 0];
    enemies.push({
      z: position + 2200 + Math.random() * 4500,
      x: lane * CAM.roadW * 0.5 + (Math.random() - 0.5) * 80,
      speed: 70 + Math.random() * 80 + difficulty * 12,
      body: pal.b, accent: pal.a,
      dead: false
    });
  }

  function updateEnemies(dt) {
    enemyTimer -= dt;
    if (enemyTimer <= 0) {
      spawnEnemy();
      if (difficulty > 2 && Math.random() < 0.4) spawnEnemy();
      if (difficulty > 4 && Math.random() < 0.3) spawnEnemy();
      enemyTimer = Math.max(0.45, 1.45 - difficulty * 0.13) * (0.7 + Math.random() * 0.5);
    }
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.z += e.speed * dt * 10;
      const rel = e.z - position;
      if (rel < -300) { enemies.splice(i, 1); score += 10; continue; }
      if (rel > 14000) { enemies.splice(i, 1); continue; }
      // Collision in world space
      if (!e.dead && invuln <= 0 && rel > 60 && rel < 320 && Math.abs(e.x - playerX) < 200) {
        e.dead = true;
        onCrash(e);
      }
    }
  }

  function onCrash(e) {
    sfxCrash();
    shake = 0.5;
    player.speed *= 0.42;
    player.latVel += (playerX < e.x ? -1 : 1) * 3.5;
    sparks(28);
    if (player.shield > 0) { player.shield = 0; score += 20; return; }
    lives--;
    invuln = 2.2;
    livesHUD();
    if (lives <= 0) endGame();
  }

  // ── Pickups ────────────────────────────────────────────────
  const pickups = [];
  let pickTimer = 0;

  function spawnPick() {
    const lane = ((Math.random() * 3) | 0) - 1;
    const roll = Math.random();
    const type = roll > 0.9 ? "boost" : roll > 0.8 ? "shield" : "coin";
    const z0 = position + 2400 + Math.random() * 2800;
    const x = lane * CAM.roadW * 0.45;
    if (type === "coin" && Math.random() < 0.55) {
      for (let k = 0; k < 5; k++)
        pickups.push({ z: z0 + k * 160, x: x + (Math.random() - 0.5) * 30, type: "coin", phase: Math.random() * 6 });
    } else {
      pickups.push({ z: z0, x, type, phase: Math.random() * 6 });
    }
  }

  function updatePickups(dt) {
    pickTimer -= dt;
    if (pickTimer <= 0) { spawnPick(); pickTimer = 0.75 + Math.random(); }
    for (let i = pickups.length - 1; i >= 0; i--) {
      const p = pickups[i];
      p.phase += dt * 4;
      const rel = p.z - position;
      if (rel < -200 || rel > 14000) { pickups.splice(i, 1); continue; }
      if (rel > 40 && rel < 280 && Math.abs(p.x - playerX) < 190) {
        grab(p); pickups.splice(i, 1);
      }
    }
  }

  function grab(p) {
    if (p.type === "coin") { score += 25; sfxCoin(); }
    else if (p.type === "boost") { player.boost = Math.min(8, player.boost + 5); score += 50; sfxPower(); }
    else { player.shield = Math.min(10, player.shield + 6); score += 50; sfxPower(); }
  }

  // ── Particles (screen space near player car) ───────────────
  const particles = [];

  function sparks(n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, sp = 90 + Math.random() * 200;
      particles.push({
        x: W / 2 + (Math.random() - 0.5) * 50,
        y: H * 0.78 + (Math.random() - 0.5) * 20,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 50,
        life: 0.2 + Math.random() * 0.3, max: 0.5,
        col: Math.random() > 0.4 ? "#ffaa22" : "#fff6c8",
        size: 2 + Math.random() * 2, smoke: false
      });
    }
  }

  function smoke() {
    if (player.drift < 0.25 || player.speed < 90) return;
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: W / 2 + player.yaw * 50 + (i ? 20 : -20) + (Math.random() - 0.5) * 12,
        y: H * 0.85 + Math.random() * 8,
        vx: (Math.random() - 0.5) * 30 - player.steer * 25,
        vy: 15 + Math.random() * 35,
        life: 0.35 + Math.random() * 0.4, max: 0.75,
        size: 5 + Math.random() * 10, smoke: true
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      p.x += p.vx * dt; p.y += p.vy * dt;
      if (p.smoke) { p.size += 18 * dt; p.vy += 8 * dt; }
      else p.vy += 200 * dt;
    }
  }

  // ── Helpers ────────────────────────────────────────────────
  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  function shade(hex, amt) {
    const r = clamp(parseInt(hex.slice(1, 3), 16) + amt, 0, 255);
    const g = clamp(parseInt(hex.slice(3, 5), 16) + amt, 0, 255);
    const b = clamp(parseInt(hex.slice(5, 7), 16) + amt, 0, 255);
    return `rgb(${r},${g},${b})`;
  }

  function rr(x, y, w, h, r) {
    const m = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + m, y);
    ctx.arcTo(x + w, y, x + w, y + h, m);
    ctx.arcTo(x + w, y + h, x, y + h, m);
    ctx.arcTo(x, y + h, x, y, m);
    ctx.arcTo(x, y, x + w, y, m);
    ctx.closePath();
  }

  function parseCol(c) {
    if (c[0] === "#") {
      return { r: parseInt(c.slice(1,3),16), g: parseInt(c.slice(3,5),16), b: parseInt(c.slice(5,7),16) };
    }
    const m = c.match(/(\d+)/g);
    return { r: +m[0], g: +m[1], b: +m[2] };
  }

  function lerpCol(a, b, t) {
    if (t <= 0) return a;
    if (t >= 1) return b;
    const pa = parseCol(a), pb = parseCol(b);
    return `rgb(${(pa.r+(pb.r-pa.r)*t)|0},${(pa.g+(pb.g-pa.g)*t)|0},${(pa.b+(pb.b-pa.b)*t)|0})`;
  }

  function quad(x1, y1, w1, x2, y2, w2, col) {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(x1 - w1, y1);
    ctx.lineTo(x1 + w1, y1);
    ctx.lineTo(x2 + w2, y2);
    ctx.lineTo(x2 - w2, y2);
    ctx.closePath();
    ctx.fill();
  }

  // ── Sky (open-world horizon) ───────────────────────────────
  function drawSky() {
    const hline = hy();
    const sky = ctx.createLinearGradient(0, 0, 0, hline + 30);
    sky.addColorStop(0, "#15356a");
    sky.addColorStop(0.3, "#3a7ec8");
    sky.addColorStop(0.65, "#7eb8e8");
    sky.addColorStop(0.9, "#c5dce8");
    sky.addColorStop(1, "#d8e8d0");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, hline + 40);

    // Sun
    const sx = W * 0.7, sy = hline * 0.38;
    const sg = ctx.createRadialGradient(sx, sy, 4, sx, sy, 130);
    sg.addColorStop(0, "rgba(255,250,220,0.95)");
    sg.addColorStop(0.12, "rgba(255,220,120,0.5)");
    sg.addColorStop(0.45, "rgba(255,180,80,0.12)");
    sg.addColorStop(1, "rgba(255,160,40,0)");
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(sx, sy, 130, 0, Math.PI * 2); ctx.fill();

    // Clouds
    ctx.fillStyle = "rgba(255,255,255,0.32)";
    cloud(110 + Math.sin(gameTime * 0.04) * 18, hline * 0.25, 48);
    cloud(380 + Math.cos(gameTime * 0.03) * 12, hline * 0.18, 68);
    cloud(560, hline * 0.32, 38);
    ctx.fillStyle = "rgba(255,255,255,0.18)";
    cloud(240, hline * 0.38, 50);

    // Far mountains (blue haze)
    ctx.fillStyle = "#6a8aaa";
    ctx.beginPath();
    ctx.moveTo(0, hline + 2);
    for (let x = 0; x <= W; x += 10) {
      const n = Math.sin(x * 0.008 + position * 0.00004) * 28 + Math.sin(x * 0.02 + 1) * 14;
      ctx.lineTo(x, hline - 20 - n);
    }
    ctx.lineTo(W, hline + 2); ctx.closePath(); ctx.fill();

    // Near hills (green)
    ctx.fillStyle = "#3a6a42";
    ctx.beginPath();
    ctx.moveTo(0, hline + 6);
    for (let x = 0; x <= W; x += 8) {
      const n = Math.sin(x * 0.014 + position * 0.00007) * 16 + Math.sin(x * 0.035) * 9;
      ctx.lineTo(x, hline - 4 - n);
    }
    ctx.lineTo(W, hline + 6); ctx.closePath(); ctx.fill();

    // Horizon haze
    const haze = ctx.createLinearGradient(0, hline - 25, 0, hline + 15);
    haze.addColorStop(0, "rgba(200,220,240,0)");
    haze.addColorStop(0.7, "rgba(210,225,235,0.3)");
    haze.addColorStop(1, "rgba(170,200,150,0.1)");
    ctx.fillStyle = haze;
    ctx.fillRect(0, hline - 25, W, 45);
  }

  function cloud(x, y, s) {
    ctx.beginPath();
    ctx.ellipse(x, y, s, s * 0.42, 0, 0, Math.PI * 2);
    ctx.ellipse(x - s * 0.5, y + 3, s * 0.5, s * 0.32, 0, 0, Math.PI * 2);
    ctx.ellipse(x + s * 0.45, y + 2, s * 0.48, s * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Perspective road ───────────────────────────────────────
  function drawRoad() {
    const base = Math.floor(position / CAM.segLen);
    let x = 0, dx = 0;
    const pts = [];

    for (let n = 0; n < CAM.drawN; n++) {
      const seg = segs[(base + n) % SEG_N];
      const absZ = position + n * CAM.segLen;
      const p = project(x, seg.y, absZ);
      pts.push({ p, seg, n, even: (base + n) % 2 === 0, x });
      // Milder visual curve accumulation so bends look natural, not whippy
      dx += seg.curve * 0.22;
      x += dx;
    }

    // Far → near
    for (let i = pts.length - 2; i >= 0; i--) {
      const a = pts[i], b = pts[i + 1];
      if (!a.p || !b.p) continue;
      if (a.p.y > H + 20 && b.p.y > H + 20) continue;
      if (b.p.y < hy() - 10) continue;

      const fog = clamp((a.n - CAM.fog0) / (CAM.fog1 - CAM.fog0), 0, 1);
      const w1 = a.p.hw, w2 = b.p.hw;

      // Grass strip (full width between scanlines)
      const grass = a.even ? "#2c7a30" : "#348a36";
      ctx.fillStyle = lerpCol(grass, "#9ec0d8", fog);
      ctx.fillRect(0, Math.min(a.p.y, b.p.y), W, Math.abs(b.p.y - a.p.y) + 1);

      // Rumble / curb
      const rumble = a.even ? "#e0e0e0" : "#c02020";
      quad(a.p.x, a.p.y, w1 * 1.14, b.p.x, b.p.y, w2 * 1.14, lerpCol(rumble, "#9ec0d8", fog));

      // Asphalt
      const road = a.even ? "#3c3c46" : "#353540";
      quad(a.p.x, a.p.y, w1, b.p.x, b.p.y, w2, lerpCol(road, "#90b4cc", fog * 0.9));

      // Lane dashes (even segments only → dashed)
      if (a.even) {
        const lc = lerpCol("#ecece4", "#90b4cc", fog);
        const lw1 = w1 * 0.03, lw2 = w2 * 0.03;
        quad(a.p.x, a.p.y, lw1 * 1.8, b.p.x, b.p.y, lw2 * 1.8, lc);
        quad(a.p.x - w1 * 0.34, a.p.y, lw1, b.p.x - w2 * 0.34, b.p.y, lw2, lc);
        quad(a.p.x + w1 * 0.34, a.p.y, lw1, b.p.x + w2 * 0.34, b.p.y, lw2, lc);
      }

      // Solid edge lines
      const ec = lerpCol("#f2f2ec", "#90b4cc", fog);
      const ew1 = w1 * 0.028, ew2 = w2 * 0.028;
      quad(a.p.x - w1 * 0.95, a.p.y, ew1, b.p.x - w2 * 0.95, b.p.y, ew2, ec);
      quad(a.p.x + w1 * 0.95, a.p.y, ew1, b.p.x + w2 * 0.95, b.p.y, ew2, ec);

      // Side scenery
      if (a.n > 4 && a.n % 4 === 0) drawSideProp(a, fog);
    }
  }

  function drawSideProp(a, fog) {
    if (fog > 0.88) return;
    const s = a.p.s;
    const th = 900 * s;   // tree height px
    const tw = 350 * s;
    if (th < 5) return;

    const side = (a.n % 8 < 4) ? -1 : 1;
    const bx = a.p.x + side * a.p.hw * 1.45;
    const by = a.p.y;

    ctx.globalAlpha = 1 - fog;
    // Trunk
    ctx.fillStyle = "#5a3818";
    ctx.fillRect(bx - tw * 0.07, by - th * 0.32, tw * 0.14, th * 0.32);
    // Canopy
    ctx.fillStyle = a.even ? "#1a6a24" : "#22802c";
    ctx.beginPath();
    ctx.moveTo(bx, by - th);
    ctx.lineTo(bx - tw * 0.55, by - th * 0.3);
    ctx.lineTo(bx + tw * 0.55, by - th * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = a.even ? "#28a038" : "#30b040";
    ctx.beginPath();
    ctx.moveTo(bx, by - th * 1.18);
    ctx.lineTo(bx - tw * 0.4, by - th * 0.48);
    ctx.lineTo(bx + tw * 0.4, by - th * 0.48);
    ctx.closePath();
    ctx.fill();

    // Building every so often
    if (a.n % 12 === 0) {
      const bw = tw * 1.5, bh = th * 1.4;
      const bldx = a.p.x + side * a.p.hw * 2.2;
      ctx.fillStyle = `rgb(${35+(a.n%20)},${40+(a.n%12)},${55+(a.n%22)})`;
      ctx.fillRect(bldx - bw / 2, by - bh, bw, bh);
      ctx.fillStyle = "rgba(255,220,100,0.35)";
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 3; c++)
          if ((r + c + a.n) % 3)
            ctx.fillRect(bldx - bw/2 + 3 + c*(bw/3.2), by - bh + 5 + r*(bh/5), bw*0.14, bh*0.1);
    }
    ctx.globalAlpha = 1;
  }

  // ── Depth-sorted entities ──────────────────────────────────
  function drawEntities() {
    const list = [];
    for (const e of enemies) {
      const rel = e.z - position;
      if (rel < 80 || rel > 10000) continue;
      const p = project(e.x, 0, e.z);
      if (p.y < hy() || p.y > H + 40) continue;
      list.push({ k: "e", e, p, z: rel });
    }
    for (const c of pickups) {
      const rel = c.z - position;
      if (rel < 80 || rel > 10000) continue;
      const p = project(c.x, -40 + Math.sin(c.phase) * 25, c.z);
      if (p.y < hy() || p.y > H + 40) continue;
      list.push({ k: "p", c, p, z: rel });
    }
    list.sort((a, b) => b.z - a.z);
    for (const s of list) {
      if (s.k === "e") drawEnemy(s.e, s.p);
      else drawPick(s.c, s.p);
    }
  }

  function drawEnemy(e, p) {
    // Perspective scale — keep enemies smaller than the close chase-cam player car
    const w = Math.min(96, 250 * p.s);
    const h = w * 0.55;
    if (w < 4) return;
    const fog = clamp((p.z - 3500) / 5500, 0, 1);

    ctx.save();
    ctx.translate(p.x, p.y - h * 0.2);
    ctx.globalAlpha = 1 - fog * 0.85;

    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.ellipse(0, h * 0.38, w * 0.5, h * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body (rear silhouette)
    const g = ctx.createLinearGradient(-w/2, 0, w/2, 0);
    g.addColorStop(0, shade(e.body, -40));
    g.addColorStop(0.5, e.body);
    g.addColorStop(1, shade(e.body, -35));
    ctx.beginPath();
    ctx.moveTo(-w*0.48, h*0.2);
    ctx.lineTo(-w*0.5, -h*0.05);
    ctx.lineTo(-w*0.38, -h*0.4);
    ctx.lineTo(-w*0.18, -h*0.55);
    ctx.lineTo(w*0.18, -h*0.55);
    ctx.lineTo(w*0.38, -h*0.4);
    ctx.lineTo(w*0.5, -h*0.05);
    ctx.lineTo(w*0.48, h*0.2);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();

    // Rear glass
    ctx.fillStyle = "rgba(25,45,75,0.88)";
    ctx.beginPath();
    ctx.moveTo(-w*0.3, -h*0.38);
    ctx.lineTo(-w*0.14, -h*0.5);
    ctx.lineTo(w*0.14, -h*0.5);
    ctx.lineTo(w*0.3, -h*0.38);
    ctx.lineTo(w*0.24, -h*0.12);
    ctx.lineTo(-w*0.24, -h*0.12);
    ctx.closePath();
    ctx.fill();

    // Tail lights
    ctx.fillStyle = "#ff2020";
    ctx.shadowColor = "#ff0000";
    ctx.shadowBlur = Math.max(2, 8 * p.s * 5);
    ctx.fillRect(-w*0.44, -h*0.08, w*0.14, h*0.12);
    ctx.fillRect(w*0.3, -h*0.08, w*0.14, h*0.12);
    ctx.shadowBlur = 0;

    // Wheels
    ctx.fillStyle = "#111";
    ctx.fillRect(-w*0.5, h*0.05, w*0.12, h*0.22);
    ctx.fillRect(w*0.38, h*0.05, w*0.12, h*0.22);

    // Stripe
    ctx.fillStyle = e.accent;
    ctx.globalAlpha = (1 - fog * 0.85) * 0.65;
    ctx.fillRect(-w*0.04, -h*0.5, w*0.08, h*0.55);

    ctx.restore();
  }

  function drawPick(c, p) {
    const r = (c.type === "coin" ? 110 : 130) * p.s;
    if (r < 2.5) return;
    const fog = clamp((p.z - 3500) / 5500, 0, 1);
    ctx.save();
    ctx.translate(p.x, p.y - r * 0.6);
    ctx.globalAlpha = 1 - fog * 0.8;

    if (c.type === "coin") {
      ctx.shadowColor = "#ffd700";
      ctx.shadowBlur = 12;
      const g = ctx.createRadialGradient(-r*0.2, -r*0.2, 1, 0, 0, r);
      g.addColorStop(0, "#fff6c0");
      g.addColorStop(0.5, "#ffd000");
      g.addColorStop(1, "#b8860b");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, 0, r * (0.55 + 0.45 * Math.abs(Math.sin(c.phase))), r, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "rgba(100,60,0,0.6)";
      ctx.font = `bold ${Math.max(8, r * 0.9)}px sans-serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("$", 0, 1);
    } else {
      const col = c.type === "boost" ? "#00c8f0" : "#2ecc71";
      ctx.shadowColor = col; ctx.shadowBlur = 14;
      ctx.fillStyle = col;
      rr(-r, -r, r * 2, r * 2, r * 0.28);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.font = `${Math.max(10, r * 1.1)}px sans-serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "#fff";
      ctx.fillText(c.type === "boost" ? "⚡" : "🛡", 0, 1);
    }
    ctx.restore();
  }

  // ── Player car — rear 3/4 chase-cam (Forza angle) ──────────
  function drawPlayerCar() {
    const baseY = H * 0.78;
    const baseX = W / 2 + (playerX - camX) * 0.04 + player.yaw * 32;
    const bob = Math.sin(gameTime * (7 + player.speed * 0.04)) * (0.6 + player.speed * 0.01);

    if (invuln > 0 && ((invuln * 12) | 0) % 2 === 0) return;

    ctx.save();
    ctx.translate(baseX + shakeX * 0.25, baseY + bob + shakeY * 0.15);
    // Larger hero car so it reads as nearest / player vehicle
    ctx.scale(1.55, 1.55);
    // Bank into turns + slight 3/4 perspective skew
    ctx.rotate(player.yaw * 0.5);
    ctx.transform(1, 0, player.yaw * 0.1, 0.9, 0, 0);

    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.42)";
    ctx.beginPath();
    ctx.ellipse(3, 30, 52, 13, 0, 0, Math.PI * 2);
    ctx.fill();

    // Shield bubble
    if (player.shield > 0) {
      const pulse = 0.5 + 0.5 * Math.sin(gameTime * 9);
      ctx.strokeStyle = `rgba(70,255,160,${0.35 + pulse * 0.4})`;
      ctx.lineWidth = 3;
      ctx.shadowColor = "#40ff90"; ctx.shadowBlur = 18;
      ctx.beginPath(); ctx.ellipse(0, 2, 62, 42, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Exhaust / boost flame
    const thrOn = (keys.ArrowUp || keys.KeyW) && player.speed > 40;
    if (player.boost > 0 || thrOn) {
      const fl = 0.55 + 0.45 * Math.sin(gameTime * 28);
      const boost = player.boost > 0;
      const len = (boost ? 40 : 16) * fl;
      for (const sx of [-20, 20]) {
        const g = ctx.createLinearGradient(sx, 24, sx, 24 + len);
        g.addColorStop(0, boost ? "rgba(150,235,255,0.95)" : "rgba(255,170,50,0.75)");
        g.addColorStop(0.4, boost ? "rgba(50,160,255,0.55)" : "rgba(255,90,20,0.4)");
        g.addColorStop(1, "rgba(30,60,255,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(sx - 6, 22);
        ctx.lineTo(sx, 24 + len);
        ctx.lineTo(sx + 6, 22);
        ctx.closePath();
        ctx.fill();
      }
    }

    // Body gradient (bright blue)
    const bodyG = ctx.createLinearGradient(-50, 0, 50, 0);
    bodyG.addColorStop(0, "#084a98");
    bodyG.addColorStop(0.18, "#1a90ff");
    bodyG.addColorStop(0.5, "#48b8ff");
    bodyG.addColorStop(0.82, "#1a90ff");
    bodyG.addColorStop(1, "#084a98");

    // Rear 3/4 body silhouette
    ctx.beginPath();
    ctx.moveTo(-46, 14);
    ctx.lineTo(-50, -2);
    ctx.lineTo(-40, -24);
    ctx.lineTo(-20, -34);
    ctx.lineTo(20, -34);
    ctx.lineTo(40, -24);
    ctx.lineTo(50, -2);
    ctx.lineTo(46, 14);
    ctx.closePath();
    ctx.fillStyle = bodyG;
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Side body depth (3/4 panels)
    ctx.fillStyle = "rgba(0,40,90,0.25)";
    ctx.beginPath();
    ctx.moveTo(-46, 14); ctx.lineTo(-50, -2); ctx.lineTo(-40, -24);
    ctx.lineTo(-38, 10); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(46, 14); ctx.lineTo(50, -2); ctx.lineTo(40, -24);
    ctx.lineTo(38, 10); ctx.closePath(); ctx.fill();

    // Cabin / rear windshield
    const glass = ctx.createLinearGradient(0, -32, 0, -4);
    glass.addColorStop(0, "rgba(15,35,65,0.95)");
    glass.addColorStop(0.45, "rgba(70,120,170,0.7)");
    glass.addColorStop(1, "rgba(25,50,85,0.92)");
    ctx.beginPath();
    ctx.moveTo(-30, -22);
    ctx.lineTo(-15, -32);
    ctx.lineTo(15, -32);
    ctx.lineTo(30, -22);
    ctx.lineTo(24, -6);
    ctx.lineTo(-24, -6);
    ctx.closePath();
    ctx.fillStyle = glass;
    ctx.fill();

    // Glass shine
    ctx.fillStyle = "rgba(190,225,255,0.22)";
    ctx.beginPath();
    ctx.moveTo(-22, -26); ctx.lineTo(-6, -31); ctx.lineTo(4, -18); ctx.lineTo(-18, -16);
    ctx.closePath(); ctx.fill();

    // Center stripe
    ctx.fillStyle = "rgba(120,220,255,0.75)";
    ctx.fillRect(-4.5, -32, 9, 40);

    // Rear wing
    ctx.fillStyle = "#0a62c4";
    ctx.fillRect(-32, -38, 64, 6);
    ctx.fillStyle = "#1580e0";
    ctx.fillRect(-34, -40, 8, 10);
    ctx.fillRect(26, -40, 8, 10);

    // Tail lights
    ctx.fillStyle = "#ff2222";
    ctx.shadowColor = "#ff1010";
    ctx.shadowBlur = 14;
    rr(-40, -2, 17, 9, 2); ctx.fill();
    rr(23, -2, 17, 9, 2); ctx.fill();
    ctx.shadowBlur = 0;
    if (keys.ArrowDown || keys.KeyS) {
      ctx.fillStyle = "rgba(255,70,70,0.75)";
      rr(-40, -2, 17, 9, 2); ctx.fill();
      rr(23, -2, 17, 9, 2); ctx.fill();
    }

    // Exhaust tips
    ctx.fillStyle = "#2a2a2e";
    ctx.beginPath(); ctx.arc(-20, 18, 4.5, 0, Math.PI * 2); ctx.arc(20, 18, 4.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#0a0a0c";
    ctx.beginPath(); ctx.arc(-20, 18, 2.8, 0, Math.PI * 2); ctx.arc(20, 18, 2.8, 0, Math.PI * 2); ctx.fill();

    // Bumper
    ctx.fillStyle = "#0a2a58";
    rr(-44, 12, 88, 9, 2); ctx.fill();

    // Wheels
    wheel(-42, 14, 17, 24, player.steer);
    wheel(26, 14, 17, 24, player.steer);

    // Mirrors
    ctx.fillStyle = "#1a88e8";
    ctx.fillRect(-52, -14, 9, 5);
    ctx.fillRect(43, -14, 9, 5);

    // Specular highlight
    ctx.fillStyle = "rgba(255,255,255,0.14)";
    ctx.beginPath();
    ctx.moveTo(-28, -18);
    ctx.quadraticCurveTo(-8, -36, 12, -20);
    ctx.quadraticCurveTo(0, -8, -28, -6);
    ctx.closePath();
    ctx.fill();

    // Headlight glow wash (front lights reflecting under/side)
    ctx.fillStyle = "rgba(180,220,255,0.12)";
    ctx.beginPath(); ctx.ellipse(0, -6, 55, 22, 0, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
    smoke();
  }

  function wheel(x, y, w, h, steer) {
    ctx.save();
    ctx.translate(x + w / 2, y + h / 2);
    ctx.rotate(steer * 0.12);
    ctx.fillStyle = "#0e0e10";
    rr(-w/2, -h/2, w, h, 3); ctx.fill();
    ctx.fillStyle = "#3a3a42";
    rr(-w/2 + 3, -h/2 + 4, w - 6, h - 8, 2); ctx.fill();
    ctx.fillStyle = "#777";
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      const t = p.life / p.max;
      ctx.save();
      if (p.smoke) {
        ctx.globalAlpha = 0.32 * t;
        ctx.fillStyle = "rgb(175,175,185)";
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.globalAlpha = t;
        ctx.fillStyle = p.col;
        ctx.shadowColor = p.col; ctx.shadowBlur = 6;
        ctx.fillRect(p.x, p.y, p.size, p.size * 1.5);
      }
      ctx.restore();
    }
  }

  // ── HUD ────────────────────────────────────────────────────
  function drawSpeedo() {
    const cx = W - 70, cy = H - 70, r = 48;
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, r + 2, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(6,10,20,0.78)"; ctx.fill();
    ctx.strokeStyle = "rgba(90,160,230,0.5)"; ctx.lineWidth = 2; ctx.stroke();

    const ratio = clamp(player.speed / (player.maxSpeed * 1.55), 0, 1);
    ctx.beginPath();
    ctx.arc(cx, cy, r - 7, Math.PI * 0.75, Math.PI * 0.75 + ratio * Math.PI * 1.5);
    const ag = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
    ag.addColorStop(0, "#2a9"); ag.addColorStop(0.55, "#4af"); ag.addColorStop(1, "#f45");
    ctx.strokeStyle = ag; ctx.lineWidth = 5; ctx.lineCap = "round"; ctx.stroke();

    const na = Math.PI * 0.75 + ratio * Math.PI * 1.5;
    ctx.strokeStyle = "#ff4a6a"; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(na) * (r - 16), cy + Math.sin(na) * (r - 16));
    ctx.stroke();
    ctx.fillStyle = "#c8d0e0";
    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();

    const kmh = Math.round(Math.max(0, player.speed) * 1.2);
    ctx.fillStyle = "#8ad0ff";
    ctx.font = "bold 13px monospace"; ctx.textAlign = "center";
    ctx.fillText(String(kmh), cx, cy + 20);
    ctx.font = "9px sans-serif"; ctx.fillStyle = "#5a7090";
    ctx.fillText("km/h", cx, cy + 32);
    ctx.restore();
  }

  function drawDiff() {
    const x = 18, y = H - 26, w = 130, h = 7;
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    rr(x, y, w, h, 3); ctx.fill();
    const f = clamp((difficulty - 1) / 6, 0, 1);
    const g = ctx.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0, "#2a9"); g.addColorStop(0.55, "#fa3"); g.addColorStop(1, "#f34");
    ctx.fillStyle = g;
    if (f > 0.01) { rr(x, y, w * f, h, 3); ctx.fill(); }
    ctx.fillStyle = "#8aa";
    ctx.font = "10px sans-serif"; ctx.textAlign = "left";
    ctx.fillText("DIFFICULTY", x, y - 5);
  }

  function scoreHUD() {
    document.getElementById("scoreTxt").textContent = "SCORE " + score;
    document.getElementById("speedTxt").textContent =
      Math.round(Math.max(0, player.speed) * 1.2) + " km/h";
  }
  function livesHUD() {
    document.getElementById("livesTxt").textContent =
      lives > 0 ? "♥ ".repeat(lives).trim() : "—";
  }
  function show(id) { document.getElementById(id).classList.remove("hidden"); }
  function hide(id) { document.getElementById(id).classList.add("hidden"); }

  function startGame() {
    audio();
    hide("startScreen"); hide("gameOverScreen"); hide("pauseScreen");
    score = 0; lives = 3; gameTime = 0; invuln = 0;
    difficulty = 1; shake = 0;
    enemies.length = 0; pickups.length = 0; particles.length = 0;
    enemyTimer = 1.2; pickTimer = 0.6;
    resetPlayer();
    livesHUD(); scoreHUD();
    state = ST.PLAY;
    startEngine();
    lastTs = 0;
  }

  function endGame() {
    state = ST.OVER;
    stopEngine();
    if (score > highScore) {
      highScore = score;
      try { localStorage.setItem("neonAsphaltHS", highScore); } catch (_) {}
    }
    document.getElementById("finalScore").textContent =
      "SCORE " + score + (score >= highScore ? "  ★ BEST" : "  BEST " + highScore);
    show("gameOverScreen");
  }

  // ── Loop ───────────────────────────────────────────────────
  function update(dt) {
    gameTime += dt;
    difficulty = 1 + score / 400 + gameTime / 50;
    updatePlayer(dt);
    updateEnemies(dt);
    updatePickups(dt);
    updateParticles(dt);
    if (shake > 0) {
      shake = Math.max(0, shake - dt * 2.5);
      shakeX = (Math.random() - 0.5) * shake * 24;
      shakeY = (Math.random() - 0.5) * shake * 16;
    } else shakeX = shakeY = 0;
    score += Math.floor(Math.max(0, player.speed) * dt * 0.15);
    scoreHUD();
  }

  function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.translate(shakeX, shakeY);

    drawSky();
    drawRoad();
    drawEntities();
    drawParticles();
    drawPlayerCar();

    // Cinematic vignette
    const v = ctx.createRadialGradient(W/2, H*0.55, H*0.18, W/2, H*0.5, H*0.78);
    v.addColorStop(0, "rgba(0,0,0,0)");
    v.addColorStop(1, "rgba(0,0,0,0.48)");
    ctx.fillStyle = v;
    ctx.fillRect(-30, -30, W + 60, H + 60);

    // Speed lines at high velocity
    if (player.speed > 170) {
      const inten = clamp((player.speed - 170) / 180, 0, 0.4);
      ctx.strokeStyle = `rgba(210,235,255,${inten * 0.35})`;
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 14; i++) {
        const a = (i / 14) * Math.PI * 2 + gameTime * 0.5;
        const len = 25 + inten * 90;
        ctx.beginPath();
        ctx.moveTo(W/2 + Math.cos(a)*130, H*0.5 + Math.sin(a)*70);
        ctx.lineTo(W/2 + Math.cos(a)*(130+len), H*0.5 + Math.sin(a)*(70+len*0.55));
        ctx.stroke();
      }
    }

    if (state === ST.PLAY || state === ST.PAUSE) {
      drawSpeedo();
      drawDiff();
    }
    ctx.restore();
  }

  function frame(ts) {
    if (!lastTs) lastTs = ts;
    let dt = (ts - lastTs) / 1000;
    lastTs = ts;
    dt = Math.min(dt, 0.05);

    if (state === ST.PLAY) update(dt);
    else if (state === ST.MENU) {
      position += 280 * dt;
      gameTime += dt;
      player.speed = 110;
      player.yaw = Math.sin(gameTime * 0.55) * 0.14;
      camX = Math.sin(gameTime * 0.3) * 40;
    }

    draw();
    requestAnimationFrame(frame);
  }

  livesHUD();
  scoreHUD();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
